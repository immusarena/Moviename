<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamil Couple Movie Game 💖</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Latha&display=swap');

html, body {
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
}

body {
    background-color: #120A1E;
    color: white;
    font-family: 'Poppins', 'Latha', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px 0;
    flex-direction: column;
}

.container {
    width: 90%;
    max-width: 400px;
}

/* VS */
.vs-container {
    display: flex;
    justify-content: space-around;
    align-items: center;
    margin-bottom: 25px;
}

.player-box {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 90px;
    padding: 10px;
    border-radius: 15px;
    position: relative;
}

/* 🔥 TURN HIGHLIGHT UPGRADED */
.active-turn {
    background: rgba(255, 75, 114, 0.15);
    border: 1px solid #FF4B72;
    box-shadow: 0 0 15px #FF4B72;
}

.avatar {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    background-size: cover;
    background-position: center;
    position: relative;
}

.immu-pic { background-image: url('1000242624.jpg'); }
.sappii-pic { background-image: url('1000242625.jpg'); }

/* 🟢 ONLINE DOT */
.online-dot {
    position: absolute;
    bottom: 8px;
    right: 8px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: gray;
    border: 2px solid #120A1E;
}

/* turn border on avatar */
.avatar.active {
    box-shadow: 0 0 0 3px #4ade80, 0 0 15px #4ade80;
}

.player-name {
    font-size: 13px;
    font-weight: 600;
}

.score-val {
    font-size: 22px;
    color: #FF4B72;
}

.card {
    background: #1D102E;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
    text-align: center;
}

input {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    border-radius: 12px;
    border: 1px solid #3A2359;
    background: #120A1E;
    color: white;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    background: linear-gradient(135deg, #FF4B72, #FF7694);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 600;
}

.floating-emoji {
    position: fixed;
    bottom: 80px;
    font-size: 35px;
    animation: floatUp 2.5s ease-out forwards;
    pointer-events: none;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-250px); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">

<!-- VS -->
<div class="vs-container">

    <div id="box-immu" class="player-box">
        <div class="avatar immu-pic" id="immuAvatar">
            <div class="online-dot" id="immuStatus"></div>
        </div>
        <div class="player-name">immu</div>
        <div id="immuScore" class="score-val">0</div>
    </div>

    <div>VS</div>

    <div id="box-sappii" class="player-box">
        <div class="avatar sappii-pic" id="sappiiAvatar">
            <div class="online-dot" id="sappiiStatus"></div>
        </div>
        <div class="player-name">Sappii</div>
        <div id="sappiiScore" class="score-val">0</div>
    </div>

</div>

<div id="gameContent"></div>

</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyCdhWff4X_XHvoIw_mhFDGRjy9vC4ymFc4",
authDomain: "moviename-26960.firebaseapp.com",
databaseURL: "https://moviename-26960-default-rtdb.firebaseio.com",
projectId: "moviename-26960",
storageBucket: "moviename-26960.appspot.com",
messagingSenderId: "745803258160",
appId: "1:745803258160:web:94974f7633fd84a1f3d0f5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const myName = new URLSearchParams(window.location.search).get('u') || "immu";

/* ---------------- ONLINE STATUS ---------------- */
function setOnlineStatus() {
    const statusRef = db.ref("status/" + myName);

    db.ref(".info/connected").on("value", snap => {
        if (snap.val() === true) {
            statusRef.set("online");
            statusRef.onDisconnect().set("offline");
        }
    });
}

setOnlineStatus();

/* listen status */
db.ref("status").on("value", snap => {
    const data = snap.val() || {};

    updateStatusUI("immu", data.immu);
    updateStatusUI("sappii", data.sappii);
});

function updateStatusUI(user, status) {
    const el = document.getElementById(user + "Status");

    if (!el) return;

    el.style.background = status === "online" ? "#4ade80" : "gray";
}

/* ---------------- TURN UI ---------------- */
db.ref("gameState").on("value", snap => {
    const data = snap.val() || {};

    highlightTurn(data.turn);
    document.getElementById("immuScore").innerText = data.score1 || 0;
    document.getElementById("sappiiScore").innerText = data.score2 || 0;
});

function highlightTurn(turn) {
    const immuBox = document.getElementById("box-immu");
    const sappiiBox = document.getElementById("box-sappii");

    const immuAvatar = document.getElementById("immuAvatar");
    const sappiiAvatar = document.getElementById("sappiiAvatar");

    immuBox.classList.toggle("active-turn", turn === "immu");
    sappiiBox.classList.toggle("active-turn", turn === "sappii");

    immuAvatar.classList.toggle("active", turn === "immu");
    sappiiAvatar.classList.toggle("active", turn === "sappii");
}

/* ---------------- EMOJI ---------------- */
const reactionRef = db.ref("reactions");

function sendReaction(e) {
    reactionRef.push({ emoji: e, time: Date.now() });
}

reactionRef.on("child_added", snap => {
    const d = snap.val();
    if (Date.now() - d.time < 3000) {
        createEmoji(d.emoji);
    }
});

function createEmoji(e) {
    const el = document.createElement("div");
    el.className = "floating-emoji";
    el.innerText = e;
    el.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
}
</script>

</body>
</html>
