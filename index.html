<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immu's Games Hub</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Latha&display=swap');
        
        /* CSS Variables for Dynamic Themes */
        :root {
            --bg-color: #0d0614;
            --card-bg: rgba(29, 16, 46, 0.7);
            --primary-color: #FF4B72;
            --secondary-color: #FF7694;
            --accent-color: #4ade80;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --glow-shadow: rgba(255, 75, 114, 0.4);
        }

        body { 
            background: radial-gradient(circle at top left, #2b1340, var(--bg-color)); 
            background-attachment: fixed;
            color: var(--text-main); 
            font-family: 'Poppins', 'Latha', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow-x: hidden; flex-direction: column; 
            transition: background 0.5s ease; 
        }

        /* NEON BACKGROUND CANVAS */
        #neonCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .container { width: 90%; max-width: 420px; padding: 20px; animation: slideUp 0.6s ease-out forwards; z-index: 1;}
        
        @keyframes slideUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 10px var(--primary-color), inset 0 0 10px var(--primary-color); } 50% { box-shadow: 0 0 25px var(--primary-color), inset 0 0 20px var(--primary-color); } 100% { box-shadow: 0 0 10px var(--primary-color), inset 0 0 10px var(--primary-color); } }
        @keyframes pulseGlowAccent { 0% { box-shadow: 0 0 10px var(--accent-color), inset 0 0 10px var(--accent-color); } 50% { box-shadow: 0 0 25px var(--accent-color), inset 0 0 20px var(--accent-color); } 100% { box-shadow: 0 0 10px var(--accent-color), inset 0 0 10px var(--accent-color); } }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Toast Notification */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: linear-gradient(135deg, var(--accent-color), #22c55e); color: #120A1E; padding: 12px 24px; border-radius: 30px; font-weight: bold; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; box-shadow: 0 10px 25px rgba(0,0,0,0.5); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease; opacity: 0; z-index: 2000; pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Home Page Elements */
        .home-top-bar { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 10px; }
        
        .home-banner-wrapper { position: relative; width: 100%; height: 180px; margin-bottom: 20px; border-radius: 20px; padding: 2px; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); box-shadow: 0 10px 30px var(--glow-shadow); overflow: hidden; transition: all 0.4s ease; cursor: pointer; }
        .home-banner-img { width: 100%; height: 100%; border-radius: 18px; object-fit: cover; opacity: 0.85; transition: 0.4s ease; filter: contrast(1.1); }
        .home-banner-wrapper:hover { box-shadow: 0 15px 40px var(--glow-shadow); transform: translateY(-3px); }
        .home-banner-wrapper:hover .home-banner-img { opacity: 1; transform: scale(1.05); }

        .app-title { text-align: center; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Poppins', sans-serif; font-size: 36px; margin-bottom: 5px; font-weight: 800; filter: drop-shadow(0px 5px 10px var(--glow-shadow)); text-transform: uppercase; letter-spacing: 2px;}
        .app-subtitle { text-align: center; color: var(--text-muted); font-size: 10px; margin-bottom: 35px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;}
        
        .game-menu-btn { width: 100%; padding: 22px; margin-bottom: 15px; background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid var(--border-color); border-radius: 16px; color: var(--text-main); font-weight: 600; cursor: pointer; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border-left: 4px solid var(--primary-color); }
        .game-menu-btn:hover { transform: translateY(-5px); box-shadow: 0 15px 35px var(--glow-shadow); border-left: 8px solid var(--primary-color); background: rgba(255,255,255,0.05);}
        .game-menu-btn.blue { border-left: 4px solid var(--accent-color); }
        .game-menu-btn.blue:hover { box-shadow: 0 15px 35px rgba(74, 222, 128, 0.3); border-left: 8px solid var(--accent-color); }
        .game-menu-btn.purple { border-left: 4px solid #d946ef; }
        .game-menu-btn.purple:hover { box-shadow: 0 15px 35px rgba(217, 70, 239, 0.3); border-left: 8px solid #d946ef; }
        
        /* SLEEK TOP NAV */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .back-btn { background: transparent; border: none; color: var(--text-muted); font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: 0.2s; padding: 2px 0; opacity: 0.6;}
        .back-btn:hover { opacity: 1; color: var(--text-main); transform: translateX(-3px); }
        .back-btn svg { width: 10px; height: 10px; }
        .game-title-text { font-size: 12px; font-weight: 800; letter-spacing: 4px; color: var(--accent-color); text-transform: uppercase; text-shadow: 0 0 15px rgba(74, 222, 128, 0.3); margin:0;}
        
        /* SLEEK THEME BUTTON */
        .theme-btn { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--border-color); border-radius: 30px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; padding: 6px 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);}
        .theme-btn:hover { border-color: var(--primary-color); box-shadow: 0 5px 20px var(--glow-shadow); transform: translateY(-2px);}
        .theme-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--primary-color); box-shadow: 0 0 10px var(--primary-color); transition: background 0.5s ease; }
        .theme-label { font-size: 9px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; }

        /* VS Scoreboard */
        .vs-container { display: flex; justify-content: space-around; align-items: center; margin-bottom: 20px; }
        .player-box { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--border-color); text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; width: 90px; padding: 15px 10px; border-radius: 20px; transition: all 0.4s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.3);}
        .active-turn { animation: pulseGlow 2s infinite; border: 1px solid var(--primary-color); transform: scale(1.05); }
        .racing-turn { animation: pulseGlowAccent 2s infinite; border: 1px solid var(--accent-color); transform: scale(1.05); }
        
        /* Avatars */
        .avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--border-color); background-size: cover; background-position: center; background-color: #1D102E; transition: 0.3s; }
        .immu-pic { background-image: url('1000242624.jpg'); } 
        .sappii-pic { background-image: url('1000242625.jpg'); } 
        .active-turn .sappii-pic { border-color: var(--primary-color); }
        .active-turn .immu-pic { border-color: var(--primary-color); }
        .racing-turn .avatar { border-color: var(--accent-color); }
        
        .name-container { display: flex; align-items: center; gap: 6px; margin-top: 5px;}
        .status-dot { width: 6px; height: 6px; border-radius: 50%; border: 2px solid var(--card-bg); transition: background-color 0.3s; box-shadow: 0 0 5px rgba(0,0,0,0.5);}
        .online { background-color: #4ade80; box-shadow: 0 0 10px #4ade80;} 
        .offline { background-color: #555; } 
        .player-name { font-size: 11px; font-weight: 800; color: var(--text-main); letter-spacing: 1px; text-transform: uppercase;}
        .score-val { font-size: 24px; font-weight: 800; color: var(--primary-color); text-shadow: 0 2px 10px var(--glow-shadow); }
        .vs-badge { font-size: 10px; font-weight: 800; color: var(--text-muted); letter-spacing: 2px;}

        /* Cards & Inputs */
        .card { background: var(--card-bg); backdrop-filter: blur(15px); border-radius: 20px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; border: 1px solid var(--border-color); margin-bottom: 20px; transition: 0.5s ease; position: relative; overflow: hidden;}
        
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--border-color); background-color: rgba(0,0,0,0.3); color: var(--text-main); box-sizing: border-box; font-family: inherit; font-size: 12px; font-weight: 600; text-align: center; transition: all 0.3s ease; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); letter-spacing: 1px; text-transform: uppercase;}
        input:focus { outline: none; border-color: var(--primary-color); box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 0 15px var(--glow-shadow); background-color: rgba(0,0,0,0.5);}
        input::placeholder { color: #666; font-weight: 600;}
        
        .letter-box { font-size: 26px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-color); text-shadow: 0 0 15px rgba(74, 222, 128, 0.4);}
        .order-btn { background: rgba(0,0,0,0.3); border: 1px solid var(--accent-color); color: var(--accent-color); margin: 6px 0; padding: 15px; border-radius: 12px;}
        .order-btn:hover { background: rgba(74, 222, 128, 0.1); transform: scale(1.02); }

        button { width: 100%; padding: 16px; margin-top: 15px; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); border: none; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s ease; box-shadow: 0 5px 15px var(--glow-shadow);}
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--glow-shadow); }
        button:active { transform: scale(0.96); }
        
        .random-btn { background: rgba(74, 222, 128, 0.05); border: 1px dashed var(--accent-color); color: var(--accent-color); margin: 0 0 10px 0; padding: 12px; font-size: 10px; width: 100%; box-shadow: none; }
        .random-btn:hover { background: rgba(74, 222, 128, 0.15); box-shadow: 0 0 15px rgba(74, 222, 128, 0.3); }
        .give-up-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); box-shadow: none; margin-top: 10px; }
        .give-up-btn:hover { background: rgba(255,255,255,0.05); box-shadow: none; border-color: white; color: white;}
        
        .manual-point-btn { background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); margin-top: 10px; padding: 12px; font-size: 10px; width: 100%; box-shadow: none; border-radius: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: 0.3s;}
        .manual-point-btn:hover { background: rgba(74, 222, 128, 0.15); box-shadow: 0 0 15px rgba(74, 222, 128, 0.3); }

        .reset-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); box-shadow: none; margin-top: 20px; font-size: 9px; padding: 8px 15px; width: auto; border-radius: 20px;}
        .reset-btn:hover { background: rgba(255, 75, 114, 0.1); border-color: var(--primary-color); color: var(--primary-color); box-shadow: 0 0 15px var(--glow-shadow); }

        /* PERFECT MASKING VIEW - Tamil Native Format */
        .masked-container { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; margin: 15px 0 20px 0; line-height: 1.6; font-family: 'Latha', sans-serif;}
        .mask-word { display: flex; gap: 6px; margin-bottom: 8px;}
        .mask-space { width: 15px; }
        .mask-char { color: var(--text-main); font-size: 28px; font-weight: 800; text-shadow: 0 0 15px rgba(255,255,255,0.4); font-family: 'Latha', sans-serif;}
        .mask-dash { color: var(--accent-color); font-size: 28px; font-weight: 800; text-shadow: 0 0 15px rgba(74, 222, 128, 0.4); font-family: 'Latha', sans-serif;}

        .letter-count { font-size: 9px; font-weight: 800; background: rgba(74, 222, 128, 0.1); color: var(--accent-color); display: inline-block; padding: 4px 12px; border-radius: 8px; border: 1px solid var(--accent-color); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 20px;}
        .preview-text { color: var(--accent-color); font-size: 20px; font-weight: 800; margin: 5px 0 15px 0; min-height: 30px; font-family: 'Latha', sans-serif; opacity: 0.9;}
        .hint-text { background: rgba(255, 75, 114, 0.1); color: var(--primary-color); font-weight: 800; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 15px; padding: 6px 15px; border-radius: 8px; display: inline-block; border: 1px solid rgba(255, 75, 114, 0.3);}

        /* MUSIC LOUNGE ELEMENTS */
        .vinyl-container { width: 120px; height: 120px; margin: 0 auto 20px auto; border-radius: 50%; border: 4px solid var(--primary-color); padding: 5px; box-shadow: 0 0 25px var(--glow-shadow); position: relative; display: flex; justify-content: center; align-items: center; background: #111; }
        .vinyl-record { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 10px solid #000; box-sizing: border-box; }
        .vinyl-container::after { content: ''; position: absolute; width: 20px; height: 20px; background: var(--bg-color); border: 2px solid var(--primary-color); border-radius: 50%; z-index: 2; }
        .spin-anim { animation: spin 4s linear infinite; }
        .music-controls { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .music-btn { width: auto; padding: 12px 25px; margin-top: 0; border-radius: 30px; font-size: 11px; }
        .music-btn.play { background: linear-gradient(135deg, var(--accent-color), #22c55e); color: #120A1E; box-shadow: 0 5px 15px rgba(74, 222, 128, 0.4); }
        .music-btn.sync { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); box-shadow: none; }
        .music-btn.sync:hover { background: rgba(255,255,255,0.05); color: white; border-color: white; }

        .hidden { display: none !important; }
        .turn-indicator { font-size: 9px; color: var(--accent-color); font-weight: 800; margin-top: 8px; text-transform: uppercase; letter-spacing: 1.5px;}

        /* Modern Chat Box */
        .chat-container { text-align: left; padding: 20px; position: relative;}
        .chat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .chat-header h3 { margin: 0; color: var(--text-main); font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8;}
        
        .typing-indicator { font-size: 10px; color: var(--accent-color); font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; animation: blink 1.5s infinite; margin-left: 10px; margin-bottom: 8px; display: block;}

        .chat-messages { height: 220px; overflow-y: auto; padding: 15px 10px; border: 1px solid var(--border-color); border-radius: 12px; background: rgba(0,0,0,0.2); margin-bottom: 5px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;}
        
        .message { padding: 10px 14px; max-width: 75%; display: flex; flex-direction: column; position: relative; animation: slideUp 0.3s ease-out; box-shadow: 0 4px 15px rgba(0,0,0,0.2);}
        .message-sender { font-size: 8px; font-weight: 800; margin-bottom: 4px; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between;}
        .message-text { font-size: 12px; line-height: 1.4; word-wrap: break-word; font-weight: 600;}
        
        /* Copy & Delete Action Buttons */
        .msg-actions { display: inline-flex; gap: 8px; }
        .msg-action-btn { background: none; border: none; cursor: pointer; font-size: 11px; opacity: 0.5; transition: 0.2s; padding: 0; width: auto; margin: 0; box-shadow: none; color: white; display: inline-block;}
        .msg-action-btn:hover { opacity: 1; transform: scale(1.2); background: transparent; box-shadow: none;}

        .my-message { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); align-self: flex-end; color: #fff; border-radius: 16px 16px 0 16px; }
        .partner-message { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border: 1px solid var(--border-color); align-self: flex-start; color: var(--text-main); border-radius: 16px 16px 16px 0; }
        
        .system-message { background: rgba(74, 222, 128, 0.05); color: var(--accent-color); align-self: center; text-align: center; border: 1px solid rgba(74, 222, 128, 0.3); border-radius: 12px; padding: 8px 15px; max-width: 90%; text-transform: uppercase; letter-spacing: 1px;}
        
        /* Chat Inputs */
        .chat-input-group { display: flex; gap: 10px; align-items: center; position: relative; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 25px; padding: 4px 4px 4px 10px;}
        .chat-input { margin: 0; text-align: left; background: transparent; border: none; padding: 10px 0; box-shadow: none; font-size: 12px; text-transform: none; font-weight: 600;}
        .chat-input:focus { box-shadow: none; background: transparent;}
        .chat-btn-group { display: flex; gap: 5px; width: auto; align-items: center;}
        
        .chat-icon-btn { background: none; border: none; color: var(--text-muted); width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; padding: 0; box-shadow: none; margin-top: 0;}
        .chat-icon-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .chat-send-btn { width: auto; padding: 10px 16px; margin-top: 0; border-radius: 20px; font-size: 10px; box-shadow: 0 4px 15px var(--glow-shadow);}

        /* Emoji Picker */
        .emoji-picker { position: absolute; bottom: 120%; left: 0; width: 100%; max-width: 260px; background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border-color); border-radius: 16px; padding: 15px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; overflow-y: auto; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.6); animation: slideUp 0.2s ease-out;}
        .emoji-item { font-size: 20px; background: none; border: none; width: auto; padding: 5px; cursor: pointer; transition: 0.2s; box-shadow: none; margin: 0;}
        .emoji-item:hover { transform: scale(1.3); }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0, 0.85); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box;}
        .modal-content { background: var(--card-bg); backdrop-filter: blur(20px); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid var(--border-color); width: 100%; max-width: 320px; box-shadow: 0 15px 50px rgba(0,0,0,0.6); animation: slideUp 0.3s ease-out;}
        .modal-btn-group { display: flex; gap: 10px; margin-top: 25px; }
        .btn-cancel { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); margin-top: 15px; padding: 12px; border-radius: 12px; box-shadow: none; font-size:11px;}
        .btn-cancel:hover { background: rgba(255,255,255,0.05); color: white; border-color: white;}

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }
    </style>
</head>
<body>

<canvas id="neonCanvas"></canvas>

<audio id="sharedAudio" src="song.mp3" preload="auto"></audio>

<div id="toast" class="toast">NEW MESSAGE</div>

<div class="container" id="homeScreen">
    <div class="home-top-bar">
        <div class="theme-wrapper">
            <button id="themeSwitcher" class="theme-btn" onclick="cycleTheme()" title="Change Theme">
                <div id="themeIndicator" class="theme-dot"></div>
                <span class="theme-label">THEME</span>
            </button>
        </div>
    </div>

    <div class="home-banner-wrapper">
        <img src="1000243508.jpg" alt="Banner" class="home-banner-img" onerror="this.style.display='none'">
    </div>

    <h1 class="app-title">IMMU'S HUB</h1>
    <p class="app-subtitle">CHOOSE YOUR ARENA</p>
    
    <div class="card" style="padding: 35px 20px;">
        <button class="game-menu-btn" onclick="openGame('movie')">MOVIE GUESSING</button>
        <button class="game-menu-btn blue" onclick="openGame('word')">WORD RACE</button>
        <button class="game-menu-btn purple" onclick="openGame('music')">MUSIC LOUNGE 🎧</button>
    </div>
</div>

<div class="container hidden" id="sharedUIContainer">
    <div class="top-nav">
        <button class="back-btn" onclick="goHome()">BACK</button>
        <h2 id="activeGameBadge" class="game-title-text">GAME</h2>
    </div>

    <div class="vs-container" id="vsScoreBoard">
        <div id="box-immu" class="player-box">
            <div class="avatar immu-pic"></div>
            <div class="name-container">
                <span id="status-immu" class="status-dot offline"></span>
                <div class="player-name">IMMU</div>
            </div>
            <div id="immuScore" class="score-val">0</div>
            <div id="turn-immu" class="turn-indicator hidden"></div>
        </div>
        
        <div class="vs-badge">VS</div>
        
        <div id="box-sappii" class="player-box">
            <div class="avatar sappii-pic"></div>
            <div class="name-container">
                <span id="status-sappii" class="status-dot offline"></span>
                <div class="player-name">SAPPII</div>
            </div>
            <div id="sappiiScore" class="score-val">0</div>
            <div id="turn-sappii" class="turn-indicator hidden"></div>
        </div>
    </div>

    <datalist id="movieList"></datalist>
    <div id="gameContentArea"></div>

    <div class="chat-container card">
        <div class="chat-header">
            <h3>REAL-TIME CHAT</h3>
        </div>
        <div id="chatMessages" class="chat-messages"></div>

        { vars: { '--bg-color': '#0a0a0a', '--card-bg': 'rgba(20, 20, 20, 0.8)', '--primary-color': '#FF003C', '--secondary-color': '#D9002E', '--accent-color': '#00FF41', '--border-color': 'rgba(255, 255, 255, 0.08)' } },

    // --- 🌌 NEON BACKGROUND PARTICLES ENGINE ---
    const canvas = document.getElementById('neonCanvas');
    const ctx = canvas.getContext('2d');
    let particlesArray = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initParticles();
    }
    window.addEventListener('resize', resizeCanvas);
    
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 1;
            this.speedX = Math.random() * 0.4 - 0.2;
            this.speedY = Math.random() * 0.4 - 0.2;
            this.colorType = Math.random() > 0.5 ? 1 : 2;
            this.opacity = Math.random() * 0.5 + 0.1;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;

            if (this.x < 0) this.x = canvas.width;
            if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height;
            if (this.y > canvas.height) this.y = 0;
        }
        draw() {
            ctx.globalAlpha = this.opacity;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            let color = this.colorType === 1 ? particleColor1 : particleColor2;
            ctx.fillStyle = color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = color;
            ctx.fill();
            ctx.globalAlpha = 1; 
        }
    }

    function initParticles() {
        particlesArray = [];
        let numberOfParticles = (canvas.width * canvas.height) / 12000;
        if (numberOfParticles > 60) numberOfParticles = 60;
        for (let i = 0; i < numberOfParticles; i++) {
            particlesArray.push(new Particle());
        }
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particlesArray.length; i++) {
            particlesArray[i].update();
            particlesArray[i].draw();
        }
        requestAnimationFrame(animateParticles);
    }
    
    resizeCanvas(); 
    animateParticles(); 

    // --- 🚨 ANTI-CHEAT SYSTEM ---
    let cheatCooldown = false;
    document.addEventListener("visibilitychange", () => {
        if (document.hidden && !cheatCooldown) {
            const isMovieGuessing = (activeGame === 'movie' && gameState.status === 'guessing' && gameState.turn !== myName);
            const isWordRacing = (activeGame === 'word' && wordGameState.status === 'race_phase');
            if (isMovieGuessing || isWordRacing) {
                db.ref('chatMessages').push({ sender: "SYSTEM", text: `🚨 ${myName.toUpperCase()} LEFT THE APP (SEARCHING GOOGLE?) 👀`, timestamp: firebase.database.ServerValue.TIMESTAMP });

            }
        }

    // --- TYPING INDICATOR ---
    let typingTimer;
    document.getElementById('chatInput').addEventListener('input', () => {
        db.ref(`typingStatus/${myName}`).set(true);
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => { db.ref(`typingStatus/${myName}`).set(false); }, 1500);
    });

    db.ref(`typingStatus/${partnerName}`).on('value', (snapshot) => {
        const isTyping = snapshot.val();
        const indicator = document.getElementById('typingIndicator');
        if (isTyping) {
            indicator.innerText = `${partnerName.toUpperCase()} IS TYPING...`;
            indicator.classList.remove('hidden');
        } else {
            indicator.classList.add('hidden');
        }
    });

    // --- AUTO-SWAP TXT LOADER ---
    async function loadMoviesFromTXT() {
        MOVIE_COLLECTION = []; 
        try {
            const cacheBuster = "?v=" + new Date().getTime();
            const engRes = await fetch('movies_eng.txt' + cacheBuster);
            const tamilRes = await fetch('movies_tamil.txt' + cacheBuster);
            const heroRes = await fetch('heroes.txt' + cacheBuster);
            
            if (engRes.ok && tamilRes.ok) {
                let eLines = (await engRes.text()).split('\n').map(l => l.replace(/\r/g, '').trim());
                let tLines = (await tamilRes.text()).split('\n').map(l => l.replace(/\r/g, '').trim());
                let hLines = [];
                if (heroRes.ok) {
                    hLines = (await heroRes.text()).split('\n').map(l => l.replace(/\r/g, '').trim());
                }
                
                // AUTO FIX
                if (eLines.length > 0 && /[\u0B80-\u0BFF]/.test(eLines[0])) {
                    let temp = eLines;
                    eLines = tLines;
                    tLines = temp;
                }
                
                const minLen = Math.min(eLines.length, tLines.length);
                for(let i=0; i<minLen; i++){
                    if(eLines[i] && tLines[i]) {
                        MOVIE_COLLECTION.push({ eng: eLines[i], tamil: tLines[i], hero: hLines[i] || "" });
                    }
                }
            }
        } catch (error) { console.error("TXT Load Error:", error); }

        const list = document.getElementById('movieList');
        list.innerHTML = "";
        MOVIE_COLLECTION.forEach(m => {
            const option = document.createElement('option'); option.value = m.eng; list.appendChild(option);
        });
    }

    window.onload = () => {
        loadMoviesFromTXT();
        const picker = document.getElementById('emojiPicker');
        const emojis = ['❤️', '🔥', '😂', '🥺', '👍', '👎', '✨', '💀', '💯', '👏'];
        emojis.forEach(emoji => {
            const btn = document.createElement('button');
            btn.className = 'emoji-item'; btn.innerText = emoji;
            btn.onclick = () => { document.getElementById('chatInput').value += emoji; document.getElementById('chatInput').focus(); document.getElementById('emojiPicker').classList.add('hidden'); };

        document.getElementById('sharedUIContainer').classList.remove('hidden');

        document.getElementById('sharedUIContainer').classList.add('hidden');
        document.getElementById('homeScreen').classList.remove('hidden');
    }

    // --- DB LISTENERS ---
    db.ref('gameState').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        
        let dbEng = data.movieEng || "";
        let finalTamil = data.movieTamil || "";
        let finalHint = data.hint || "";

        if (dbEng !== "" && MOVIE_COLLECTION.length > 0) {
            const match = MOVIE_COLLECTION.find(m => m.eng.toLowerCase() === dbEng.toLowerCase());
            if (match) { finalTamil = match.tamil; }
        }

        gameState = { turn: data.turn || "immu", status: data.status || "set", score1: data.score1 || 0, score2: data.score2 || 0, movieEng: dbEng, movieTamil: finalTamil, hint: finalHint };
        if(activeGame === 'movie') renderMovieGameUI();
    });

    // --- MUSIC SYNC LISTENER ---
    const audioEl = document.getElementById('sharedAudio');

    db.ref('musicState').on('value', (snapshot) => {
        const data = snapshot.val() || {};

        if (musicStateObj.url !== audioEl.src && !audioEl.src.includes(musicStateObj.url)) {
            audioEl.src = musicStateObj.url;

    function renderMovieGameUI() {
        const container = document.getElementById('gameContentArea');

        if (gameState.status === "set") {
            if (gameState.turn === myName) {

                container.innerHTML = `
                    <div class="card">
                        <h3 style="margin-top:0; font-size:13px; text-transform:uppercase; letter-spacing:2px; color:var(--text-muted);">PARTNER GUESSING</h3>
                        ${maskExactString(gameState.movieTamil)}

                        <hr style="border:0; border-top:1px solid var(--border-color); margin: 20px 0;">
                        <p style="font-size:9px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px;">IF PARTNER MADE A SPELLING MISTAKE:</p>
                        <button class="manual-point-btn" onclick="awardManualPoint()">GIVE POINT & NEXT TURN</button>
                    </div>`;
            } else {
                container.innerHTML = `
                    <div class="card">
                        <h3 style="margin-top:0; font-size:13px; text-transform:uppercase; letter-spacing:2px; color:var(--text-main);">GUESS THE MOVIE</h3>
                        ${maskExactString(gameState.movieTamil)}
                        <div class="letter-count">${letterCount} LETTERS</div>
                        ${gameState.hint ? `<div class="hint-text">HINT: ${gameState.hint}</div>` : ''}
                        <input type="text" id="guessInput" placeholder="TYPE ANSWER IN ENGLISH">
                        <button onclick="checkGuess()">SUBMIT ANSWER</button>
                        <button class="give-up-btn" onclick="giveUp()">GIVE UP</button>
                        <p id="feedback" style="margin-top:15px; font-weight:800; font-size:11px; text-transform:uppercase; letter-spacing:1px;"></p>
                    </div>`;
            }
        }
    }

    function awardManualPoint() {
        const partnerScoreKey = (myName === "immu") ? 'score2' : 'score1';
        db.ref(`gameState/${partnerScoreKey}`).transaction(s => (s || 0) + 1);
        db.ref('gameState').update({ turn: partnerName, status: "set", movieEng: "", movieTamil: "", hint: "" });
        db.ref('chatMessages').push({ sender: "SYSTEM", text: `${myName.toUpperCase()} GAVE A MANUAL POINT TO ${partnerName.toUpperCase()}!`, timestamp: firebase.database.ServerValue.TIMESTAMP });
    }

    function handleMovieInput() {
        const val = document.getElementById('movieInput').value.trim().toLowerCase();
        const foundMovie = MOVIE_COLLECTION.find(m => m.eng.toLowerCase() === val);
        if(foundMovie) { 
            if(foundMovie.hero) { document.getElementById('hintInput').value = foundMovie.hero.toUpperCase(); } 
            else { document.getElementById('hintInput').value = ""; }
            document.getElementById('tamilPreview').innerText = foundMovie.tamil;
        } else {
            document.getElementById('tamilPreview').innerText = "Select from list!";
        }
    }
    
    function suggestRandomMovie() { 
        if (MOVIE_COLLECTION.length === 0) return alert("Movie list loading... wait 2 seconds!");
        const randomObj = MOVIE_COLLECTION[Math.floor(Math.random() * MOVIE_COLLECTION.length)];
        document.getElementById('movieInput').value = randomObj.eng; 
        if(randomObj.hero) { document.getElementById('hintInput').value = randomObj.hero.toUpperCase(); } 
        else { document.getElementById('hintInput').value = "GUESS THE HERO!"; }
        document.getElementById('tamilPreview').innerText = randomObj.tamil; 
    }
    
    function setMovie() { 
        const rawEng = document.getElementById('movieInput').value.trim(); 
        const h = document.getElementById('hintInput').value; 
        if(!rawEng) return alert("ENTER MOVIE!"); 
        const foundMovie = MOVIE_COLLECTION.find(m => m.eng.toLowerCase() === rawEng.toLowerCase());
        if (!foundMovie) { return alert("PLEASE SELECT A MOVIE EXACTLY FROM THE DROPDOWN LIST!"); }
        db.ref('gameState').update({ movieEng: foundMovie.eng, movieTamil: foundMovie.tamil, hint: h, status: "guessing" }); 
    }
    
    function checkGuess() { 
        const guessRaw = document.getElementById('guessInput').value.trim().toLowerCase(); 
        const normalizedGuess = guessRaw.replace(/[^a-z0-9]/g, '');
        const normalizedAnswer = (gameState.movieEng || "").replace(/[^a-z0-9]/g, '');

        if (normalizedGuess === normalizedAnswer && normalizedGuess !== "") { 
            const scoreKey = (myName === "immu") ? 'score1' : 'score2'; 
            db.ref(`gameState/${scoreKey}`).transaction(s => (s || 0) + 1); 
            db.ref('gameState').update({ turn: myName, status: "set", movieEng: "", movieTamil: "" }); 
        } else { 
            document.getElementById('feedback').innerText = "WRONG SPELLING! TRY AGAIN"; 
            document.getElementById('feedback').style.color = "var(--primary-color)";
        } 
    }
    
    function giveUp() { 
        document.getElementById('feedback').innerText = "ANSWER: " + (gameState.movieEng || "").toUpperCase(); 
        document.getElementById('feedback').style.color = "var(--accent-color)";
        const partnerScoreKey = (myName === "immu") ? 'score2' : 'score1'; 
        db.ref(`gameState/${partnerScoreKey}`).transaction(s => (s || 0) + 1); 
        setTimeout(() => db.ref('gameState').update({ turn: myName, status: "set", movieEng: "", movieTamil: "" }), 2500); 
    }
    
    function getLetterCountExact(str) {
        if (!str) return 0;
        let segments = [];
        if (window.Intl && Intl.Segmenter) {
            const segmenter = new Intl.Segmenter('ta-IN', { granularity: 'grapheme' });
            segments = Array.from(segmenter.segment(str)).map(s => s.segment);
        } else {
            segments = str.split(''); 
        }
        return segments.filter(c => c.trim() !== '').length;
    }

    function maskExactString(str) {
        if (!str) return "";
        let html = `<div style="display:flex; flex-direction:column; align-items:center; gap:8px; line-height: 1.6; margin-bottom: 20px;">`;
        let segments = [];
        if (window.Intl && Intl.Segmenter) {
            const segmenter = new Intl.Segmenter('ta-IN', { granularity: 'grapheme' });
            segments = Array.from(segmenter.segment(str)).map(s => s.segment);
        } else { segments = str.split(''); }

        let firstIdx = -1; let lastIdx = -1;
        for (let i = 0; i < segments.length; i++) {
            if (segments[i].trim() !== '') {
                if (firstIdx === -1) firstIdx = i;
                lastIdx = i;
            }
        }
        if (firstIdx === -1) return `<span class="mask-dash">_</span>`;

        let wordHtml = `<div style="display:flex; gap:6px; flex-wrap:wrap; justify-content:center;">`;
        segments.forEach((char, idx) => {
            if (char.trim() === '') {
                wordHtml += `</div><div style="width:15px; height:5px;"></div><div style="display:flex; gap:6px;">`;
            } else if (idx === firstIdx || idx === lastIdx) {
                wordHtml += `<span class="mask-char" style="color:var(--text-main); font-size:30px; font-weight:800; text-shadow: 0 0 15px rgba(255,255,255,0.4); font-family: 'Latha', sans-serif;">${char}</span>`;
            } else {
                wordHtml += `<span class="mask-dash" style="color:var(--accent-color); font-size:30px; font-weight:800; text-shadow: 0 0 15px rgba(74, 222, 128, 0.4); font-family: 'Latha', sans-serif;">_</span>`;
            }
        });

        wordHtml += `</div>`; html += wordHtml + `</div>`;
        return html;
    }

    // ================= WORD GAME LOGIC (WITH API CHECK) =================
    function renderWordGameUI() {
        const container = document.getElementById('gameContentArea');
        document.getElementById('immuScore').innerText = wordGameState.score1;
        document.getElementById('sappiiScore').innerText = wordGameState.score2;
        
        document.getElementById('box-immu').className = `player-box racing-turn`;
        document.getElementById('box-sappii').className = `player-box racing-turn`;
        document.getElementById('turn-immu').innerText = wordGameState.status === 'race_phase' ? 'RACING' : 'THINKING';
        document.getElementById('turn-sappii').innerText = wordGameState.status === 'race_phase' ? 'RACING' : 'THINKING';
        document.getElementById('turn-immu').classList.remove('hidden');
        document.getElementById('turn-sappii').classList.remove('hidden');

        if (wordGameState.status === "letter_phase") {
            const myLetter = (myName === 'immu') ? wordGameState.p1Letter : wordGameState.p2Letter;
            const partnerLetter = (myName === 'immu') ? wordGameState.p2Letter : wordGameState.p1Letter;

            if (!myLetter) {
                container.innerHTML = `
                    <div class="card">
                        <h3 style="margin-top:0; font-size:13px; text-transform:uppercase; letter-spacing:2px; color:var(--text-main);">YOUR LETTER?</h3>
                        <p style="color:var(--text-muted); font-size: 9px; text-transform:uppercase; letter-spacing:1px;">TYPE ONE ENGLISH LETTER (A-Z)</p>
                        <input type="text" id="letterInput" maxlength="1" placeholder="E.G. S OR K" class="letter-box">
                        <button onclick="submitLetter()">SEND LETTER</button>
                    </div>`;
            } else if (!partnerLetter) {
                container.innerHTML = `
                    <div class="card">
                        <h3 style="margin-top:0; font-size:13px; text-transform:uppercase; letter-spacing:2px;">WAITING...</h3>
                        <p style="font-size: 10px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);">${partnerName} IS CHOOSING A LETTER</p>
                        <p style="font-size: 20px; color: var(--accent-color); font-weight:800; margin-top:15px; letter-spacing:2px;">YOU PICKED: ${myLetter.toUpperCase()}</p>
                    </div>`;
            } else {
                container.innerHTML = `
                    <div class="card">
                        <h3 style="color:var(--accent-color); margin-top:0; font-size:13px; letter-spacing:2px;">LETTERS READY!</h3>
                        <p style="font-size:9px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:15px;">FIRST LETTER ETHU, LAST LETTER ETHU?</p>
                        <button class="order-btn" onclick="setWordOrder('${wordGameState.p1Letter}', '${wordGameState.p2Letter}')">
                            START: <b style="color:white; font-size:16px;">${wordGameState.p1Letter.toUpperCase()}</b> &nbsp;|&nbsp; END: <b style="color:white; font-size:16px;">${wordGameState.p2Letter.toUpperCase()}</b>
                        </button>
                        <button class="order-btn" onclick="setWordOrder('${wordGameState.p2Letter}', '${wordGameState.p1Letter}')">
                            START: <b style="color:white; font-size:16px;">${wordGameState.p2Letter.toUpperCase()}</b> &nbsp;|&nbsp; END: <b style="color:white; font-size:16px;">${wordGameState.p1Letter.toUpperCase()}</b>
                        </button>
                    </div>`;
            }
        } else if (wordGameState.status === "race_phase") {
            container.innerHTML = `
                <div class="card" style="border-color:var(--accent-color); box-shadow: 0 0 30px rgba(74, 222, 128, 0.15);">
                    <h3 style="margin-top:0; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:var(--text-main);">FORM A WORD!</h3>
                    <p style="font-size: 10px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted);">STARTS WITH <b class="letter-box" style="font-size: 24px; margin:0 5px;">${wordGameState.startLetter.toUpperCase()}</b> & ENDS WITH <b class="letter-box" style="font-size: 24px; margin:0 5px;">${wordGameState.endLetter.toUpperCase()}</b></p>
                    <input type="text" id="raceWordInput" placeholder="TYPE A VALID WORD..." style="font-size: 14px; font-weight: bold; text-transform: uppercase;">
                    <button onclick="submitRaceWord()" style="background: linear-gradient(135deg, var(--accent-color), #22c55e); color: #120A1E;">SUBMIT FAST</button>
                    <button class="give-up-btn" onclick="skipWord()">SKIP ROUND</button>
                    <p id="raceFeedback" style="margin-top:15px; color:var(--primary-color); font-weight:800; font-size:11px; text-transform:uppercase; letter-spacing:1px;"></p>
                </div>`;
        }
    }

    function submitLetter() {
        const letter = document.getElementById('letterInput').value.trim().toLowerCase();
        if(!letter || letter.length > 1 || !/[a-z]/.test(letter)) return alert("PLEASE ENTER EXACTLY 1 ENGLISH LETTER (A-Z)!");
        const letterKey = (myName === "immu") ? 'p1Letter' : 'p2Letter';
        db.ref(`wordGameState`).update({ [letterKey]: letter });
    }

    function setWordOrder(start, end) { db.ref('wordGameState').update({ status: "race_phase", startLetter: start, endLetter: end }); }

    async function submitRaceWord() {
        const word = document.getElementById('raceWordInput').value.trim().toLowerCase();
        const start = wordGameState.startLetter.toLowerCase(); const end = wordGameState.endLetter.toLowerCase();
        
        if (word.length < 2 || !word.startsWith(start) || !word.endsWith(end)) {
            document.getElementById('raceFeedback').innerText = `WORD MUST START WITH ${start.toUpperCase()} AND END WITH ${end.toUpperCase()}!`;
            return;
        }

        if (wordGameState.usedWords && wordGameState.usedWords[word]) {
            document.getElementById('raceFeedback').innerText = `ALREADY USED! FIND A NEW WORD.`;
            return;
        }

        document.getElementById('raceFeedback').innerText = `CHECKING DICTIONARY... ⏳`;
        document.getElementById('raceFeedback').style.color = "var(--text-main)";

        try {
            const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
            if (!res.ok) {
                document.getElementById('raceFeedback').innerText = `NOT A VALID ENGLISH WORD!`;
                document.getElementById('raceFeedback').style.color = "var(--primary-color)";
                return;
            }
        } catch (e) {}

        const scoreKey = (myName === "immu") ? 'score1' : 'score2';
        db.ref(`wordGameState/${scoreKey}`).transaction(s => (s || 0) + 1);
        db.ref(`wordGameState/usedWords/${word}`).set(true); 
        db.ref('wordGameState').update({ status: "letter_phase", p1Letter: "", p2Letter: "", startLetter: "", endLetter: "" });
        db.ref('chatMessages').push({ sender: "SYSTEM", text: `${myName.toUpperCase()} SCORED 1 POINT WITH "${word.toUpperCase()}"!`, timestamp: firebase.database.ServerValue.TIMESTAMP });
    }

    function skipWord() {
        db.ref('wordGameState').update({ status: "letter_phase", p1Letter: "", p2Letter: "", startLetter: "", endLetter: "" });
        db.ref('chatMessages').push({ sender: "SYSTEM", text: `THIS ROUND WAS SKIPPED!`, timestamp: firebase.database.ServerValue.TIMESTAMP });
    }

    // ================= MUSIC LOUNGE LOGIC =================
    function renderMusicUI() {
        const container = document.getElementById('gameContentArea');
        const isSpinning = musicStateObj.isPlaying ? 'spin-anim' : '';
        const playBtnText = musicStateObj.isPlaying ? 'PAUSE' : 'PLAY';
        
        container.innerHTML = `
            <div class="card" style="text-align:center;">
                <div class="vinyl-container">
                    <img src="1000243508.jpg" class="vinyl-record ${isSpinning}">
                </div>
                <h3 style="color:var(--text-main); margin-top:15px; letter-spacing:2px;">COUPLE'S RADIO</h3>
                <p style="font-size:10px; color:var(--accent-color); text-transform:uppercase; letter-spacing:1px; margin-bottom:20px;">
                    ${musicStateObj.isPlaying ? '🎵 Playing in sync' : 'Paused'}
                </p>
                
                <input type="text" id="musicUrl" placeholder="Direct MP3 Link or filename (e.g. song.mp3)" value="${musicStateObj.url}" style="font-size:10px; text-transform:none;">
                <button onclick="changeSong()" style="margin-top:5px; margin-bottom:20px; padding:12px; font-size:10px;">LOAD SONG</button>

                <div class="music-controls">
                    <button class="music-btn play" onclick="togglePlayPause()">${playBtnText}</button>
                    <button class="music-btn sync" onclick="forceSync()">SYNC AUDIO</button>
                </div>
            </div>
        `;
    }

    function togglePlayPause() {
        const newState = !musicStateObj.isPlaying;
        if (newState) {
            audioEl.play().catch(e => alert("Please tap anywhere on screen first to allow audio!"));
        } else {
            audioEl.pause();
        }
        db.ref('musicState').update({ isPlaying: newState, currentTime: audioEl.currentTime, updatedBy: myName, timestamp: Date.now() });
    }

    function changeSong() {
        const newUrl = document.getElementById('musicUrl').value.trim();
        if(!newUrl) return alert("Please enter a valid link or filename!");
        db.ref('musicState').update({ url: newUrl, isPlaying: false, currentTime: 0, updatedBy: myName, timestamp: Date.now() });
    }

    function forceSync() {
        audioEl.currentTime = musicStateObj.currentTime;
        if(musicStateObj.isPlaying) audioEl.play().catch(e=>{});
        showToast("AUDIO SYNCED!");
    }

    // --- RESET MODALS (CHAT CLEARS ON RESET) ---
    function openResetModal() { document.getElementById('resetModal').classList.remove('hidden'); }
    function closeResetModal() { document.getElementById('resetModal').classList.add('hidden'); }
    
    function confirmReset(starter) { 
        db.ref('gameState').set({ turn: starter, status: "set", score1: 0, score2: 0, movieEng: "", movieTamil: "", hint: "" }); 
        db.ref('chatMessages').remove(); // WIPES CHAT HISTORY
        closeResetModal(); 
    }
    
    function confirmResetWord() { 
        db.ref('wordGameState').set({ status: "letter_phase", p1Letter: "", p2Letter: "", startLetter: "", endLetter: "", score1: 0, score2: 0, usedWords: null }); 
        db.ref('chatMessages').remove(); // WIPES CHAT HISTORY
        closeResetModal(); 
    }

    // --- ONLINE STATUS & CHAT & SECRET POWER ---
    db.ref('.info/connected').on('value', (snapshot) => {
        if (snapshot.val() === true) {
            const myPresenceRef = db.ref(`presence/${myName}`);
            myPresenceRef.onDisconnect().set({ online: false, lastSeen: firebase.database.ServerValue.TIMESTAMP });
            myPresenceRef.set({ online: true, lastSeen: firebase.database.ServerValue.TIMESTAMP });
            document.getElementById(`status-${myName}`).className = 'status-dot online';
        }
    });

    db.ref(`presence/${partnerName}`).on('value', (snapshot) => {
        const data = snapshot.val();
        document.getElementById(`status-${partnerName}`).className = data && data.online ? 'status-dot online' : 'status-dot offline';
    });

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg; toast.classList.add('show');
        try { const audio = new Audio("https://actions.google.com/sounds/v1/communication/bubble_pop.ogg"); audio.play(); } catch(e){}
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Copy Message
    function copyMsg(id) {
        const txt = document.getElementById('text-' + id).innerText;
        navigator.clipboard.writeText(txt);
        showToast("COPIED!");
    }

    // Delete Message
    function deleteMsg(id) {
        db.ref('chatMessages/' + id).remove();
        showToast("DELETED!");
    }

    // Handle Chat Wipe in UI real-time
    db.ref('chatMessages').on('value', (snapshot) => {
        if(!snapshot.exists()) {
            document.getElementById('chatMessages').innerHTML = ''; // Clear div if wiped
        }
    });

    let isChatLoaded = false;
    db.ref('chatMessages').once('value', () => { isChatLoaded = true; });

    db.ref('chatMessages').on('child_added', (snapshot) => {
        const data = snapshot.val();
        const msgKey = snapshot.key;
        const chatMessagesDiv = document.getElementById('chatMessages');
        const isMine = data.sender === myName.toUpperCase();
        const isSystem = data.sender === "SYSTEM" || data.sender === "ANTI-CHEAT";
        
        const messageDiv = document.createElement('div');
        messageDiv.id = `msg-${msgKey}`;

        if (isSystem) { 
            messageDiv.className = data.sender === "ANTI-CHEAT" ? 'message cheat-message' : 'message system-message'; 
        } else { 
            messageDiv.className = isMine ? 'message my-message' : 'message partner-message'; 
        }
        
        const time = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        // Copy & Delete Buttons UI
        const copyBtn = `<button class="msg-action-btn" onclick="copyMsg('${msgKey}')" title="Copy">📋</button>`;
        const delBtn = isMine ? `<button class="msg-action-btn" onclick="deleteMsg('${msgKey}')" title="Delete">🗑️</button>` : '';

        messageDiv.innerHTML = `
            <div class="message-sender" style="${isSystem ? 'color:inherit; font-size:10px;' : ''}">
                ${isMine ? 'YOU' : data.sender} (${time})
                ${!isSystem ? `<span class="msg-actions">${copyBtn}${delBtn}</span>` : ''}
            </div>
            <div class="message-text" id="text-${msgKey}">${data.text}</div>
        `;
        
        chatMessagesDiv.appendChild(messageDiv);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;

        if (isChatLoaded && !isMine && !isSystem) { showToast(`NEW MESSAGE FROM ${data.sender}`); }
    });

    // Handle single message deletion in UI
    db.ref('chatMessages').on('child_removed', (snapshot) => {
        const msgDiv = document.getElementById(`msg-${snapshot.key}`);
        if(msgDiv) msgDiv.remove();
    });

    function sendChatMessage() {
        const chatInput = document.getElementById('chatInput');
        const text = chatInput.value.trim();
        if(!text) return;

        // 🔥 IMMU'S SECRET ADMIN POWERS 🔥
        if (myName === 'immu') {
            if (text.startsWith('/add ')) {
                const pts = parseInt(text.replace('/add ', ''));
                if (!isNaN(pts)) {
                    if (activeGame === 'movie') db.ref(`gameState/score1`).transaction(s => (s || 0) + pts);
                    if (activeGame === 'word') db.ref(`wordGameState/score1`).transaction(s => (s || 0) + pts);
                    showToast(`SECRET: +${pts} POINTS ADDED!`);
                }
                chatInput.value = ""; return; 
            }
            if (text.startsWith('/minus ')) {
                const pts = parseInt(text.replace('/minus ', ''));
                if (!isNaN(pts)) {
                    if (activeGame === 'movie') db.ref(`gameState/score2`).transaction(s => (s || 0) - pts);
                    if (activeGame === 'word') db.ref(`wordGameState/score2`).transaction(s => (s || 0) - pts);
                    showToast(`SECRET: -${pts} POINTS TAKEN FROM SAPPII!`);
                }
                chatInput.value = ""; return; 
            }
        }

        db.ref('chatMessages').push({ sender: myName.toUpperCase(), text: text, timestamp: firebase.database.ServerValue.TIMESTAMP });
        chatInput.value = ""; document.getElementById('emojiPicker').classList.add('hidden');
    }

    document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendChatMessage(); });
</script>
</body>
</html>
