<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple Games Hub 💖</title>

    <style>

        .container { width: 90%; max-width: 400px; padding: 20px; }
        
        /* Toast Notification Styling */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #4ade80; color: #120A1E; padding: 12px 24px; border-radius: 20px; font-weight: bold; font-size: 14px; box-shadow: 0 5px 15px rgba(74, 222, 128, 0.4); transition: transform 0.3s ease, opacity 0.3s ease; opacity: 0; z-index: 2000; pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Home Page specific styles */
        .app-title { text-align: center; color: #FF4B72; font-family: 'Poppins', sans-serif; font-size: 28px; text-shadow: 0 0 15px rgba(255, 75, 114, 0.4); margin-bottom: 10px; font-weight: bold;}
        .app-subtitle { text-align: center; color: #aaa; font-size: 13px; margin-bottom: 30px; }
        .game-menu-btn { width: 100%; padding: 20px; margin-bottom: 15px; background: #1D102E; border: 2px solid #FF4B72; border-radius: 15px; color: white; font-weight: 600; cursor: pointer; font-size: 18px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .game-menu-btn:hover { background: rgba(255, 75, 114, 0.1); transform: scale(1.02); }
        .game-menu-btn.blue { border-color: #4ade80; }
        .game-menu-btn.blue:hover { background: rgba(74, 222, 128, 0.1); }
        
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        .back-btn { background: transparent; border: 1px solid #aaa; color: #aaa; padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; width: auto; transition: 0.2s; }
        .back-btn:active { transform: scale(0.95); }
        .game-title-badge { background: #3A2359; padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: 600; color: #FF4B72; }

        /* VS Scoreboard Styling */
        .vs-container { display: flex; justify-content: space-around; align-items: center; margin-bottom: 15px; }
        .player-box { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; width: 90px; padding: 10px; border-radius: 15px; transition: 0.3s;}
        .active-turn { background: rgba(255, 75, 114, 0.15); border: 1px solid #FF4B72; }
        .racing-turn { background: rgba(74, 222, 128, 0.15); border: 1px solid #4ade80; }
        
        /* Custom Avatars */
        .avatar { width: 65px; height: 65px; border-radius: 50%; border: 3px solid #3A2359; background-size: cover; background-position: center; background-color: #1D102E; }
        .immu-pic { background-image: url('1000242624.jpg'); border-color: #4ade80; } 
        .sappii-pic { background-image: url('1000242625.jpg'); border-color: #FF4B72; } 
        
        .name-container { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid #fff; transition: background-color 0.3s; }
        .online { background-color: #4ade80; } 
        .offline { background-color: #aaa; } 

        .player-name { font-size: 13px; font-weight: 600; color: #fff; }
        .score-val { font-size: 24px; font-weight: bold; color: #FF4B72; }
        .vs-badge { background: #3A2359; padding: 6px 12px; border-radius: 50%; font-size: 12px; color: #aaa; }

        .card { background-color: #1D102E; border-radius: 25px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); text-align: center; border: 1px solid #2D1A45; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #3A2359; background-color: #120A1E; color: white; box-sizing: border-box; font-family: inherit; font-size: 14px; text-align: center;}
        
        /* Word Game Input styles */
        .letter-box { font-size: 24px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; color: #4ade80; }
        .order-btn { background: #2D1A45; border: 1px solid #4ade80; color: #4ade80; margin: 5px 0; padding: 12px; }

        button { width: 100%; padding: 15px; margin-top: 10px; background: linear-gradient(135deg, #FF4B72, #FF7694); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; font-size: 16px; transition: 0.2s;}
        button:active { transform: scale(0.98); }
        
        .random-btn { background: transparent; border: 1px dashed #4ade80; color: #4ade80; margin: 0 0 10px 0; padding: 10px; font-size: 13px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .give-up-btn { background: transparent; border: 1px solid #aaa; color: #aaa; margin-top: 10px; }
        .reset-btn { background: transparent; border: 1px solid #FF4B72; color: #FF4B72; margin-top: 20px; font-size: 14px; padding: 10px; width: auto;}

        .masked-word { font-size: 28px; letter-spacing: 5px; margin: 15px 0 5px 0; color: #4ade80; font-weight: bold; font-family: 'Latha', sans-serif; text-shadow: 0 0 10px rgba(74, 222, 128, 0.3); }
        .letter-count { font-size: 12px; color: #aaa; margin-bottom: 20px; font-weight: 600; background: #2D1A45; display: inline-block; padding: 4px 12px; border-radius: 20px; text-transform: uppercase;}
        .preview-text { color: #4ade80; font-size: 18px; font-weight: bold; margin: 5px 0 10px 0; min-height: 27px; font-family: 'Latha', sans-serif;}

        .hidden { display: none !important; }
        .turn-indicator { font-size: 11px; color: #4ade80; font-weight: bold; margin-top: 5px; text-transform: uppercase;}

        /* Chat Box Styling */
        .chat-container { text-align: left; }
        .chat-messages { height: 180px; overflow-y: auto; padding: 10px; border: 1px solid #3A2359; border-radius: 10px; background: #120A1E; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px;}
        .message { padding: 8px 12px; border-radius: 12px; max-width: 80%; display: inline-block;}
        .message-sender { font-size: 10px; color: #FF4B72; font-weight: 600; margin-bottom: 3px;}
        .my-message { background: linear-gradient(135deg, #FF4B72, #FF7694); align-self: flex-end; color: #fff; }
        .partner-message { background: #3A2359; align-self: flex-start; color: #fff; }
        
        .chat-input-group { display: flex; gap: 8px; align-items: center; position: relative;}
        .chat-input { margin: 0; text-align: left; }
        .chat-btn-group { display: flex; gap: 5px; width: auto; align-items: center;}
        .chat-icon-btn { background: none; border: none; font-size: 20px; color: #FF4B72; width: auto; padding: 0; cursor: pointer; transition: transform 0.2s; }
        .chat-icon-btn#emojiBtn { color: #fff;}
        .chat-send-btn { width: auto; padding: 10px 15px; margin-top: 0;}
        .emoji-picker { position: absolute; bottom: 110%; right: 0; width: 100%; max-width: 250px; height: 120px; background: #1D102E; border: 1px solid #FF4B72; border-radius: 12px; padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; overflow-y: auto; z-index: 10; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .emoji-item { font-size: 20px; background: none; border: none; width: auto; padding: 0; cursor: pointer; transition: transform 0.2s; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18, 10, 30, 0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box;}

<body>

<div id="toast" class="toast">💬 New Message!</div>

<div class="container" id="homeScreen">
    <h1 class="app-title">Namma Games 💖</h1>
    <p class="app-subtitle">Choose a game to play together!</p>
    
    <div class="card" style="padding: 30px 20px;">
        <button class="game-menu-btn" onclick="openGame('movie')">🎬 Movie Guessing</button>
        <button class="game-menu-btn blue" onclick="openGame('word')">🔠 Word Race Game</button>
    </div>
</div>

<div class="container hidden" id="sharedUIContainer">
    <div class="top-nav">
        <button class="back-btn" onclick="goHome()">⬅ Back</button>
        <div id="activeGameBadge" class="game-title-badge">Game</div>
    </div>

    <div class="vs-container">
        <div id="box-immu" class="player-box">
            <div class="avatar immu-pic"></div>
            <div class="name-container">
                <span id="status-immu" class="status-dot offline"></span>
                <div class="player-name">immu</div>
            </div>
            <div id="immuScore" class="score-val">0</div>
            <div id="turn-immu" class="turn-indicator hidden"></div>
        </div>
        
        <div class="vs-badge">VS</div>
        
        <div id="box-sappii" class="player-box">
            <div class="avatar sappii-pic"></div>
            <div class="name-container">
                <span id="status-sappii" class="status-dot offline"></span>
                <div class="player-name">Sappii</div>
            </div>
            <div id="sappiiScore" class="score-val">0</div>
            <div id="turn-sappii" class="turn-indicator hidden"></div>
        </div>
    </div>

    <div id="gameContentArea"></div>

    <div class="chat-container card">
        <h3 style="margin-top:0; font-size:16px;">💬 Real-time Chat</h3>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-group">
            <div id="emojiPicker" class="emoji-picker hidden"></div>
            <input type="text" id="chatInput" class="chat-input" placeholder="Type message...">
            <div class="chat-btn-group">
                <button id="emojiBtn" class="chat-icon-btn" onclick="toggleEmojiPicker()">😊</button>
                <button class="chat-send-btn" onclick="sendChatMessage()">Send</button>
            </div>
        </div>
    </div>

    <button class="reset-btn" onclick="openResetModal()">Reset Game Scores 🔄</button>
</div>

<div id="resetModal" class="modal hidden">
    <div class="modal-content">
        <h3 style="margin-top: 0; color: #fff;">Reset Game</h3>
        <p style="font-size: 13px; color: #aaa;">Scores will reset for the current game.</p>
        <div class="modal-btn-group" id="movieResetBtns">
            <button onclick="confirmReset('immu')" style="background: #4ade80; color: #120A1E;">Immu Start</button>
            <button onclick="confirmReset('sappii')">Sappii Start</button>
        </div>
        <div class="modal-btn-group hidden" id="wordResetBtns">
            <button onclick="confirmResetWord()" style="background: #4ade80; color: #120A1E;">Yes, Reset</button>
        </div>
        <button class="btn-cancel" onclick="closeResetModal()">Cancel</button>
    </div>
</div>

        document.getElementById('sharedUIContainer').classList.remove('hidden');
        
        if (gameType === 'movie') {
            document.getElementById('activeGameBadge').innerText = "🎬 Movie Guessing";
            document.getElementById('movieResetBtns').classList.remove('hidden');
            document.getElementById('wordResetBtns').classList.add('hidden');

        } else if (gameType === 'word') {
            document.getElementById('activeGameBadge').innerText = "🔠 Word Race Game";
            document.getElementById('movieResetBtns').classList.add('hidden');
            document.getElementById('wordResetBtns').classList.remove('hidden');
            renderWordGameUI();

        const data = snapshot.val() || {};
        gameState = { turn: data.turn || "immu", status: data.status || "set", score1: data.score1 || 0, score2: data.score2 || 0, movie: data.movie || "", hint: data.hint || "" };

    });

        { tanglish: "gilli", hero: "Vijay" }, { tanglish: "thuppaakki", hero: "Vijay" }, { tanglish: "maastar", hero: "Vijay" }, { tanglish: "liyoa", hero: "Vijay" }, { tanglish: "kaththi", hero: "Vijay" }, { tanglish: "theri", hero: "Vijay" }, { tanglish: "mersal", hero: "Vijay" }, { tanglish: "paokkiri", hero: "Vijay" }, { tanglish: "kaathalukku mariyaathai", hero: "Vijay" }, 
        { tanglish: "mangaathaa", hero: "Ajith" }, { tanglish: "billaa", hero: "Ajith" }, { tanglish: "dheenaa", hero: "Ajith" }, { tanglish: "viswaasam", hero: "Ajith" }, { tanglish: "thunivu", hero: "Ajith" }, { tanglish: "valimai", hero: "Ajith" }, { tanglish: "aarambam", hero: "Ajith" },
        { tanglish: "baashaa", hero: "Rajinikanth" }, { title: "muthu", hero: "Rajinikanth" }, { tanglish: "padaiyappaa", hero: "Rajinikanth" }, { tanglish: "sivaaji", hero: "Rajinikanth" }, { tanglish: "enthiran", hero: "Rajinikanth" }, { tanglish: "jailar", hero: "Rajinikanth" }, { tanglish: "thaalapathi", hero: "Rajinikanth" },
        { tanglish: "vikram", hero: "Kamal Haasan" }, { tanglish: "indhiyan", hero: "Kamal Haasan" }, { tanglish: "naayakan", hero: "Kamal Haasan" }, { tanglish: "anbae sivam", hero: "Kamal Haasan" }, { tanglish: "panchathanthiram", hero: "Kamal Haasan" }, 
        { tanglish: "ayan", hero: "Suriya" }, { tanglish: "singam", hero: "Suriya" }, { tanglish: "gajini", hero: "Suriya" }, { tanglish: "kanguvaa", hero: "Suriya" }, { tanglish: "soorarai poatru", hero: "Suriya" }, 
        { tanglish: "kaithi", hero: "Karthi" }, { tanglish: "siruthai", hero: "Karthi" }, { tanglish: "madras", hero: "Karthi" }, { tanglish: "paruthiveeran", hero: "Karthi" },
        { tanglish: "asuran", hero: "Dhanush" }, { tanglish: "karnan", hero: "Dhanush" }, { tanglish: "aadukalam", hero: "Dhanush" }, { tanglish: "maari", hero: "Dhanush" }, { tanglish: "raayan", hero: "Dhanush" },
        { tanglish: "daaktar", hero: "Sivakarthikeyan" }, { tanglish: "remoa", hero: "Sivakarthikeyan" }, { tanglish: "amaraan", hero: "Sivakarthikeyan" },
        { tanglish: "maahaaraajaa", hero: "Vijay Sethupathi" }, { tanglish: "vikram vaethaa", hero: "Madhavan & VJS" }, { tanglish: "pizzaa", hero: "Vijay Sethupathi" }, { tanglish: "96", hero: "Vijay Sethupathi" },
        { tanglish: "alaipaayuthae", hero: "Madhavan" }, { tanglish: "raajaa raani", hero: "Arya" }, { tanglish: "roaajaa", hero: "Arvind Swamy" }, { tanglish: "poar thozhil", hero: "Ashok Selvan" }, { tanglish: "manjummal paays", hero: "Soubin Shahir" }
    ];

    window.onload = () => {
        const picker = document.getElementById('emojiPicker');
        const emojis = ['❤️', '💖', '😊', '😍', '😂', '🔥', '🤔', '🥺', '🎥', '🍿', '👍', '🙏', '💯', '✨'];
        emojis.forEach(emoji => {
            const btn = document.createElement('button');
            btn.className = 'emoji-item'; btn.innerText = emoji;
            btn.onclick = () => { document.getElementById('chatInput').value += emoji; document.getElementById('chatInput').focus(); };
            picker.appendChild(btn);
        });
    };

    function transliterate(text) {
        let result = ""; let i = 0; const lower = text.toLowerCase();
        while (i < lower.length) {
            let found = false;
            for (let len = 4; len >= 1; len--) {
                let chunk = lower.substring(i, i + len);
                if (tamilMapping[chunk]) { result += tamilMapping[chunk]; i += len; found = true; break; }
            }
            if (!found) { result += text[i]; i++; }
        }
        return result;
    }

    function renderMovieGameUI() {
        const container = document.getElementById('gameContentArea');
        document.getElementById('immuScore').innerText = gameState.score1;
        document.getElementById('sappiiScore').innerText = gameState.score2;
        
        document.getElementById('box-immu').className = `player-box ${gameState.turn === 'immu' ? 'active-turn' : ''}`;
        document.getElementById('box-sappii').className = `player-box ${gameState.turn === 'sappii' ? 'active-turn' : ''}`;
        
        document.getElementById('turn-immu').innerText = gameState.status === 'set' ? 'SETTING...' : 'GUESSING';
        document.getElementById('turn-sappii').innerText = gameState.status === 'set' ? 'SETTING...' : 'GUESSING';
        document.getElementById('turn-immu').classList.toggle('hidden', gameState.turn !== 'immu');
        document.getElementById('turn-sappii').classList.toggle('hidden', gameState.turn !== 'sappii');

        if (gameState.status === "set") {
            if (gameState.turn === myName) {
                container.innerHTML = `
                    <div class="card">
                        <h3>🎬 Your Turn</h3>
                        <p style="font-size:11px;color:#aaa;">Type in Tanglish (Preview in Tamil)</p>
                        <input type="text" id="movieInput" placeholder="e.g. maastar" oninput="livePreview()">
                        <div id="tamilPreview" class="preview-text"></div>
                        <button class="random-btn" onclick="suggestRandomMovie()">Suggest Random Movie 🎲</button>
                        <input type="text" id="hintInput" placeholder="Add a hint (e.g. Hero name)">
                        <button onclick="setMovie()">Start Game 🚀</button>
                    </div>`;
            } else {
                container.innerHTML = `<div class="card"><h3>⏳ Waiting...</h3><p>${gameState.turn} is choosing a movie!</p></div>`;
            }
        } else if (gameState.status === "guessing") {
            const letterCount = getLetterCount(gameState.movie);
            if (gameState.turn === myName) {
                container.innerHTML = `<div class="card"><h3>🍿 Guessing...</h3><div class="masked-word">${maskTamil(gameState.movie)}</div><div class="letter-count">${letterCount} Letters</div></div>`;
            } else {
                container.innerHTML = `
                    <div class="card">
                        <h3>🤔 Guess!</h3>
                        <div class="masked-word">${maskTamil(gameState.movie)}</div>
                        <div class="letter-count">${letterCount} Letters</div>
                        <p style="color:#FF4B72;">💡 Hint: ${gameState.hint || "No hint"}</p>
                        <input type="text" id="guessInput" placeholder="Type in Tanglish" oninput="liveGuessPreview()">
                        <div id="guessPreview" class="preview-text" style="font-size: 15px;"></div>
                        <button onclick="checkGuess()">Submit</button>
                        <button class="give-up-btn" onclick="giveUp()">Theriyala 🥺</button>
                        <p id="feedback" style="margin-top:15px;"></p>
                    </div>`;
            }
        }
    }

    // -- MOVIE LOGIC FUNCS (Tamil UI Restored) --
    function livePreview() { const val = document.getElementById('movieInput').value; document.getElementById('tamilPreview').innerText = val ? transliterate(val) : ""; }
    function liveGuessPreview() { const val = document.getElementById('guessInput').value; document.getElementById('guessPreview').innerText = val ? transliterate(val) : ""; }
    
    function suggestRandomMovie() { 
        const randomObj = MOVIE_COLLECTION[Math.floor(Math.random() * MOVIE_COLLECTION.length)];
        document.getElementById('movieInput').value = randomObj.tanglish; 
        document.getElementById('hintInput').value = "Hero: " + randomObj.hero;
        livePreview(); // auto update preview
    }
    
    function setMovie() { const raw = document.getElementById('movieInput').value.trim(); const tamilMovie = transliterate(raw); const h = document.getElementById('hintInput').value; if(!raw) return alert("Enter movie!"); db.ref('gameState').update({ movie: tamilMovie, hint: h, status: "guessing" }); }
    function checkGuess() { const guessRaw = document.getElementById('guessInput').value.trim(); const tamilGuess = transliterate(guessRaw); if (tamilGuess === gameState.movie) { const scoreKey = (myName === "immu") ? 'score1' : 'score2'; db.ref(`gameState/${scoreKey}`).transaction(s => (s || 0) + 1); db.ref('gameState').update({ turn: myName, status: "set", movie: "" }); } else { document.getElementById('feedback').innerText = "Wrong! ("+tamilGuess+") Try again 🥺"; } }
    function giveUp() { document.getElementById('feedback').innerText = "Answer: " + gameState.movie; const partnerScoreKey = (myName === "immu") ? 'score2' : 'score1'; db.ref(`gameState/${partnerScoreKey}`).transaction(s => (s || 0) + 1); setTimeout(() => db.ref('gameState').update({ turn: myName, status: "set", movie: "" }), 2500); }
    
    // Exact Tamil Letter Count
    function getLetterCount(str) { if(!str) return 0; const clusters = str.match(/[\u0B80-\u0BFF][\u0BC0-\u0BD7\u0BBE-\u0BBF\u0BC6-\u0BC8\u0BCA-\u0BCC\u0BCD]*|[a-zA-Z0-9]/g) || []; return clusters.filter(c => c !== ' ').length; }
    
    // Perfect Masking Logic for Tamil Characters
    function maskTamil(str) {
        if(!str) return "";
        const words = str.split(" ");
        return words.map(word => {
            const clusters = word.match(/[\u0B80-\u0BFF][\u0BC0-\u0BD7\u0BBE-\u0BBF\u0BC6-\u0BC8\u0BCA-\u0BCC\u0BCD]*|[a-zA-Z0-9]/g) || [];
            return clusters.map((c, i) => {
                if(i === 0 || i === clusters.length - 1) return c; // Reveals first and last valid character
                return "_";
            }).join(" ");
        }).join("&nbsp;&nbsp;&nbsp;&nbsp;");
    }

    // ================= WORD GAME LOGIC =================
    function renderWordGameUI() {
        const container = document.getElementById('gameContentArea');
        document.getElementById('immuScore').innerText = wordGameState.score1;
        document.getElementById('sappiiScore').innerText = wordGameState.score2;
        
        document.getElementById('box-immu').className = `player-box racing-turn`;
        document.getElementById('box-sappii').className = `player-box racing-turn`;
        document.getElementById('turn-immu').innerText = wordGameState.status === 'race_phase' ? 'RACING 🔥' : 'THINKING';
        document.getElementById('turn-sappii').innerText = wordGameState.status === 'race_phase' ? 'RACING 🔥' : 'THINKING';
        document.getElementById('turn-immu').classList.remove('hidden');
        document.getElementById('turn-sappii').classList.remove('hidden');

        if (wordGameState.status === "letter_phase") {
            const myLetter = (myName === 'immu') ? wordGameState.p1Letter : wordGameState.p2Letter;
            const partnerLetter = (myName === 'immu') ? wordGameState.p2Letter : wordGameState.p1Letter;

            if (!myLetter) {
                container.innerHTML = `
                    <div class="card">
                        <h3>🔠 Your Letter?</h3>
                        <p style="color:#aaa; font-size: 13px;">Type ONE English letter (A-Z)</p>
                        <input type="text" id="letterInput" maxlength="1" placeholder="e.g. S or K" class="letter-box">
                        <button onclick="submitLetter()">Send Letter</button>
                    </div>`;
            } else if (!partnerLetter) {
                container.innerHTML = `
                    <div class="card">
                        <h3>⏳ Waiting...</h3>
                        <p>${partnerName} is choosing a letter!</p>
                        <p style="font-size: 20px; color: #4ade80; font-weight:bold;">You picked: ${myLetter.toUpperCase()}</p>
                    </div>`;
            } else {
                container.innerHTML = `
                    <div class="card">
                        <h3 style="color:#4ade80;">Both Letters Ready!</h3>
                        <p style="font-size:13px; color:#aaa;">First letter ethu, Last letter ethu?</p>
                        <button class="order-btn" onclick="setWordOrder('${wordGameState.p1Letter}', '${wordGameState.p2Letter}')">
                            Start with <b style="color:white; font-size:18px;">${wordGameState.p1Letter.toUpperCase()}</b> and end with <b style="color:white; font-size:18px;">${wordGameState.p2Letter.toUpperCase()}</b>
                        </button>
                        <button class="order-btn" onclick="setWordOrder('${wordGameState.p2Letter}', '${wordGameState.p1Letter}')">
                            Start with <b style="color:white; font-size:18px;">${wordGameState.p2Letter.toUpperCase()}</b> and end with <b style="color:white; font-size:18px;">${wordGameState.p1Letter.toUpperCase()}</b>
                        </button>
                    </div>`;
            }
        } else if (wordGameState.status === "race_phase") {
            container.innerHTML = `
                <div class="card" style="border-color:#4ade80; box-shadow: 0 0 20px rgba(74, 222, 128, 0.2);">
                    <h3 style="margin-top:0;">🏁 Form a Word!</h3>
                    <p style="font-size: 16px;">Starts with <b class="letter-box" style="font-size: 30px;">${wordGameState.startLetter.toUpperCase()}</b> & Ends with <b class="letter-box" style="font-size: 30px;">${wordGameState.endLetter.toUpperCase()}</b></p>
                    <input type="text" id="raceWordInput" placeholder="Type a valid word..." style="font-size: 18px; font-weight: bold; text-transform: uppercase;">
                    <button onclick="submitRaceWord()" style="background: linear-gradient(135deg, #4ade80, #34d399); color: #120A1E;">Submit Fast! 🚀</button>
                    <button class="give-up-btn" onclick="skipWord()">Theriyala (Skip) 🔄</button>
                    <p id="raceFeedback" style="margin-top:15px; color:#FF4B72; font-weight:bold;"></p>
                </div>`;
        }
    }

    function submitLetter() {
        const letter = document.getElementById('letterInput').value.trim().toLowerCase();
        if(!letter || letter.length > 1 || !/[a-z]/.test(letter)) return alert("Please enter exactly 1 English letter (A-Z)!");
        const letterKey = (myName === "immu") ? 'p1Letter' : 'p2Letter';
        db.ref(`wordGameState`).update({ [letterKey]: letter });
    }

    function setWordOrder(start, end) { db.ref('wordGameState').update({ status: "race_phase", startLetter: start, endLetter: end }); }

    function submitRaceWord() {
        const word = document.getElementById('raceWordInput').value.trim().toLowerCase();
        const start = wordGameState.startLetter.toLowerCase(); const end = wordGameState.endLetter.toLowerCase();
        if (word.length >= 2 && word.startsWith(start) && word.endsWith(end)) {
            const scoreKey = (myName === "immu") ? 'score1' : 'score2';
            db.ref(`wordGameState/${scoreKey}`).transaction(s => (s || 0) + 1);
            db.ref('wordGameState').update({ status: "letter_phase", p1Letter: "", p2Letter: "", startLetter: "", endLetter: "" });
            db.ref('chatMessages').push({ sender: "System 🤖", text: `🎉 ${myName} scored 1 point with the word "${word.toUpperCase()}"!`, timestamp: firebase.database.ServerValue.TIMESTAMP });
        } else {
            document.getElementById('raceFeedback').innerText = `Word must start with ${start.toUpperCase()} and end with ${end.toUpperCase()}!`;
        }
    }

    function skipWord() {
        db.ref('wordGameState').update({ status: "letter_phase", p1Letter: "", p2Letter: "", startLetter: "", endLetter: "" });
        db.ref('chatMessages').push({ sender: "System 🤖", text: `🔄 This round was skipped!`, timestamp: firebase.database.ServerValue.TIMESTAMP });
    }

    // --- RESET MODALS ---
    function openResetModal() { document.getElementById('resetModal').classList.remove('hidden'); }
    function closeResetModal() { document.getElementById('resetModal').classList.add('hidden'); }
    function confirmReset(starter) { db.ref('gameState').set({ turn: starter, status: "set", score1: 0, score2: 0, movie: "", hint: "" }); closeResetModal(); }
    function confirmResetWord() { db.ref('wordGameState').set({ status: "letter_phase", p1Letter: "", p2Letter: "", startLetter: "", endLetter: "", score1: 0, score2: 0 }); closeResetModal(); }

    // --- ONLINE STATUS & CHAT ---
    db.ref('.info/connected').on('value', (snapshot) => {
        if (snapshot.val() === true) {
            const myPresenceRef = db.ref(`presence/${myName}`);
            myPresenceRef.onDisconnect().set({ online: false, lastSeen: firebase.database.ServerValue.TIMESTAMP });
            myPresenceRef.set({ online: true, lastSeen: firebase.database.ServerValue.TIMESTAMP });
            document.getElementById(`status-${myName}`).className = 'status-dot online';
        }
    });

    db.ref(`presence/${partnerName}`).on('value', (snapshot) => {
        const data = snapshot.val();
        document.getElementById(`status-${partnerName}`).className = data && data.online ? 'status-dot online' : 'status-dot offline';
    });

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg; toast.classList.add('show');
        try { const audio = new Audio("https://actions.google.com/sounds/v1/communication/bubble_pop.ogg"); audio.play(); } catch(e){}
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    let isChatLoaded = false;
    db.ref('chatMessages').once('value', () => { isChatLoaded = true; });

    db.ref('chatMessages').on('child_added', (snapshot) => {
        const data = snapshot.val();
        const chatMessagesDiv = document.getElementById('chatMessages');
        const isMine = data.sender === myName;
        const isSystem = data.sender === "System 🤖";
        
        const messageDiv = document.createElement('div');
        if (isSystem) { messageDiv.className = 'message'; messageDiv.style.background = '#2D1A45'; messageDiv.style.color = '#4ade80'; messageDiv.style.alignSelf = 'center'; messageDiv.style.fontSize = '12px'; }
        else { messageDiv.className = isMine ? 'message my-message' : 'message partner-message'; }
        
        const time = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        messageDiv.innerHTML = `<div class="message-sender">${isMine ? 'You' : data.sender} (${time})</div><div class="message-text">${data.text}</div>`;
        chatMessagesDiv.appendChild(messageDiv);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;

        if (isChatLoaded && !isMine && !isSystem) { showToast(`💬 ${data.sender} sent a message!`); }
    });

    function sendChatMessage() {
        const chatInput = document.getElementById('chatInput');
        const text = chatInput.value.trim();
        if(!text) return;
        db.ref('chatMessages').push({ sender: myName, text: text, timestamp: firebase.database.ServerValue.TIMESTAMP });
        chatInput.value = ""; closeEmojiPicker(); 
    }

    document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendChatMessage(); });
    function toggleEmojiPicker() { document.getElementById('emojiPicker').classList.toggle('hidden'); }
    function closeEmojiPicker() { document.getElementById('emojiPicker').classList.add('hidden'); }
</script>
