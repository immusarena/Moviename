<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple Games Hub 💖</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Latha&display=swap');
        
        /* CSS Variables for Dynamic Themes */
        :root {
            --bg-color: #120A1E;
            --card-bg: #1D102E;
            --primary-color: #FF4B72;
            --secondary-color: #FF7694;
            --accent-color: #4ade80;
            --border-color: #3A2359;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Poppins', 'Latha', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; flex-direction: column; transition: background-color 0.5s ease; }
        .container { width: 90%; max-width: 400px; padding: 20px; }
        
        /* Toast Notification Styling */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--accent-color); color: #120A1E; padding: 12px 24px; border-radius: 20px; font-weight: bold; font-size: 14px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); transition: transform 0.3s ease, opacity 0.3s ease; opacity: 0; z-index: 2000; pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Home Page */
        .app-title { text-align: center; color: var(--primary-color); font-family: 'Poppins', sans-serif; font-size: 28px; text-shadow: 0 0 15px var(--primary-color); margin-bottom: 10px; font-weight: bold; transition: color 0.5s ease;}
        .app-subtitle { text-align: center; color: var(--text-muted); font-size: 13px; margin-bottom: 30px; }
        .game-menu-btn { width: 100%; padding: 20px; margin-bottom: 15px; background: var(--card-bg); border: 2px solid var(--primary-color); border-radius: 15px; color: var(--text-main); font-weight: 600; cursor: pointer; font-size: 18px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .game-menu-btn:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--primary-color); }
        .game-menu-btn.blue { border-color: var(--accent-color); }
        .game-menu-btn.blue:hover { box-shadow: 0 0 15px var(--accent-color); }
        
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        .back-btn { background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; width: auto; transition: 0.2s; }
        .game-title-badge { background: var(--border-color); padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: 600; color: var(--primary-color); }
        .theme-btn { background: var(--card-bg); border: 1px solid var(--accent-color); color: var(--accent-color); padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-bottom: 10px;}

        /* VS Scoreboard */
        .vs-container { display: flex; justify-content: space-around; align-items: center; margin-bottom: 15px; }
        .player-box { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; width: 90px; padding: 10px; border-radius: 15px; transition: 0.3s; border: 2px solid transparent;}
        .active-turn { border: 2px solid var(--primary-color); box-shadow: 0 0 15px var(--primary-color); background: var(--card-bg); }
        .racing-turn { border: 2px solid var(--accent-color); box-shadow: 0 0 15px var(--accent-color); background: var(--card-bg); }
        
        /* Avatars */
        .avatar { width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--border-color); background-size: cover; background-position: center; background-color: var(--card-bg); }
        .immu-pic { background-image: url('1000242624.jpg'); border-color: var(--accent-color); } 
        .sappii-pic { background-image: url('1000242625.jpg'); border-color: var(--primary-color); } 
        
        .name-container { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid #fff; transition: background-color 0.3s; }
        .online { background-color: #4ade80; } 
        .offline { background-color: #aaa; } 
        .player-name { font-size: 13px; font-weight: 600; color: var(--text-main); }
        .score-val { font-size: 24px; font-weight: bold; color: var(--primary-color); }
        .vs-badge { background: var(--border-color); padding: 6px 12px; border-radius: 50%; font-size: 12px; color: var(--text-muted); }

        /* Cards & Inputs */
        .card { background-color: var(--card-bg); border-radius: 25px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); text-align: center; border: 1px solid var(--border-color); margin-bottom: 15px; transition: 0.5s ease; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--border-color); background-color: var(--bg-color); color: var(--text-main); box-sizing: border-box; font-family: inherit; font-size: 14px; text-align: center;}
        input:focus { outline: none; border-color: var(--primary-color); }
        
        .letter-box { font-size: 24px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-color); }
        .order-btn { background: var(--bg-color); border: 1px solid var(--accent-color); color: var(--accent-color); margin: 5px 0; padding: 12px; }

        button { width: 100%; padding: 15px; margin-top: 10px; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; font-size: 16px; transition: 0.2s;}
        button:active { transform: scale(0.98); }
        .random-btn { background: transparent; border: 1px dashed var(--accent-color); color: var(--accent-color); margin: 0 0 10px 0; padding: 10px; font-size: 13px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .give-up-btn { background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); margin-top: 10px; }
        .reset-btn { background: transparent; border: 1px solid var(--primary-color); color: var(--primary-color); margin-top: 20px; font-size: 14px; padding: 10px; width: auto;}

        .masked-word { font-size: 28px; letter-spacing: 5px; margin: 15px 0 5px 0; color: var(--accent-color); font-weight: bold; font-family: 'Latha', sans-serif; text-shadow: 0 0 10px rgba(0,0,0,0.3); }
        .letter-count { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; font-weight: 600; background: var(--border-color); display: inline-block; padding: 4px 12px; border-radius: 20px; text-transform: uppercase;}
        .preview-text { color: var(--accent-color); font-size: 20px; font-weight: bold; margin: 5px 0 10px 0; min-height: 30px; font-family: 'Latha', sans-serif;}

        .hidden { display: none !important; }
        .turn-indicator { font-size: 11px; color: var(--accent-color); font-weight: bold; margin-top: 5px; text-transform: uppercase;}

        /* Chat Box */
        .chat-container { text-align: left; }
        .chat-messages { height: 180px; overflow-y: auto; padding: 10px; border: 1px solid var(--border-color); border-radius: 10px; background: var(--bg-color); margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px;}
        .message { padding: 8px 12px; border-radius: 12px; max-width: 80%; display: inline-block;}
        .message-sender { font-size: 10px; color: var(--primary-color); font-weight: 600; margin-bottom: 3px;}
        .my-message { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); align-self: flex-end; color: #fff; }
        .partner-message { background: var(--border-color); align-self: flex-start; color: var(--text-main); }
        .system-message { background: var(--border-color); color: var(--accent-color); align-self: center; font-size: 12px; text-align: center; border: 1px solid var(--accent-color); box-shadow: 0 0 10px rgba(0,0,0,0.2);}
        .cheat-message { background: #3f0000; color: #ff4444; align-self: center; font-size: 12px; font-weight: bold; text-align: center; border: 1px solid #ff4444; box-shadow: 0 0 10px rgba(255,0,0,0.3);}
        
        .chat-input-group { display: flex; gap: 8px; align-items: center; position: relative;}
        .chat-input { margin: 0; text-align: left; }
        .chat-btn-group { display: flex; gap: 5px; width: auto; align-items: center;}
        .chat-icon-btn { background: none; border: none; font-size: 20px; width: auto; padding: 0; cursor: pointer; transition: transform 0.2s; }
        .chat-send-btn { width: auto; padding: 10px 15px; margin-top: 0;}
        .emoji-picker { position: absolute; bottom: 110%; right: 0; width: 100%; max-width: 250px; height: 120px; background: var(--card-bg); border: 1px solid var(--primary-color); border-radius: 12px; padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; overflow-y: auto; z-index: 10; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .emoji-item { font-size: 20px; background: none; border: none; width: auto; padding: 0; cursor: pointer; transition: transform 0.2s; }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0, 0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box;}
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 20px; text-align: center; border: 1px solid var(--primary-color); width: 100%; max-width: 320px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);}
        .modal-btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); margin-top: 15px; padding: 10px;}
    </style>
</head>
<body>

<div id="toast" class="toast">💬 New Message!</div>

<div class="container" id="homeScreen">
    <div style="text-align: right;">
        <button id="themeSwitcher" class="theme-btn" onclick="cycleTheme()">🎨 Theme: Love Vibe</button>
    </div>

    <h1 class="app-title">Namma Games 💖</h1>
    <p class="app-subtitle">Choose a game to play together!</p>
    
    <div class="card" style="padding: 30px 20px;">
        <button class="game-menu-btn" onclick="openGame('movie')">🎬 Movie Guessing</button>
        <button class="game-menu-btn blue" onclick="openGame('word')">🔠 Word Race Game</button>
    </div>
</div>

<div class="container hidden" id="sharedUIContainer">
    <div class="top-nav">
        <button class="back-btn" onclick="goHome()">⬅ Back</button>
        <div id="activeGameBadge" class="game-title-badge">Game</div>
    </div>

    <div class="vs-container">
        <div id="box-immu" class="player-box">
            <div class="avatar immu-pic"></div>
            <div class="name-container">
                <span id="status-immu" class="status-dot offline"></span>
                <div class="player-name">immu</div>
            </div>
            <div id="immuScore" class="score-val">0</div>
            <div id="turn-immu" class="turn-indicator hidden"></div>
        </div>
        
        <div class="vs-badge">VS</div>
        
        <div id="box-sappii" class="player-box">
            <div class="avatar sappii-pic"></div>
            <div class="name-container">
                <span id="status-sappii" class="status-dot offline"></span>
                <div class="player-name">Sappii</div>
            </div>
            <div id="sappiiScore" class="score-val">0</div>
            <div id="turn-sappii" class="turn-indicator hidden"></div>
        </div>
    </div>

    <datalist id="movieList"></datalist>
    <div id="gameContentArea"></div>

    <div class="chat-container card">
        <h3 style="margin-top:0; font-size:16px;">💬 Real-time Chat</h3>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-group">
            <div id="emojiPicker" class="emoji-picker hidden"></div>
            <input type="text" id="chatInput" class="chat-input" placeholder="Type message...">
            <div class="chat-btn-group">
                <button id="emojiBtn" class="chat-icon-btn" onclick="toggleEmojiPicker()">😊</button>
                <button class="chat-send-btn" onclick="sendChatMessage()">Send</button>
            </div>
        </div>
    </div>

    <button class="reset-btn" onclick="openResetModal()">Reset Game Scores 🔄</button>
</div>

<div id="resetModal" class="modal hidden">
    <div class="modal-content">
        <h3 style="margin-top: 0; color: var(--text-main);">Reset Game</h3>
        <p style="font-size: 13px; color: var(--text-muted);">Scores will reset for the current game.</p>
        <div class="modal-btn-group" id="movieResetBtns">
            <button onclick="confirmReset('immu')" style="background: var(--accent-color); color: #120A1E;">Immu Start</button>
            <button onclick="confirmReset('sappii')">Sappii Start</button>
        </div>
        <div class="modal-btn-group hidden" id="wordResetBtns">
            <button onclick="confirmResetWord()" style="background: var(--accent-color); color: #120A1E;">Yes, Reset</button>
        </div>
        <button class="btn-cancel" onclick="closeResetModal()">Cancel</button>
    </div>
</div>

    function transliterate(text) {
        let result = ""; let i = 0; const lower = text.toLowerCase();
        while (i < lower.length) {
            let found = false;
            for (let len = 4; len >= 1; len--) {
                let chunk = lower.substring(i, i + len);
                if (tamilMapping[chunk]) { result += tamilMapping[chunk]; i += len; found = true; break; }
            }
            if (!found) { result += text[i]; i++; }
        }
        return result;
    }

    function handleMovieInput() {
        const val = document.getElementById('movieInput').value.trim().toLowerCase();
        const foundMovie = MOVIE_COLLECTION.find(m => m.eng.toLowerCase() === val);
        if(foundMovie) { 
            document.getElementById('hintInput').value = "Hero: " + foundMovie.hero; 
            selectedPerfectTamil = foundMovie.tamil;
            document.getElementById('tamilPreview').innerText = foundMovie.tamil;
        } else {
            selectedPerfectTamil = "";
            document.getElementById('tamilPreview').innerText = val ? transliterate(val) : "";
        }
    }
    
    function suggestRandomMovie() { 
        const randomObj = MOVIE_COLLECTION[Math.floor(Math.random() * MOVIE_COLLECTION.length)];
        document.getElementById('movieInput').value = randomObj.eng;

    function setMovie() { 
        const rawEng = document.getElementById('movieInput').value.trim(); 
        const h = document.getElementById('hintInput').value; 
        if(!rawEng) return alert("Enter movie!"); 
        
        const finalTamil = selectedPerfectTamil || transliterate(rawEng);
        db.ref('gameState').update({ movieEng: rawEng.toLowerCase(), movieTamil: finalTamil, hint: h, status: "guessing" }); 
    }
    
    function checkGuess() { 
        const guessRaw = document.getElementById('guessInput').value.trim().toLowerCase(); 
        const normalizedGuess = guessRaw.replace(/\s/g, '');
        const normalizedAnswer = (gameState.movieEng || "").replace(/\s/g, '');

        if (normalizedGuess === normalizedAnswer) { 
            const scoreKey = (myName === "immu") ? 'score1' : 'score2'; 
            db.ref(`gameState/${scoreKey}`).transaction(s => (s || 0) + 1); 
            db.ref('gameState').update({ turn: myName, status: "set", movieEng: "", movieTamil: "" }); 
        } else { 
            document.getElementById('feedback').innerText = "Wrong spelling! Try again 🥺"; 
            document.getElementById('feedback').style.color = "var(--primary-color)";
        } 
    }
    
    function giveUp() { 
        document.getElementById('feedback').innerText = "Answer: " + (gameState.movieEng || "").toUpperCase(); 
        const partnerScoreKey = (myName === "immu") ? 'score2' : 'score1'; 
        db.ref(`gameState/${partnerScoreKey}`).transaction(s => (s || 0) + 1); 
        setTimeout(() => db.ref('gameState').update({ turn: myName, status: "set", movieEng: "", movieTamil: "" }), 2500); 
    }
    
    function getLetterCount(str) { 
        if(!str) return 0; 
        const clusters = str.match(/[\u0B80-\u0BFF][\u0BC0-\u0BD7\u0BBE-\u0BBF\u0BC6-\u0BC8\u0BCA-\u0BCC\u0BCD]*|[a-zA-Z0-9]/g) || []; 
        return clusters.filter(c => c !== ' ').length; 
    }
    
    function maskTamil(str) {
        if(!str) return "";
        const words = str.split(" ");
        return words.map(word => {
            const clusters = word.match(/[\u0B80-\u0BFF][\u0BC0-\u0BD7\u0BBE-\u0BBF\u0BC6-\u0BC8\u0BCA-\u0BCC\u0BCD]*|[a-zA-Z0-9]/g) || [];
            return clusters.map((c, i) => {
                if(i === 0 || i === clusters.length - 1) return c;
                return "_";
            }).join(" ");
        }).join("&nbsp;&nbsp;&nbsp;&nbsp;");
    }

                            Start with <b style="color:white; font-size:18px;">${wordGameState.p1Letter.toUpperCase()}</b> and end with <b style="color:white; font-size:18px;">${wordGameState.p2Letter.toUpperCase()}</b>
                        </button>
                        <button class="order-btn" onclick="setWordOrder('${wordGameState.p2Letter}', '${wordGameState.p1Letter}')">
                            Start with <b style="color:white; font-size:18px;">${wordGameState.p2Letter.toUpperCase()}</b> and end with <b style="color:white; font-size:18px;">${wordGameState.p1Letter.toUpperCase()}</b>
                        </button>
                    </div>`;
            }
        } else if (wordGameState.status === "race_phase") {
            container.innerHTML = `
                <div class="card" style="border-color:var(--accent-color); box-shadow: 0 0 20px rgba(74, 222, 128, 0.2);">
                    <h3 style="margin-top:0;">🏁 Form a Word!</h3>
                    <p style="font-size: 16px;">Starts with <b class="letter-box" style="font-size: 30px;">${wordGameState.startLetter.toUpperCase()}</b> & Ends with <b class="letter-box" style="font-size: 30px;">${wordGameState.endLetter.toUpperCase()}</b></p>
                    <input type="text" id="raceWordInput" placeholder="Type a valid word..." style="font-size: 18px; font-weight: bold; text-transform: uppercase;">
                    <button onclick="submitRaceWord()" style="background: linear-gradient(135deg, var(--accent-color), #34d399); color: #120A1E;">Submit Fast! 🚀</button>
                    <button class="give-up-btn" onclick="skipWord()">Theriyala (Skip) 🔄</button>
                    <p id="raceFeedback" style="margin-top:15px; color:var(--primary-color); font-weight:bold;"></p>
                </div>`;
        }
    }

    function submitLetter() {
        const letter = document.getElementById('letterInput').value.trim().toLowerCase();
        if(!letter || letter.length > 1 || !/[a-z]/.test(letter)) return alert("Please enter exactly 1 English letter (A-Z)!");
        const letterKey = (myName === "immu") ? 'p1Letter' : 'p2Letter';
        db.ref(`wordGameState`).update({ [letterKey]: letter });
    }

    function setWordOrder(start, end) { db.ref('wordGameState').update({ status: "race_phase", startLetter: start, endLetter: end }); }

    function submitRaceWord() {
        const word = document.getElementById('raceWordInput').value.trim().toLowerCase();
        const start = wordGameState.startLetter.toLowerCase(); const end = wordGameState.endLetter.toLowerCase();
        if (word.length >= 2 && word.startsWith(start) && word.endsWith(end)) {
            const scoreKey = (myName === "immu") ? 'score1' : 'score2';
            db.ref(`wordGameState/${scoreKey}`).transaction(s => (s || 0) + 1);
            db.ref('wordGameState').update({ status: "letter_phase", p1Letter: "", p2Letter: "", startLetter: "", endLetter: "" });
            db.ref('chatMessages').push({ sender: "System 🤖", text: `🎉 ${myName.toUpperCase()} scored 1 point with the word "${word.toUpperCase()}"!`, timestamp: firebase.database.ServerValue.TIMESTAMP });
        } else {
            document.getElementById('raceFeedback').innerText = `Word must start with ${start.toUpperCase()} and end with ${end.toUpperCase()}!`;
        }
    }

    function skipWord() {
        db.ref('wordGameState').update({ status: "letter_phase", p1Letter: "", p2Letter: "", startLetter: "", endLetter: "" });
        db.ref('chatMessages').push({ sender: "System 🤖", text: `🔄 This round was skipped!`, timestamp: firebase.database.ServerValue.TIMESTAMP });
    }

    // --- RESET MODALS ---
    function openResetModal() { document.getElementById('resetModal').classList.remove('hidden'); }
    function closeResetModal() { document.getElementById('resetModal').classList.add('hidden'); }
    function confirmReset(starter) { db.ref('gameState').set({ turn: starter, status: "set", score1: 0, score2: 0, movieEng: "", movieTamil: "", hint: "" }); closeResetModal(); }
    function confirmResetWord() { db.ref('wordGameState').set({ status: "letter_phase", p1Letter: "", p2Letter: "", startLetter: "", endLetter: "", score1: 0, score2: 0 }); closeResetModal(); }

    // --- ONLINE STATUS & CHAT ---
    db.ref('.info/connected').on('value', (snapshot) => {
        if (snapshot.val() === true) {
            const myPresenceRef = db.ref(`presence/${myName}`);
            myPresenceRef.onDisconnect().set({ online: false, lastSeen: firebase.database.ServerValue.TIMESTAMP });
            myPresenceRef.set({ online: true, lastSeen: firebase.database.ServerValue.TIMESTAMP });
            document.getElementById(`status-${myName}`).className = 'status-dot online';
        }
    });

    db.ref(`presence/${partnerName}`).on('value', (snapshot) => {
        const data = snapshot.val();
        document.getElementById(`status-${partnerName}`).className = data && data.online ? 'status-dot online' : 'status-dot offline';
    });

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg; toast.classList.add('show');
        try { const audio = new Audio("https://actions.google.com/sounds/v1/communication/bubble_pop.ogg"); audio.play(); } catch(e){}
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    let isChatLoaded = false;
    db.ref('chatMessages').once('value', () => { isChatLoaded = true; });

    db.ref('chatMessages').on('child_added', (snapshot) => {
        const data = snapshot.val();
        const chatMessagesDiv = document.getElementById('chatMessages');
        const isMine = data.sender === myName;
        const isSystem = data.sender === "System 🤖";
        const isCheat = data.sender === "Anti-Cheat 🚨";
        
        const messageDiv = document.createElement('div');
        if (isSystem) { 
            messageDiv.className = 'message system-message'; 
        } else if (isCheat) {
            messageDiv.className = 'message cheat-message';
        } else { 
            messageDiv.className = isMine ? 'message my-message' : 'message partner-message'; 
        }
        
        const time = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        messageDiv.innerHTML = `<div class="message-sender" style="${isSystem||isCheat ? 'color:inherit' : ''}">${isMine ? 'You' : data.sender} (${time})</div><div class="message-text">${data.text}</div>`;
        chatMessagesDiv.appendChild(messageDiv);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;

        if (isChatLoaded && !isMine && !isSystem) { showToast(`💬 ${data.sender} sent a message!`); }
    });

    function sendChatMessage() {
        const chatInput = document.getElementById('chatInput');
        const text = chatInput.value.trim();
        if(!text) return;
        db.ref('chatMessages').push({ sender: myName, text: text, timestamp: firebase.database.ServerValue.TIMESTAMP });
        chatInput.value = ""; closeEmojiPicker(); 
    }

    document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendChatMessage(); });
    function toggleEmojiPicker() { document.getElementById('emojiPicker').classList.toggle('hidden'); }
    function closeEmojiPicker() { document.getElementById('emojiPicker').classList.add('hidden'); }
</script>
</body>
</html>
