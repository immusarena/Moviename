<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamil Couple Movie Game 💖</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Latha&display=swap');

html, body {
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
}

body {
    background-color: #120A1E;
    color: white;
    font-family: 'Poppins', 'Latha', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px 0;
    flex-direction: column;
}

.container {
    width: 90%;
    max-width: 420px;
}

/* VS SECTION */
.vs-container {
    display: flex;
    justify-content: space-around;
    align-items: center;
    margin-bottom: 25px;
}

.player-box {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 95px;
    padding: 10px;
    border-radius: 15px;
    position: relative;
}

.active-turn {
    background: rgba(255, 75, 114, 0.15);
    border: 1px solid #FF4B72;
    box-shadow: 0 0 15px #FF4B72;
}

/* AVATAR */
.avatar {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    background-size: cover;
    background-position: center;
    position: relative;
}

.immu-pic { background-image: url('1000242624.jpg'); }
.sappii-pic { background-image: url('1000242625.jpg'); }

/* ONLINE DOT */
.online-dot {
    position: absolute;
    bottom: 5px;
    right: 5px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: gray;
    border: 2px solid #120A1E;
}

.avatar.active {
    box-shadow: 0 0 0 3px #4ade80, 0 0 15px #4ade80;
}

.player-name { font-size: 13px; font-weight: 600; }
.score-val { font-size: 22px; color: #FF4B72; }

.card {
    background: #1D102E;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
    text-align: center;
}

input {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    border-radius: 12px;
    border: 1px solid #3A2359;
    background: #120A1E;
    color: white;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    background: linear-gradient(135deg, #FF4B72, #FF7694);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 600;
}

/* CHAT */
.chat-container {
    height: 150px;
    overflow-y: auto;
    background: #120A1E;
    border-radius: 12px;
    padding: 10px;
    border: 1px solid #3A2359;
}

.chat-msg {
    font-size: 12px;
    margin: 5px 0;
}

.msg-mine { color: #FF4B72; text-align: right; }
.msg-partner { color: white; }

/* EMOJI */
.emoji-btn {
    background: #1D102E;
    border: 1px solid #FF4B72;
    border-radius: 50%;
    width: 45px;
    height: 45px;
    font-size: 20px;
}

.floating-emoji {
    position: fixed;
    bottom: 80px;
    font-size: 35px;
    animation: floatUp 2.5s ease-out forwards;
    pointer-events: none;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-250px); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">

<!-- VS -->
<div class="vs-container">

    <div id="box-immu" class="player-box">
        <div class="avatar immu-pic" id="immuAvatar">
            <div class="online-dot" id="immuStatus"></div>
        </div>
        <div class="player-name">immu</div>
        <div id="immuScore" class="score-val">0</div>
    </div>

    <div>VS</div>

    <div id="box-sappii" class="player-box">
        <div class="avatar sappii-pic" id="sappiiAvatar">
            <div class="online-dot" id="sappiiStatus"></div>
        </div>
        <div class="player-name">Sappii</div>
        <div id="sappiiScore" class="score-val">0</div>
    </div>

</div>

<!-- EMOJI -->
<div style="display:flex;justify-content:space-around;margin-bottom:10px;">
    <button class="emoji-btn" onclick="sendReaction('❤️')">❤️</button>
    <button class="emoji-btn" onclick="sendReaction('😂')">😂</button>
    <button class="emoji-btn" onclick="sendReaction('🥺')">🥺</button>
    <button class="emoji-btn" onclick="sendReaction('🔥')">🔥</button>
</div>

<div id="gameContent"></div>

<!-- CHAT -->
<div class="card">
<h4>Chat 💬</h4>
<div class="chat-container" id="chatMessages"></div>
<input id="chatInput" placeholder="Type..." onkeypress="if(event.key==='Enter') sendMessage()">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCdhWff4X_XHvoIw_mhFDGRjy9vC4ymFc4",
authDomain: "moviename-26960.firebaseapp.com",
databaseURL: "https://moviename-26960-default-rtdb.firebaseio.com",
projectId: "moviename-26960",
storageBucket: "moviename-26960.appspot.com",
messagingSenderId: "745803258160",
appId: "1:745803258160:web:94974f7633fd84a1f3d0f5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const urlParams = new URLSearchParams(window.location.search);
const myName = (urlParams.get('u') || "immu").toLowerCase();

/* ---------------- ONLINE STATUS ---------------- */
function setOnline() {
    const ref = db.ref("status/" + myName);

    db.ref(".info/connected").on("value", snap => {
        if (snap.val()) {
            ref.set("online");
            ref.onDisconnect().set("offline");
        }
    });
}
setOnline();

db.ref("status").on("value", snap => {
    const d = snap.val() || {};
    updateStatus("immu", d.immu);
    updateStatus("sappii", d.sappii);
});

function updateStatus(user, status) {
    const el = document.getElementById(user + "Status");
    if (!el) return;
    el.style.background = status === "online" ? "#4ade80" : "gray";
}

/* ---------------- TURN ---------------- */
db.ref("gameState").on("value", snap => {
    const d = snap.val() || {};

    document.getElementById("immuScore").innerText = d.score1 || 0;
    document.getElementById("sappiiScore").innerText = d.score2 || 0;

    document.getElementById("box-immu").classList.toggle("active-turn", d.turn === "immu");
    document.getElementById("box-sappii").classList.toggle("active-turn", d.turn === "sappii");

    document.getElementById("immuAvatar").classList.toggle("active", d.turn === "immu");
    document.getElementById("sappiiAvatar").classList.toggle("active", d.turn === "sappii");
});

/* ---------------- CHAT ---------------- */
const chatRef = db.ref("chat");

function sendMessage() {
    const i = document.getElementById("chatInput");
    if (!i.value) return;

    chatRef.push({ sender: myName, text: i.value });
    i.value = "";
}

chatRef.on("child_added", snap => {
    const m = snap.val();
    const div = document.createElement("div");

    div.className = "chat-msg " + (m.sender === myName ? "msg-mine" : "msg-partner");
    div.innerText = m.sender + ": " + m.text;

    document.getElementById("chatMessages").appendChild(div);
});

/* ---------------- EMOJI ---------------- */
const reactionRef = db.ref("reactions");

function sendReaction(e) {
    reactionRef.push({ emoji: e, time: Date.now() });
}

reactionRef.on("child_added", snap => {
    const d = snap.val();
    if (Date.now() - d.time < 3000) createEmoji(d.emoji);
});

function createEmoji(e) {
    const el = document.createElement("div");
    el.className = "floating-emoji";
    el.innerText = e;

    el.style.left = Math.random() * window.innerWidth + "px";

    document.body.appendChild(el);

    setTimeout(() => el.remove(), 2500);
}

</script>

</body>
</html>
