<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immu's Games Hub</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Latha&display=swap');
        
        /* CSS Variables */
        :root {
            --bg-color: #050816;
            --card-bg: rgba(255, 255, 255, 0.05);
            --primary-color: #1db954;
            --secondary-color: #10b981;
            --accent-color: #4ade80;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --glow-shadow: rgba(29, 185, 84, 0.35);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; font-family:'Inter', 'Latha', sans-serif;}

        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; overflow-x: hidden; 
            transition: background 0.5s ease; 
        }

        /* NEON BACKGROUND CANVAS */
        #neonCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }

        .container { width: 100%; max-width: 430px; padding: 20px; animation: slideUp 0.6s ease-out forwards; z-index: 1; padding-bottom: 120px;}
        
        @keyframes slideUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Toast */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: #fff; padding: 12px 24px; border-radius: 30px; font-weight: bold; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; box-shadow: 0 10px 25px rgba(0,0,0,0.5); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease; opacity: 0; z-index: 2000; pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Headers & Top Nav */
        .home-top-bar, .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .brand { display: flex; align-items: center; gap: 14px; }
        .brand-box { width: 42px; height: 42px; border-radius: 14px; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); display: flex; justify-content: center; align-items: center; box-shadow: 0 5px 15px var(--glow-shadow); }
        .brand-box::before { content: ''; width: 14px; height: 14px; border-radius: 50%; background: white; }
        .brand h2 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.5px; }

        .theme-btn { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 30px; cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 6px 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.3s; color: white; font-weight: bold; font-size: 9px; letter-spacing: 1px;}
        .theme-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--primary-color); box-shadow: 0 0 10px var(--primary-color); }

        .card { background: var(--card-bg); backdrop-filter: blur(25px); border-radius: 36px; padding: 25px; box-shadow: 0 15px 50px rgba(0,0,0,.45), inset 0 0 40px rgba(255,255,255,.02); border: 1px solid var(--border-color); margin-bottom: 20px; text-align: center;}
        
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--border-color); background-color: rgba(0,0,0,0.3); color: var(--text-main); font-family: inherit; font-size: 12px; font-weight: 600; text-align: center; transition: 0.3s; letter-spacing: 1px;}
        input:focus { outline: none; border-color: var(--primary-color); box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 0 15px var(--glow-shadow); }
        
        button.btn-main { width: 100%; padding: 16px; margin-top: 15px; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); border: none; border-radius: 18px; color: white; font-weight: 800; cursor: pointer; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; box-shadow: 0 10px 30px var(--glow-shadow);}
        button.btn-main:active { transform: scale(0.96); }

        /* MASKING VIEW - Tamil Native Format */
        .masked-container { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; margin: 15px 0 20px 0; line-height: 1.6; font-family: 'Latha', sans-serif;}
        .mask-char { color: var(--text-main); font-size: 28px; font-weight: 800; text-shadow: 0 0 15px rgba(255,255,255,0.4); }
        .mask-dash { color: var(--accent-color); font-size: 28px; font-weight: 800; text-shadow: 0 0 15px rgba(74, 222, 128, 0.4); }
        .letter-count { font-size: 9px; font-weight: 800; background: rgba(74, 222, 128, 0.1); color: var(--accent-color); display: inline-block; padding: 4px 12px; border-radius: 8px; border: 1px solid var(--accent-color); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 20px;}
        .preview-text { color: var(--accent-color); font-size: 20px; font-weight: 800; margin: 5px 0 15px 0; min-height: 30px; font-family: 'Latha', sans-serif; opacity: 0.9;}
        
        .hint-text { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 15px; border-radius: 999px; font-size: 10px; font-weight: bold; margin-bottom: 15px; display: inline-flex; align-items: center; gap: 8px; }
        .hint-text::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--accent-color); box-shadow: 0 0 10px var(--accent-color);}

        .hidden { display: none !important; }

        /* VELORA PLAYER UI */
        .velora-cover-wrap { position: relative; padding: 18px; margin-top:-10px;}
        .velora-cover-img { width: 100%; height: 260px; object-fit: cover; border-radius: 28px; box-shadow: 0 10px 40px rgba(0,0,0,.5); }
        
        .velora-seek { margin-top: 15px; padding: 0 15px;}
        .velora-line { height: 5px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; position: relative;}
        .velora-progress { width: 0%; height: 100%; background: linear-gradient(90deg, var(--primary-color), var(--secondary-color)); border-radius: 999px; transition: width 0.1s linear;}
        .velora-time { margin-top: 12px; display: flex; justify-content: space-between; color: var(--text-muted); font-size: .82rem;}
        
        .velora-controls { margin-top: 25px; display: flex; justify-content: center; align-items: center; gap: 20px; }
        .velora-ctrl-btn { width: 62px; height: 62px; border: none; border-radius: 22px; background: rgba(255,255,255,.05); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; color: #cbd5e1;}
        .velora-ctrl-btn:active { transform: scale(0.9); }
        .velora-play-btn { width: 82px; height: 82px; border-radius: 28px; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); box-shadow: 0 10px 30px var(--glow-shadow); color: white; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; border: none;}
        .velora-play-btn:active { transform: scale(0.92); }
        
        .svg-icon { stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .fill-icon { fill: currentColor; stroke: none; }

        /* Navigation Bar */
        .navbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 390px; padding: 10px 10px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08); border-radius: 30px; backdrop-filter: blur(25px); display: flex; justify-content: space-around; box-shadow: 0 10px 35px rgba(0,0,0,.45); z-index: 100; }
        .nav-item { width: 50px; height: 50px; border-radius: 22px; background: transparent; display: flex; justify-content: center; align-items: center; cursor: pointer; color: #64748b; transition: 0.3s; }
        .nav-item.active { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); box-shadow: 0 10px 25px var(--glow-shadow); color: white; }
        .nav-item svg { width: 22px; height: 22px; }

        /* SCORE BOARD */
        .vs-container { display: flex; justify-content: space-around; align-items: center; margin-bottom: 20px; }
        .player-box { background: var(--card-bg); border: 1px solid var(--border-color); text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; width: 90px; padding: 15px 10px; border-radius: 20px; transition: all 0.4s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.3);}
        .active-turn { border: 1px solid var(--primary-color); box-shadow: 0 0 20px var(--glow-shadow);}
        .score-val { font-size: 24px; font-weight: 800; color: var(--primary-color); text-shadow: 0 2px 10px var(--glow-shadow); }
        .avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--border-color); background-size: cover; background-position: center; background-color: #1D102E;}
        .immu-pic { background-image: url('1000242624.jpg'); } 
        .sappii-pic { background-image: url('1000242625.jpg'); } 

        /* CHAT */
        .chat-messages { height: 180px; overflow-y: auto; padding: 15px 10px; border: 1px solid var(--border-color); border-radius: 12px; background: rgba(0,0,0,0.2); margin-bottom: 5px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;}
        .message { padding: 10px 14px; max-width: 80%; display: flex; flex-direction: column; position: relative; animation: slideUp 0.3s ease-out; box-shadow: 0 4px 15px rgba(0,0,0,0.2);}
        .my-message { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); align-self: flex-end; color: #fff; border-radius: 16px 16px 0 16px; }
        .partner-message { background: rgba(255,255,255,0.08); border: 1px solid var(--border-color); align-self: flex-start; color: var(--text-main); border-radius: 16px 16px 16px 0; }
        
        .chat-input-group { display: flex; gap: 8px; align-items: center; position: relative; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 25px; padding: 4px 4px 4px 10px;}
        .chat-input { margin: 0; text-align: left; background: transparent; border: none; padding: 10px 0; box-shadow: none; font-size: 12px; font-weight: 600; text-transform:none;}
    </style>
</head>
<body>

<canvas id="neonCanvas"></canvas>

<audio id="sharedAudio" preload="auto"></audio>

<div id="toast" class="toast">NEW MESSAGE</div>

<div class="navbar" id="bottomNav">
    <div class="nav-item active" onclick="switchTab('home', this)">
        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    </div>
    <div class="nav-item" onclick="switchTab('movie', this)">
        <svg class="svg-icon" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>
    </div>
    <div class="nav-item" onclick="switchTab('word', this)">
        <svg class="svg-icon" viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>
    </div>
    <div class="nav-item" onclick="switchTab('music', this)">
        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
    </div>
</div>

<div class="container" id="homeTab">
    <div class="home-top-bar">
        <div class="brand">
            <div class="brand-box"></div>
            <h2>Immu's Hub</h2>
        </div>
        <button class="theme-btn" onclick="cycleTheme()"><div class="theme-dot"></div> THEME</button>
    </div>

    <div class="card" style="margin-top:20px;">
        <h1 style="font-size:2rem; font-weight:800; text-transform:uppercase;">Welcome<br>Partner</h1>
        <p style="color:var(--text-muted); font-size:11px; margin-top:10px;">Select a game from the bottom menu to start playing!</p>
        
        <div class="vs-container" style="margin-top:30px;">
            <div class="player-box" style="width:100px;">
                <div class="avatar immu-pic"></div>
                <div class="player-name" style="margin-top:10px;">IMMU</div>
            </div>
            <div class="vs-badge" style="font-size:16px;">&</div>
            <div class="player-box" style="width:100px;">
                <div class="avatar sappii-pic"></div>
                <div class="player-name" style="margin-top:10px;">SAPPII</div>
            </div>
        </div>
    </div>
</div>

<div class="container hidden" id="gameUIContainer">
    <div class="top-nav">
        <h2 id="activeGameBadge" class="game-title-text" style="font-size: 16px;">GAME</h2>
        <button class="theme-btn" onclick="openResetModal()">RESET</button>
    </div>

    <div class="vs-container" id="vsScoreBoard">
        <div id="box-immu" class="player-box">
            <div class="avatar immu-pic"></div>
            <div id="immuScore" class="score-val">0</div>
        </div>
        <div class="vs-badge">VS</div>
        <div id="box-sappii" class="player-box">
            <div class="avatar sappii-pic"></div>
            <div id="sappiiScore" class="score-val">0</div>
        </div>
    </div>

    <datalist id="movieList"></datalist>
    <datalist id="songList"></datalist>
    <div id="gameContentArea"></div>

    <div class="card" style="padding:15px;" id="chatArea">
        <h3 style="font-size: 11px; margin-bottom: 10px; text-align:left;">CHAT & COMMANDS</h3>
        <div id="chatMessages" class="chat-messages"></div>
        <span id="typingIndicator" style="font-size:9px; color:var(--accent-color); float:left; margin-bottom:5px;" class="hidden">TYPING...</span>
        <div style="clear:both;"></div>
        
        <div class="chat-input-group">
            <input type="text" id="chatInput" class="chat-input" placeholder="Type message or /add 1">
            <button class="btn-main" style="width:auto; margin:0; padding:10px 20px; font-size:10px;" onclick="sendChatMessage()">SEND</button>
        </div>
    </div>
</div>

<div id="resetModal" class="modal hidden">
    <div class="modal-content">
        <h3 style="margin-top: 0; color: var(--text-main); font-weight:800; font-size:16px;">RESET GAME?</h3>
        <div style="display: flex; gap: 10px; margin-top: 25px; flex-direction: column;">
            <button class="btn-main" onclick="confirmReset('immu')">IMMU START (MOVIE)</button>
            <button class="btn-main" onclick="confirmReset('sappii')" style="background:transparent; border:1px solid var(--border-color); box-shadow:none;">SAPPII START (MOVIE)</button>
            <button class="btn-main" onclick="confirmResetWord()" style="background: var(--accent-color); color:#000;">RESET WORD RACE</button>
            <button class="btn-main" onclick="closeResetModal()" style="background:transparent; border:1px dashed red; color:red; box-shadow:none;">CANCEL</button>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE SETUP ---
    const firebaseConfig = {
        apiKey: "AIzaSyCdhWff4X_XHvoIw_mhFDGRjy9vC4ymFc4",
        authDomain: "moviename-26960.firebaseapp.com",
        databaseURL: "https://moviename-26960-default-rtdb.firebaseio.com",
        projectId: "moviename-26960",
        storageBucket: "moviename-26960.firebasestorage.app",
        messagingSenderId: "745803258160",
        appId: "1:745803258160:web:94974f7633fd84a1f3d0f5",
        measurementId: "G-FSX18NDWSY"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const myName = (urlParams.get('u') || "immu").toLowerCase(); 
    const partnerName = (myName === "immu") ? "sappii" : "immu";

    let activeGame = 'home';
    let gameState = {}; let wordGameState = {}; let musicStateObj = {}; 
    let MOVIE_COLLECTION = []; let SONG_COLLECTION = [];
    const audioEl = document.getElementById('sharedAudio');

    // --- 🎨 THEMES ---
    const themes = [
        { vars: { '--bg-color': '#0d0614', '--card-bg': 'rgba(29, 16, 46, 0.7)', '--primary-color': '#1db954', '--secondary-color': '#10b981', '--accent-color': '#4ade80', '--border-color': 'rgba(255, 255, 255, 0.08)' } },
        { vars: { '--bg-color': '#050a17', '--card-bg': 'rgba(16, 26, 50, 0.7)', '--primary-color': '#00d2ff', '--secondary-color': '#3a7bd5', '--accent-color': '#6FFFE9', '--border-color': 'rgba(255, 255, 255, 0.1)' } },
        { vars: { '--bg-color': '#0a0a0a', '--card-bg': 'rgba(20, 20, 20, 0.8)', '--primary-color': '#FF003C', '--secondary-color': '#D9002E', '--accent-color': '#00FF41', '--border-color': 'rgba(255, 255, 255, 0.08)' } },
        { vars: { '--bg-color': '#1a0b2e', '--card-bg': 'rgba(35, 15, 60, 0.7)', '--primary-color': '#d946ef', '--secondary-color': '#a855f7', '--accent-color': '#f472b6', '--border-color': 'rgba(217, 70, 239, 0.2)' } }
    ];
    let currentThemeIndex = localStorage.getItem('appTheme') ? parseInt(localStorage.getItem('appTheme')) : 0;
    let particleColor1 = '#1db954'; let particleColor2 = '#4ade80';

    function applyTheme(index) {
        for (const [key, value] of Object.entries(themes[index].vars)) { document.documentElement.style.setProperty(key, value); }
        particleColor1 = themes[index].vars['--primary-color']; particleColor2 = themes[index].vars['--accent-color'];
    }
    function cycleTheme() {
        currentThemeIndex = (currentThemeIndex + 1) % themes.length; localStorage.setItem('appTheme', currentThemeIndex); applyTheme(currentThemeIndex);
    }
    applyTheme(currentThemeIndex);

    // --- 🌌 PARTICLES ---
    const canvas = document.getElementById('neonCanvas'); const ctx = canvas.getContext('2d'); let particlesArray = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initParticles(); }
    window.addEventListener('resize', resizeCanvas);
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 1;
            this.speedX = Math.random() * 0.4 - 0.2; this.speedY = Math.random() * 0.4 - 0.2;
            this.colorType = Math.random() > 0.5 ? 1 : 2; this.opacity = Math.random() * 0.5 + 0.1;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            if (this.x < 0) this.x = canvas.width; if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height; if (this.y > canvas.height) this.y = 0;
        }
        draw() {
            ctx.globalAlpha = this.opacity; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.colorType === 1 ? particleColor1 : particleColor2;
            ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle; ctx.fill(); ctx.globalAlpha = 1; 
        }
    }
    function initParticles() {
        particlesArray = []; let numberOfParticles = (canvas.width * canvas.height) / 12000;
        if (numberOfParticles > 60) numberOfParticles = 60;
        for (let i = 0; i < numberOfParticles; i++) particlesArray.push(new Particle());
    }
    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); particlesArray[i].draw(); }
        requestAnimationFrame(animateParticles);
    }
    resizeCanvas(); animateParticles(); 

    // --- AUTO-SWAP TXT LOADER ---
    async function loadMoviesFromTXT() {
        MOVIE_COLLECTION = []; SONG_COLLECTION = [];
        try {
            const cacheBuster = "?v=" + new Date().getTime();
            const engRes = await fetch('movies_eng.txt' + cacheBuster);
            const tamilRes = await fetch('movies_tamil.txt' + cacheBuster);
            const heroRes = await fetch('heroes.txt' + cacheBuster);
            const songsRes = await fetch('songs/songs.txt' + cacheBuster);
            
            if (engRes.ok && tamilRes.ok) {
                let eLines = (await engRes.text()).split('\n').map(l => l.replace(/\r/g, '').trim());
                let tLines = (await tamilRes.text()).split('\n').map(l => l.replace(/\r/g, '').trim());
                let hLines = [];
                if (heroRes.ok) hLines = (await heroRes.text()).split('\n').map(l => l.replace(/\r/g, '').trim());
                if (eLines.length > 0 && /[\u0B80-\u0BFF]/.test(eLines[0])) { let temp = eLines; eLines = tLines; tLines = temp; }
                const minLen = Math.min(eLines.length, tLines.length);
                for(let i=0; i<minLen; i++){
                    if(eLines[i] && tLines[i]) MOVIE_COLLECTION.push({ eng: eLines[i], tamil: tLines[i], hero: hLines[i] || "" });
                }
            }
            if (songsRes.ok) {
                SONG_COLLECTION = (await songsRes.text()).split('\n').map(l => l.replace(/\r/g, '').trim()).filter(l => l !== "");
            }
        } catch (error) { console.error("TXT Load Error:", error); }

        const list = document.getElementById('movieList'); list.innerHTML = "";
        MOVIE_COLLECTION.forEach(m => { const option = document.createElement('option'); option.value = m.eng; list.appendChild(option); });
        const songList = document.getElementById('songList'); songList.innerHTML = "";
        SONG_COLLECTION.forEach(s => { const option = document.createElement('option'); option.value = s; songList.appendChild(option); });
    }
    window.onload = loadMoviesFromTXT;

    // --- NAVIGATION LOGIC ---
    function switchTab(tab, element) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if(element) element.classList.add('active');
        
        document.getElementById('homeTab').classList.add('hidden');
        document.getElementById('gameUIContainer').classList.add('hidden');

        activeGame = tab;
        
        if (tab === 'home') {
            document.getElementById('homeTab').classList.remove('hidden');
        } else {
            document.getElementById('gameUIContainer').classList.remove('hidden');
            if (tab === 'movie') {
                document.getElementById('activeGameBadge').innerText = "MOVIE GUESSING";
                document.getElementById('vsScoreBoard').classList.remove('hidden');
                document.getElementById('chatArea').classList.remove('hidden');
                renderMovieGameUI();

    // --- 🎵 MUSIC DIRECT PLAY & SYNC LOGIC ---
    function formatAudioUrl(rawUrl) {
        if (!rawUrl) return "";
        if (rawUrl.startsWith('http')) return rawUrl;
        let finalUrl = rawUrl;
        if (!finalUrl.startsWith('songs/')) finalUrl = 'songs/' + finalUrl;
        if (!finalUrl.endsWith('.mp3')) finalUrl += '.mp3';
        return encodeURI(finalUrl); 
    }

    db.ref('musicState').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        musicStateObj = { isPlaying: data.isPlaying || false, currentTime: data.currentTime || 0, url: data.url || '', updatedBy: data.updatedBy || '' };
        
        let playUrl = formatAudioUrl(musicStateObj.url);

        if (musicStateObj.updatedBy !== myName) {
            // Apply remote updates only
            if (playUrl && playUrl !== audioEl.src) {
                audioEl.src = playUrl;
                audioEl.load();
            }
            if (Math.abs(audioEl.currentTime - musicStateObj.currentTime) > 1.5) {
                audioEl.currentTime = musicStateObj.currentTime;
            }
            if (musicStateObj.isPlaying && audioEl.paused) {
                audioEl.play().catch(e => console.log("Waiting for user tap."));
            } else if (!musicStateObj.isPlaying && !audioEl.paused) {
                audioEl.pause();
            }
        }
        if (activeGame === 'music') renderMusicUI();
    });

        if (activeGame === 'music') {
            const progress = document.getElementById('musicProgress');
            const currDisplay = document.getElementById('currentTimeDisplay');
            const durDisplay = document.getElementById('durationDisplay');
            if (progress && audioEl.duration) {
                const pct = (audioEl.currentTime / audioEl.duration) * 100;
                progress.style.width = `${pct}%`;
                currDisplay.innerText = formatTime(audioEl.currentTime);
                durDisplay.innerText = formatTime(audioEl.duration);
            }
        }
    });

    function formatTime(secs) {
        if(isNaN(secs)) return "00:00";
        const m = Math.floor(secs / 60); const s = Math.floor(secs % 60);
        return `${m < 10 ? '0':''}${m}:${s < 10 ? '0':''}${s}`;
    }

            audioEl.pause();

        } else {
            audioEl.play().catch(e => alert("Please tap anywhere first! " + e.message));

        setTimeout(() => { if(playBtn) playBtn.style.transform = "scale(1)"; }, 150);

    function getLetterCountExact(str) {
        if (!str) return 0;
        let segments = [];
        if (window.Intl && Intl.Segmenter) {
            const segmenter = new Intl.Segmenter('ta-IN', { granularity: 'grapheme' });
            segments = Array.from(segmenter.segment(str)).map(s => s.segment);
        } else { segments = str.match(/[\u0B80-\u0BFF][\u0BBE-\u0BCC\u0BCD\u0BD7]*/g) || []; }
        return segments.filter(c => c.trim() !== '').length;
    }

    function maskExactString(str) {
        if (!str) return "";
        let html = `<div class="masked-container">`;
        const tokens = str.match(/[\u0B80-\u0BFF][\u0BBE-\u0BCC\u0BCD\u0BD7]*|\s+/g) || [];

        let firstIdx = -1; let lastIdx = -1;
        for (let i = 0; i < tokens.length; i++) {
            if (tokens[i].trim() !== '') {
                if (firstIdx === -1) firstIdx = i;
                lastIdx = i;
            }
        }
        if (firstIdx === -1) return `<span class="mask-dash">_</span>`;

        let wordHtml = `<div style="display:flex; gap:6px; flex-wrap:wrap; justify-content:center;">`;
        tokens.forEach((char, idx) => {
            if (char.trim() === '') {
                wordHtml += `</div><div style="width:15px; height:5px;"></div><div style="display:flex; gap:6px;">`;
            } else if (idx === firstIdx || idx === lastIdx) {
                wordHtml += `<span class="mask-char">${char}</span>`;
            } else {
                wordHtml += `<span class="mask-dash">_</span>`;
            }
        });

        wordHtml += `</div>`; html += wordHtml + `</div>`;
        return html;
    }

    async function submitRaceWord() {
        const word = document.getElementById('raceWordInput').value.trim().toLowerCase();
        const start = wordGameState.startLetter.toLowerCase(); const end = wordGameState.endLetter.toLowerCase();
        
        if (word.length < 2 || !word.startsWith(start) || !word.endsWith(end)) {
            document.getElementById('raceFeedback').innerText = `WORD MUST START WITH ${start.toUpperCase()} AND END WITH ${end.toUpperCase()}!`; return;
        }
        if (wordGameState.usedWords && wordGameState.usedWords[word]) {
            document.getElementById('raceFeedback').innerText = `ALREADY USED! FIND A NEW WORD.`; return;
        }

        document.getElementById('raceFeedback').innerText = `CHECKING DICTIONARY... ⏳`;
        document.getElementById('raceFeedback').style.color = "var(--text-main)";

        try {
            const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
            if (!res.ok) {
                document.getElementById('raceFeedback').innerText = `NOT A VALID ENGLISH WORD!`;
                document.getElementById('raceFeedback').style.color = "var(--primary-color)";
                return;
            }
        } catch (e) {}

        const scoreKey = (myName === "immu") ? 'score1' : 'score2';
        db.ref(`wordGameState/${scoreKey}`).transaction(s => (s || 0) + 1);
        db.ref(`wordGameState/usedWords/${word}`).set(true); 
        db.ref('wordGameState').update({ status: "letter_phase", p1Letter: "", p2Letter: "", startLetter: "", endLetter: "" });
        db.ref('chatMessages').push({ sender: "SYSTEM", text: `${myName.toUpperCase()} SCORED 1 POINT WITH "${word.toUpperCase()}"!`, timestamp: firebase.database.ServerValue.TIMESTAMP });
    }

    function skipWord() {
        db.ref('wordGameState').update({ status: "letter_phase", p1Letter: "", p2Letter: "", startLetter: "", endLetter: "" });
        db.ref('chatMessages').push({ sender: "SYSTEM", text: `THIS ROUND WAS SKIPPED!`, timestamp: firebase.database.ServerValue.TIMESTAMP });
    }

    // --- RESET MODALS ---
    function openResetModal() { document.getElementById('resetModal').classList.remove('hidden'); }
    function closeResetModal() { document.getElementById('resetModal').classList.add('hidden'); }
    
    function confirmReset(starter) { 
        db.ref('gameState').set({ turn: starter, status: "set", score1: 0, score2: 0, movieEng: "", movieTamil: "", hint: "" }); 
        db.ref('chatMessages').remove(); 
        closeResetModal(); 
    }
    function confirmResetWord() { 
        db.ref('wordGameState').set({ status: "letter_phase", p1Letter: "", p2Letter: "", startLetter: "", endLetter: "", score1: 0, score2: 0, usedWords: null }); 
        db.ref('chatMessages').remove(); 
        closeResetModal(); 
    }

    // --- ONLINE STATUS & CHAT ---
    db.ref('.info/connected').on('value', (snapshot) => {
        if (snapshot.val() === true) {
            const myPresenceRef = db.ref(`presence/${myName}`);
            myPresenceRef.onDisconnect().set({ online: false, lastSeen: firebase.database.ServerValue.TIMESTAMP });
            myPresenceRef.set({ online: true, lastSeen: firebase.database.ServerValue.TIMESTAMP });
            document.getElementById(`status-${myName}`).className = 'status-dot online';
        }
    });

    db.ref(`presence/${partnerName}`).on('value', (snapshot) => {
        const data = snapshot.val();
        document.getElementById(`status-${partnerName}`).className = data && data.online ? 'status-dot online' : 'status-dot offline';
    });

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg; toast.classList.add('show');
        try { const audio = new Audio("https://actions.google.com/sounds/v1/communication/bubble_pop.ogg"); audio.play(); } catch(e){}
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    db.ref('chatMessages').on('value', (snapshot) => {
        if(!snapshot.exists()) document.getElementById('chatMessages').innerHTML = ''; 
    });

    let isChatLoaded = false;
    db.ref('chatMessages').once('value', () => { isChatLoaded = true; });

    db.ref('chatMessages').on('child_added', (snapshot) => {
        const data = snapshot.val();
        const msgKey = snapshot.key;
        const chatMessagesDiv = document.getElementById('chatMessages');
        const isMine = data.sender === myName.toUpperCase();
        const isSystem = data.sender === "SYSTEM" || data.sender === "ANTI-CHEAT";
        
        const messageDiv = document.createElement('div');
        messageDiv.id = `msg-${msgKey}`;
        messageDiv.className = isSystem ? (data.sender === "ANTI-CHEAT" ? 'message cheat-message' : 'message system-message') : (isMine ? 'message my-message' : 'message partner-message'); 
        
        const time = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        messageDiv.innerHTML = `
            <div class="message-sender" style="${isSystem ? 'color:inherit; font-size:10px;' : ''}">${isMine ? 'YOU' : data.sender} (${time})</div>
            <div class="message-text">${data.text}</div>
        `;
        
        chatMessagesDiv.appendChild(messageDiv);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;

        if (isChatLoaded && !isMine && !isSystem) showToast(`NEW MESSAGE FROM ${data.sender}`);
    });

    function sendChatMessage() {
        const chatInput = document.getElementById('chatInput');
        const text = chatInput.value.trim();
        if(!text) return;

        if (myName === 'immu') {
            if (text.startsWith('/add ')) {
                const pts = parseInt(text.replace('/add ', ''));
                if (!isNaN(pts)) {
                    if (activeGame === 'movie') db.ref(`gameState/score1`).transaction(s => (s || 0) + pts);
                    if (activeGame === 'word') db.ref(`wordGameState/score1`).transaction(s => (s || 0) + pts);
                    showToast(`SECRET: +${pts} POINTS ADDED!`);
                }
                chatInput.value = ""; return; 
            }
            if (text.startsWith('/minus ')) {
                const pts = parseInt(text.replace('/minus ', ''));
                if (!isNaN(pts)) {
                    if (activeGame === 'movie') db.ref(`gameState/score2`).transaction(s => (s || 0) - pts);
                    if (activeGame === 'word') db.ref(`wordGameState/score2`).transaction(s => (s || 0) - pts);
                    showToast(`SECRET: -${pts} POINTS TAKEN FROM SAPPII!`);
                }
                chatInput.value = ""; return; 
            }
        }
        db.ref('chatMessages').push({ sender: myName.toUpperCase(), text: text, timestamp: firebase.database.ServerValue.TIMESTAMP });
        chatInput.value = ""; document.getElementById('emojiPicker').classList.add('hidden');
    }

    document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendChatMessage(); });
</script>
</body>
</html>
