<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Couple Movie Game 💖</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { background-color: #120A1E; color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; flex-direction: column;}
        .container { width: 90%; max-width: 400px; padding: 20px; }
        
        .vs-container { display: flex; justify-content: space-around; align-items: center; margin-bottom: 25px; }
        .player-box { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; width: 90px; transition: 0.3s; padding: 10px; border-radius: 15px;}
        .active-turn { background: rgba(255, 75, 114, 0.15); border: 1px solid #FF4B72; }
        
        .avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #3A2359; background-size: cover; background-position: center; background-color: #1D102E; }
        .immu-pic { background-image: url('https://api.dicebear.com/7.x/pixel-art/svg?seed=Immu&backgroundColor=b6e3f4'); border-color: #4ade80; }
        .sappii-pic { background-image: url('https://api.dicebear.com/7.x/pixel-art/svg?seed=Sappii&backgroundColor=ffdfbf'); border-color: #FF4B72; }
        
        .player-name { font-size: 13px; font-weight: 600; color: #fff; }
        .score-val { font-size: 24px; font-weight: bold; color: #FF4B72; }
        .vs-badge { background: #3A2359; padding: 6px 12px; border-radius: 50%; font-size: 12px; color: #aaa; }

        .card { background-color: #1D102E; border-radius: 25px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); text-align: center; border: 1px solid #2D1A45; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #3A2359; background-color: #120A1E; color: white; box-sizing: border-box; font-family: inherit; }
        button { width: 100%; padding: 15px; margin-top: 10px; background: linear-gradient(135deg, #FF4B72, #FF7694); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; font-size: 16px; transition: 0.2s;}
        button:active { transform: scale(0.98); }
        
        .give-up-btn { background: transparent; border: 1px solid #aaa; color: #aaa; margin-top: 10px; }
        .reset-btn { background: transparent; border: 1px solid #FF4B72; color: #FF4B72; margin-top: 30px; font-size: 14px; padding: 10px; }

        .masked-word { font-size: 24px; letter-spacing: 5px; margin: 25px 0; color: #4ade80; font-weight: bold; }
        .audio-btn { background-color: #FF4B72; width: 50px; height: 50px; border-radius: 50%; margin: 10px auto; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 20px; }
        .hidden { display: none !important; }
        .turn-indicator { font-size: 11px; color: #4ade80; font-weight: bold; margin-top: 5px; text-transform: uppercase;}

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18, 10, 30, 0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box;}
        .modal-content { background: #1D102E; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #FF4B72; width: 100%; max-width: 320px; }
        .modal-btn-group { display: flex; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="vs-container">
        <div id="box-immu" class="player-box">
            <div class="avatar immu-pic"></div>
            <div class="player-name">immu</div>
            <div id="immuScore" class="score-val">0</div>
            <div id="turn-immu" class="turn-indicator hidden">SETTING...</div>
        </div>
        <div class="vs-badge">VS</div>
        <div id="box-sappii" class="player-box">
            <div class="avatar sappii-pic"></div>
            <div class="player-name">Sappii</div>
            <div id="sappiiScore" class="score-val">0</div>
            <div id="turn-sappii" class="turn-indicator hidden">SETTING...</div>
        </div>
    </div>
    <div id="gameContent"></div>
    <button class="reset-btn" onclick="openResetModal()">Reset Game 🔄</button>
</div>

<div id="resetModal" class="modal hidden">
    <div class="modal-content">
        <h3 style="margin-top: 0; color: #fff;">Who will start?</h3>
        <p style="font-size: 13px; color: #aaa;">Scores will reset. Pick a starter!</p>
        <div class="modal-btn-group">
            <button onclick="confirmReset('immu')" style="background: #4ade80; color: #120A1E;">Immu 👦</button>
            <button onclick="confirmReset('sappii')">Sappii 👧</button>
        </div>
        <button onclick="closeResetModal()" style="background:none; border:none; color:#aaa; margin-top:10px;">Cancel</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCdhWff4X_XHvoIw_mhFDGRjy9vC4ymFc4",
        authDomain: "moviename-26960.firebaseapp.com",
        databaseURL: "https://moviename-26960-default-rtdb.firebaseio.com",
        projectId: "moviename-26960",
        storageBucket: "moviename-26960.firebasestorage.app",
        messagingSenderId: "745803258160",
        appId: "1:745803258160:web:94974f7633fd84a1f3d0f5",
        measurementId: "G-FSX18NDWSY"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const myName = (urlParams.get('u') || "immu").toLowerCase(); 
    const partnerName = (myName === "immu") ? "sappii" : "immu";

    let gameState = {};

    db.ref('gameState').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        gameState = {
            turn: data.turn || "immu",
            status: data.status || "set",
            score1: data.score1 || 0,
            score2: data.score2 || 0,
            movie: data.movie || "",
            hint: data.hint || ""
        };
        renderUI();
    });

    function renderUI() {
        const container = document.getElementById('gameContent');
        document.getElementById('immuScore').innerText = gameState.score1;
        document.getElementById('sappiiScore').innerText = gameState.score2;
        document.getElementById('box-immu').classList.toggle('active-turn', gameState.turn === 'immu');
        document.getElementById('box-sappii').classList.toggle('active-turn', gameState.turn === 'sappii');
        document.getElementById('turn-immu').classList.toggle('hidden', gameState.turn !== 'immu');
        document.getElementById('turn-sappii').classList.toggle('hidden', gameState.turn !== 'sappii');

        if (gameState.status === "set") {
            if (gameState.turn === myName) {
                container.innerHTML = `<div class="card"><h3>🎬 Your Turn</h3><p style="font-size:12px;color:#aaa;">Set a movie for ${partnerName}!</p><input type="text" id="movieInput" placeholder="Movie Name"><input type="text" id="hintInput" placeholder="Add a hint"><button onclick="setMovie()">Start Game 🚀</button></div>`;
            } else {
                container.innerHTML = `<div class="card"><h3>⏳ Waiting...</h3><p>${gameState.turn} is choosing a movie!</p></div>`;
            }
        } else if (gameState.status === "guessing") {
            if (gameState.turn === myName) {
                container.innerHTML = `<div class="card"><h3>🍿 Guessing...</h3><p>${partnerName} is guessing!</p><div class="masked-word">${maskMovie(gameState.movie)}</div></div>`;
            } else {
                container.innerHTML = `<div class="card"><h3>🤔 Guess!</h3><div class="masked-word">${maskMovie(gameState.movie)}</div><div class="audio-btn" onclick="speakMovie('${gameState.movie}')">🔊</div><p style="font-size:14px;color:#FF4B72;">💡 Hint: ${gameState.hint || "No hint"}</p><input type="text" id="guessInput" placeholder="Your Answer"><button onclick="checkGuess()">Submit</button><button class="give-up-btn" onclick="giveUp()">Theriyala 🥺 (+1 to Partner)</button><p id="feedback" style="margin-top:15px;font-weight:bold;"></p></div>`;
            }
        }
    }

    function setMovie() {
        const m = document.getElementById('movieInput').value;
        const h = document.getElementById('hintInput').value;
        if(!m) return alert("Enter movie!");
        db.ref('gameState').update({ movie: m, hint: h, status: "guessing" });
    }

    function checkGuess() {
        if (document.getElementById('guessInput').value.toUpperCase().trim() === gameState.movie.toUpperCase()) {
            const scoreKey = (myName === "immu") ? 'score1' : 'score2';
            db.ref(`gameState/${scoreKey}`).transaction(s => (s || 0) + 1);
            db.ref('gameState').update({ turn: myName, status: "set", movie: "" });
        } else {
            document.getElementById('feedback').innerText = "Wrong! Try again 🥺";
        }
    }

    // UPDATED GIVE UP LOGIC: Point goes to the setter
    function giveUp() {
        const feedback = document.getElementById('feedback');
        feedback.innerText = "The movie was: " + gameState.movie;
        
        // Guesser click panna, Partner-ku point add aagum
        const partnerScoreKey = (myName === "immu") ? 'score2' : 'score1';
        db.ref(`gameState/${partnerScoreKey}`).transaction(s => (s || 0) + 1);
        
        setTimeout(() => {
            db.ref('gameState').update({ turn: myName, status: "set", movie: "" });
        }, 2000);
    }

    function openResetModal() { document.getElementById('resetModal').classList.remove('hidden'); }
    function closeResetModal() { document.getElementById('resetModal').classList.add('hidden'); }
    function confirmReset(starter) { db.ref('gameState').set({ turn: starter, status: "set", score1: 0, score2: 0, movie: "", hint: "" }); closeResetModal(); }
    function maskMovie(m) { return m ? m.split(' ').map(w => w.length <= 2 ? w : w[0] + ' _ '.repeat(w.length - 2) + w[w.length - 1]).join('&nbsp;&nbsp;') : ""; }
    function speakMovie(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
</script>
</body>
</html>
