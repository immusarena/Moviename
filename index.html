<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Couple Movie Game 💖</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { background-color: #120A1E; color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; padding: 20px; }
        
        /* VS Scoreboard Styling */
        .vs-container { display: flex; justify-content: space-around; align-items: center; margin-bottom: 25px; padding: 10px; }
        .player-box { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; width: 80px; }
        
        /* Avatar Placeholder (Based on your pic) */
        .avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #FF4B72; background-size: cover; background-position: center; background-color: #3A2359; }
        .immu-pic { background-image: url('https://api.dicebear.com/7.x/avataaars/svg?seed=Felix'); } /* Boy Avatar */
        .sappii-pic { background-image: url('https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka'); } /* Girl Avatar */
        
        .player-name { font-size: 12px; color: #aaa; margin-top: 5px; }
        .score-val { font-size: 28px; font-weight: bold; color: white; margin-top: -5px; }
        .vs-badge { background: #3A2359; padding: 6px 12px; border-radius: 50%; font-size: 12px; font-weight: bold; color: #aaa; border: 1px solid #2D1A45; }

        .card { background-color: #1D102E; border-radius: 25px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); text-align: center; border: 1px solid #2D1A45; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #3A2359; background-color: #120A1E; color: white; box-sizing: border-box; font-family: inherit; font-size: 14px; }
        button { width: 100%; padding: 15px; margin-top: 10px; background: linear-gradient(135deg, #FF4B72, #FF7694); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; font-size: 16px; box-shadow: 0 4px 15px rgba(255, 75, 114, 0.3); }
        
        .masked-word { font-size: 24px; letter-spacing: 5px; margin: 25px 0; color: #4ade80; font-weight: bold; text-shadow: 0 0 10px rgba(74, 222, 128, 0.3); }
        .audio-btn { background-color: #FF4B72; width: 55px; height: 55px; border-radius: 50%; margin: 10px auto; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 20px; box-shadow: 0 0 20px rgba(255, 75, 114, 0.4); }
        .hidden { display: none; }
        #feedback { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="vs-container">
        <div class="player-box">
            <div class="avatar immu-pic"></div>
            <div class="player-name">immu</div>
            <div id="immuScore" class="score-val">0</div>
        </div>
        
        <div class="vs-badge">VS</div>
        
        <div class="player-box">
            <div class="avatar sappii-pic"></div>
            <div class="player-name">Sappii</div>
            <div id="sappiiScore" class="score-val">0</div>
        </div>
    </div>

    <div id="setScreen" class="card">
        <h3 style="margin-top: 0;">🎬 Set Movie</h3>
        <p style="font-size: 12px; color: #aaa; margin-bottom: 20px;">Enter a movie name for <b>Sappii</b> to guess!</p>
        <input type="text" id="movieInput" placeholder="Movie Name (e.g., 3 Idiots)">
        <input type="text" id="hintInput" placeholder="Add a hint...">
        <button onclick="setMovie()">Send to Sappii 🚀</button>
    </div>

    <div id="guessScreen" class="card hidden">
        <h3 style="margin-top: 0;">🍿 Guess the Movie!</h3>
        <div class="masked-word" id="maskedDisplay">_ _ _ _ _</div>
        
        <div class="audio-btn" onclick="speakMovie()">🔊</div>
        <p style="font-size: 11px; color: #aaa; margin-top: -5px;">Tap to hear the name</p>
        
        <p id="hintText" style="font-size: 14px; color: #FF4B72; background: rgba(255,75,114,0.1); padding: 10px; border-radius: 10px; margin-bottom: 20px;"></p>
        
        <input type="text" id="guessInput" placeholder="Your Answer...">
        <button onclick="checkGuess()">Submit Answer</button>
        <p id="feedback"></p>
    </div>
</div>

<script>
    // Unga Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCdhWff4X_XHvoIw_mhFDGRjy9vC4ymFc4",
        authDomain: "moviename-26960.firebaseapp.com",
        databaseURL: "https://moviename-26960-default-rtdb.firebaseio.com",
        projectId: "moviename-26960",
        storageBucket: "moviename-26960.firebasestorage.app",
        messagingSenderId: "745803258160",
        appId: "1:745803258160:web:94974f7633fd84a1f3d0f5",
        measurementId: "G-FSX18NDWSY"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentMovie = "";
    
    db.ref('gameState').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            currentMovie = (data.movie || "").toUpperCase();
            
            // Score Update
            document.getElementById('immuScore').innerText = data.score1 || 0;
            document.getElementById('sappiiScore').innerText = data.score2 || 0;
            
            if (data.status === "guessing" && currentMovie !== "") {
                document.getElementById('setScreen').classList.add('hidden');
                document.getElementById('guessScreen').classList.remove('hidden');
                updateMaskedDisplay(currentMovie);
                document.getElementById('hintText').innerText = data.hint ? "💡 Hint: " + data.hint : "No hint provided";
            } else {
                document.getElementById('setScreen').classList.remove('hidden');
                document.getElementById('guessScreen').classList.add('hidden');
            }
        }
    });

    function setMovie() {
        const movie = document.getElementById('movieInput').value;
        const hint = document.getElementById('hintInput').value;
        if(!movie) return alert("Movie name enter pannunga!");

        db.ref('gameState').update({
            movie: movie,
            hint: hint,
            status: "guessing"
        });
        
        // Clear inputs
        document.getElementById('movieInput').value = "";
        document.getElementById('hintInput').value = "";
    }

    function updateMaskedDisplay(movie) {
        const masked = movie.split(' ').map(word => {
            if (word.length <= 2) return word;
            return word[0] + ' _ '.repeat(word.length - 2) + word[word.length - 1];
        }).join('&nbsp;&nbsp;');
        document.getElementById('maskedDisplay').innerHTML = masked;
    }

    function speakMovie() {
        if(currentMovie) {
            const utterance = new SpeechSynthesisUtterance(currentMovie);
            window.speechSynthesis.speak(utterance);
        }
    }

    function checkGuess() {
        const guess = document.getElementById('guessInput').value.toUpperCase().trim();
        const feedback = document.getElementById('feedback');
        
        if (guess === currentMovie) {
            feedback.style.color = "#4ade80";
            feedback.innerText = "Correct! Sappii wins a point! 🎉";
            
            // Update Sappii's score (assuming she is the guesser)
            db.ref('gameState/score2').transaction(s => (s || 0) + 1);
            
            setTimeout(() => {
                db.ref('gameState').update({ status: "set", movie: "" });
                document.getElementById('guessInput').value = "";
            }, 2000);
        } else {
            feedback.style.color = "#FF4B72";
            feedback.innerText = "Wrong guess! Try again 🥺";
        }
    }
</script>

</body>
</html>
