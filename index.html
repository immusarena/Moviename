<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamil Couple Movie Game 💖</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Latha&display=swap');

        body {
            background-color: #120A1E;
            color: white;
            font-family: 'Poppins', 'Latha', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            overflow-x: hidden;
            flex-direction: column;
        }

        .container { width: 90%; max-width: 400px; padding: 20px; }

        .vs-container { display: flex; justify-content: space-around; align-items: center; margin-bottom: 25px; }

        .player-box {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            width: 90px;
            padding: 10px;
            border-radius: 15px;
        }

        .active-turn { background: rgba(255, 75, 114, 0.15); border: 1px solid #FF4B72; }

        .avatar { width: 65px; height: 65px; border-radius: 50%; border: 3px solid #3A2359; background-size: cover; background-position: center; }

        .immu-pic { background-image: url('1000242624.jpg'); border-color: #4ade80; }
        .sappii-pic { background-image: url('1000242625.jpg'); border-color: #FF4B72; }

        .player-name { font-size: 13px; font-weight: 600; }
        .score-val { font-size: 24px; font-weight: bold; color: #FF4B72; }

        .vs-badge { background: #3A2359; padding: 6px 12px; border-radius: 50%; font-size: 12px; }

        .card {
            background-color: #1D102E;
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            border: 1px solid #2D1A45;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid #3A2359;
            background-color: #120A1E;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: linear-gradient(135deg, #FF4B72, #FF7694);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .give-up-btn {
            background: transparent;
            border: 1px solid #aaa;
            color: #aaa;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid #FF4B72;
            color: #FF4B72;
        }

        .masked-word {
            font-size: 24px;
            letter-spacing: 3px;
            margin: 15px 0;
            color: #4ade80;
            font-weight: bold;
            word-wrap: break-word;
        }

        .hidden { display: none !important; }

        .chat-container {
            text-align: left;
            background: #120A1E;
            border-radius: 15px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            margin-bottom: 10px;
            border: 1px solid #3A2359;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .chat-msg {
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 80%;
        }

        .msg-mine { background: #FF4B72; align-self: flex-end; }
        .msg-partner { background: #2D1A45; align-self: flex-start; }

        .emoji-bar { display: flex; justify-content: space-evenly; margin-bottom: 20px; }

        .emoji-btn {
            background: #1D102E;
            border: 1px solid #FF4B72;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
        }

        .floating-emoji {
            position: fixed;
            bottom: 80px;
            font-size: 35px;
            animation: floatUp 2.5s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-250px); opacity: 0; }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="vs-container">
        <div id="box-immu" class="player-box">
            <div class="avatar immu-pic"></div>
            <div class="player-name">immu</div>
            <div id="immuScore" class="score-val">0</div>
        </div>

        <div class="vs-badge">VS</div>

        <div id="box-sappii" class="player-box">
            <div class="avatar sappii-pic"></div>
            <div class="player-name">Sappii</div>
            <div id="sappiiScore" class="score-val">0</div>
        </div>
    </div>

    <div class="emoji-bar">
        <button class="emoji-btn" onclick="sendReaction('❤️')">❤️</button>
        <button class="emoji-btn" onclick="sendReaction('😂')">😂</button>
        <button class="emoji-btn" onclick="sendReaction('🥺')">🥺</button>
        <button class="emoji-btn" onclick="sendReaction('🔥')">🔥</button>
    </div>

    <div id="gameContent"></div>

    <div class="card">
        <h4 style="text-align:left;color:#aaa">Chat 💬</h4>
        <div class="chat-container" id="chatMessages"></div>
        <input id="chatInput" onkeypress="handleChatEnter(event)" placeholder="message...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <button class="reset-btn" onclick="openResetModal()">Reset</button>
</div>

<script>
const tamilMapping = { a:'அ', aa:'ஆ', i:'இ', ee:'ஈ', u:'உ', oo:'ஊ', ka:'க', ki:'கி', pa:'ப', ma:'ம', etc:'எ' };

function transliterate(text){
    let res='',i=0,t=text.toLowerCase();
    while(i<t.length){
        let found=false;
        for(let l=3;l>=1;l--){
            let c=t.substring(i,i+l);
            if(tamilMapping[c]){res+=tamilMapping[c];i+=l;found=true;break;}
        }
        if(!found){res+=t[i];i++;}
    }
    return res;
}

const firebaseConfig = {
 apiKey:"xxx",
 databaseURL:"https://moviename-26960-default-rtdb.firebaseio.com",
 projectId:"moviename-26960"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const myName=new URLSearchParams(location.search).get('u')||'immu';

let gameState={};

db.ref('gameState').on('value',s=>{
 gameState=s.val()||{turn:'immu',status:'set',score1:0,score2:0,movie:'',hint:''};
 renderUI();
});

function renderUI(){
document.getElementById('immuScore').innerText=gameState.score1;
document.getElementById('sappiiScore').innerText=gameState.score2;

document.getElementById('box-immu').classList.toggle('active-turn',gameState.turn==='immu');
document.getElementById('box-sappii').classList.toggle('active-turn',gameState.turn==='sappii');

let c=document.getElementById('gameContent');

if(gameState.status==='set'){
 if(gameState.turn===myName){
 c.innerHTML=`
 <div class="card">
 <h3>Your turn</h3>
 <input id="movie" oninput="preview(this.value)" placeholder="movie">
 <p id="prev"></p>
 <input id="hint" placeholder="hint">
 <button onclick="setMovie()">Start</button>
 </div>`;
 }else c.innerHTML=`<div class="card">Waiting...</div>`;
}

else if(gameState.status==='guessing'){
 if(gameState.turn===myName){
 c.innerHTML=`<div class="card"><div class="masked-word">${mask(gameState.movie)}</div></div>`;
 }else{
 c.innerHTML=`
 <div class="card">
 <div class="masked-word">${mask(gameState.movie)}</div>
 <input id="guess" oninput="live(this.value)">
 <p id="live"></p>
 <button onclick="checkGuess()">Submit</button>
 <button class="give-up-btn" onclick="giveUp()">Give Up</button>
 <p id="fb"></p>
 </div>`;
 }
}
}

function setMovie(){
let m=document.getElementById('movie').value;
let h=document.getElementById('hint').value;

db.ref('gameState').update({
 movie:m,
 hint:h,
 status:'guessing',
 turn: myName==='immu'?'sappii':'immu'
});
}

function mask(m){return m.split('').map(x=>x===' '?' ':'*').join('');}

function checkGuess(){
let g=document.getElementById('guess').value.toLowerCase();
if(g===gameState.movie.toLowerCase()){
 db.ref('gameState').update({
  status:'set',
  score1: gameState.turn==='immu'?gameState.score1:gameState.score1+1,
  score2: gameState.turn==='sappii'?gameState.score2:gameState.score2+1
 });
}
else document.getElementById('fb').innerText="Wrong";
}

function giveUp(){
db.ref('gameState').update({status:'set',turn:gameState.turn});
}

function sendMessage(){
let msg=document.getElementById('chatInput').value;
db.ref('chat').push({user:myName,msg});
document.getElementById('chatInput').value='';
}

db.ref('chat').on('child_added',s=>{
let d=s.val();
let div=document.createElement('div');
div.className='chat-msg '+(d.user===myName?'msg-mine':'msg-partner');
div.innerText=d.msg;
document.getElementById('chatMessages').appendChild(div);
});

function sendReaction(e){
let el=document.createElement('div');
el.className='floating-emoji';
el.innerText=e;
document.body.appendChild(el);
setTimeout(()=>el.remove(),2500);
}

function handleChatEnter(e){if(e.key==='Enter')sendMessage();}

</script>
</body>
</html>
