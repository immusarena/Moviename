вАЛfunction transliterate(text) {
let result = "";
let i = 0;
const lower = text.toLowerCase();
while (i < lower.length) {
let found = false;
for (let len = 3; len >= 1; len--) {
let chunk = lower.substring(i, i + len);
if (tamilMapping[chunk]) {
result += tamilMapping[chunk];
i += len;
found = true;
break;
}
}
if (!found) { result += text[i]; i++; }
}
return result;
}

вАЛ// Count pure letters excluding spaces
function getLetterCount(str) {
if(!str) return 0;
const clusters = str.match(/[\u0B80-\u0BFF][\u0BC0-\u0BD7\u0BBE-\u0BBF\u0BC6-\u0BC8\u0BCA-\u0BCC\u0BCD]*|./g) || [];
return clusters.filter(c => c !== ' ').length;
}
вАЛ// Advanced Tamil Letter masking
function maskTamil(str) {
if(!str) return "";
const clusters = str.match(/[\u0B80-\u0BFF][\u0BC0-\u0BD7\u0BBE-\u0BBF\u0BC6-\u0BC8\u0BCA-\u0BCC\u0BCD]*|./g) || [];
return clusters.map((c, i) => {
if(c === " ") return "¬†¬†";
if(i === 0 || i === clusters.length - 1) return c;
return "_";
}).join(" ");
}
