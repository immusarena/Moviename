<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immu's Games Hub</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Latha&display=swap');
        
        /* CSS Variables */
        :root {
            --bg-color: #0d0614;
            --card-bg: rgba(29, 16, 46, 0.7);
            --primary-color: #FF4B72;
            --secondary-color: #FF7694;
            --accent-color: #4ade80;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --glow-shadow: rgba(255, 75, 114, 0.4);
        }

        body { 
            background: radial-gradient(circle at top left, #2b1340, var(--bg-color)); 
            background-attachment: fixed;
            color: var(--text-main); 
            font-family: 'Poppins', 'Latha', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow-x: hidden; flex-direction: column; 
            transition: background 0.5s ease; 
        }

        /* NEON CANVAS */
        #neonCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }

        .container { width: 90%; max-width: 420px; padding: 20px; animation: slideUp 0.6s ease-out forwards; z-index: 1;}
        
        @keyframes slideUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 10px var(--primary-color), inset 0 0 10px var(--primary-color); } 50% { box-shadow: 0 0 25px var(--primary-color), inset 0 0 20px var(--primary-color); } 100% { box-shadow: 0 0 10px var(--primary-color), inset 0 0 10px var(--primary-color); } }
        @keyframes pulseGlowAccent { 0% { box-shadow: 0 0 10px var(--accent-color), inset 0 0 10px var(--accent-color); } 50% { box-shadow: 0 0 25px var(--accent-color), inset 0 0 20px var(--accent-color); } 100% { box-shadow: 0 0 10px var(--accent-color), inset 0 0 10px var(--accent-color); } }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Toast */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: linear-gradient(135deg, var(--accent-color), #22c55e); color: #120A1E; padding: 12px 24px; border-radius: 30px; font-weight: bold; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; box-shadow: 0 10px 25px rgba(0,0,0,0.5); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease; opacity: 0; z-index: 2000; pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Home Page Elements */
        .home-top-bar { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 10px; }
        
        .home-banner-wrapper { position: relative; width: 100%; height: 180px; margin-bottom: 20px; border-radius: 20px; padding: 2px; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); box-shadow: 0 10px 30px var(--glow-shadow); overflow: hidden; transition: all 0.4s ease; cursor: pointer; }
        .home-banner-img { width: 100%; height: 100%; border-radius: 18px; object-fit: cover; opacity: 0.85; transition: 0.4s ease; filter: contrast(1.1); }
        .home-banner-wrapper:hover { box-shadow: 0 15px 40px var(--glow-shadow); transform: translateY(-3px); }
        .home-banner-wrapper:hover .home-banner-img { opacity: 1; transform: scale(1.05); }

        .app-title { text-align: center; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Poppins', sans-serif; font-size: 36px; margin-bottom: 5px; font-weight: 800; filter: drop-shadow(0px 5px 10px var(--glow-shadow)); text-transform: uppercase; letter-spacing: 2px;}
        .app-subtitle { text-align: center; color: var(--text-muted); font-size: 10px; margin-bottom: 35px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;}
        
        .game-menu-btn { width: 100%; padding: 22px; margin-bottom: 15px; background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid var(--border-color); border-radius: 16px; color: var(--text-main); font-weight: 600; cursor: pointer; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border-left: 4px solid var(--primary-color); }
        .game-menu-btn:hover { transform: translateY(-5px); box-shadow: 0 15px 35px var(--glow-shadow); border-left: 8px solid var(--primary-color); background: rgba(255,255,255,0.05);}
        .game-menu-btn.blue { border-left: 4px solid var(--accent-color); }
        .game-menu-btn.blue:hover { box-shadow: 0 15px 35px rgba(74, 222, 128, 0.3); border-left: 8px solid var(--accent-color); }
        .game-menu-btn.purple { border-left: 4px solid #a855f7; }
        .game-menu-btn.purple:hover { box-shadow: 0 15px 35px rgba(168, 85, 247, 0.3); border-left: 8px solid #a855f7; }
        
        /* TOP NAV */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .back-btn { background: transparent; border: none; color: var(--text-muted); font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: 0.2s; padding: 2px 0; opacity: 0.6;}
        .back-btn:hover { opacity: 1; color: var(--text-main); transform: translateX(-3px); }
        .game-title-text { font-size: 12px; font-weight: 800; letter-spacing: 4px; color: var(--accent-color); text-transform: uppercase; text-shadow: 0 0 15px rgba(74, 222, 128, 0.3); margin:0;}
        
        /* THEME BUTTON */
        .theme-btn { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--border-color); border-radius: 30px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; padding: 6px 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);}
        .theme-btn:hover { border-color: var(--primary-color); box-shadow: 0 5px 20px var(--glow-shadow); transform: translateY(-2px);}
        .theme-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--primary-color); box-shadow: 0 0 10px var(--primary-color); transition: background 0.5s ease; }
        .theme-label { font-size: 9px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; }

        /* VS Scoreboard */
        .vs-container { display: flex; justify-content: space-around; align-items: center; margin-bottom: 20px; }
        .player-box { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--border-color); text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; width: 90px; padding: 15px 10px; border-radius: 20px; transition: all 0.4s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.3);}
        .active-turn { animation: pulseGlow 2s infinite; border: 1px solid var(--primary-color); transform: scale(1.05); }
        .racing-turn { animation: pulseGlowAccent 2s infinite; border: 1px solid var(--accent-color); transform: scale(1.05); }
        
        .avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--border-color); background-size: cover; background-position: center; background-color: #1D102E; transition: 0.3s; }
        .immu-pic { background-image: url('1000242624.jpg'); } 
        .sappii-pic { background-image: url('1000242625.jpg'); } 
        .active-turn .sappii-pic, .active-turn .immu-pic { border-color: var(--primary-color); }
        .racing-turn .avatar { border-color: var(--accent-color); }
        
        .name-container { display: flex; align-items: center; gap: 6px; margin-top: 5px;}
        .status-dot { width: 6px; height: 6px; border-radius: 50%; border: 2px solid var(--card-bg); transition: background-color 0.3s; box-shadow: 0 0 5px rgba(0,0,0,0.5);}
        .online { background-color: #4ade80; box-shadow: 0 0 10px #4ade80;} 
        .offline { background-color: #555; } 
        .player-name { font-size: 11px; font-weight: 800; color: var(--text-main); letter-spacing: 1px; text-transform: uppercase;}
        .score-val { font-size: 24px; font-weight: 800; color: var(--primary-color); text-shadow: 0 2px 10px var(--glow-shadow); }
        .vs-badge { font-size: 10px; font-weight: 800; color: var(--text-muted); letter-spacing: 2px;}

        /* Cards & Inputs */
        .card { background: var(--card-bg); backdrop-filter: blur(15px); border-radius: 20px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; border: 1px solid var(--border-color); margin-bottom: 20px; transition: 0.5s ease; position: relative; overflow: hidden;}
        
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--border-color); background-color: rgba(0,0,0,0.3); color: var(--text-main); box-sizing: border-box; font-family: inherit; font-size: 12px; font-weight: 600; text-align: center; transition: all 0.3s ease; letter-spacing: 1px; text-transform: uppercase;}
        input:focus { outline: none; border-color: var(--primary-color); box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 0 15px var(--glow-shadow); background-color: rgba(0,0,0,0.5);}
        input::placeholder { color: #666; font-weight: 600;}
        input:disabled { background-color: rgba(255,255,255,0.1); cursor: not-allowed; opacity: 0.6; }
        
        .letter-box { font-size: 26px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-color); text-shadow: 0 0 15px rgba(74, 222, 128, 0.4);}
        .order-btn { background: rgba(0,0,0,0.3); border: 1px solid var(--accent-color); color: var(--accent-color); margin: 6px 0; padding: 15px; border-radius: 12px;}
        
        button.btn-main { width: 100%; padding: 16px; margin-top: 15px; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); border: none; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s ease; box-shadow: 0 5px 15px var(--glow-shadow);}
        button.btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--glow-shadow); }
        button.btn-main:active { transform: scale(0.96); }
        button.btn-main:disabled { background: #555; cursor: not-allowed; box-shadow: none; color: #999; transform: none; }
        
        .random-btn { background: rgba(74, 222, 128, 0.05); border: 1px dashed var(--accent-color); color: var(--accent-color); margin: 0 0 10px 0; padding: 12px; font-size: 10px; width: 100%; box-shadow: none; border-radius: 12px;}
        .give-up-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); box-shadow: none; margin-top: 10px; }
        .manual-point-btn { background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); margin-top: 10px; padding: 12px; font-size: 10px; width: 100%; box-shadow: none; border-radius: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: 0.3s;}
        .reset-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); box-shadow: none; margin-top: 20px; font-size: 9px; padding: 8px 15px; width: auto; border-radius: 20px; cursor: pointer;}

        /* MASKING VIEW */
        .masked-container { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; margin: 15px 0 20px 0; line-height: 1.6; font-family: 'Latha', sans-serif;}
        .mask-char { color: var(--text-main); font-size: 28px; font-weight: 800; text-shadow: 0 0 15px rgba(255,255,255,0.4); font-family: 'Latha', sans-serif;}
        .mask-dash { color: var(--accent-color); font-size: 28px; font-weight: 800; text-shadow: 0 0 15px rgba(74, 222, 128, 0.4); font-family: 'Latha', sans-serif;}
        .letter-count { font-size: 9px; font-weight: 800; background: rgba(74, 222, 128, 0.1); color: var(--accent-color); display: inline-block; padding: 4px 12px; border-radius: 8px; border: 1px solid var(--accent-color); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 20px;}
        .preview-text { color: var(--accent-color); font-size: 20px; font-weight: 800; margin: 5px 0 15px 0; min-height: 30px; font-family: 'Latha', sans-serif; opacity: 0.9;}
        .hint-text { background: rgba(255, 75, 114, 0.1); color: var(--primary-color); font-weight: 800; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 15px; padding: 6px 15px; border-radius: 8px; display: inline-block; border: 1px solid rgba(255, 75, 114, 0.3);}
        .hidden { display: none !important; }

        /* MUSIC LOUNGE ELEMENTS */
        .vinyl-container { width: 120px; height: 120px; margin: 0 auto 20px auto; border-radius: 50%; border: 4px solid var(--primary-color); padding: 5px; box-shadow: 0 0 25px var(--glow-shadow); position: relative; display: flex; justify-content: center; align-items: center; background: #111; }

        /* Premium Cards UI */
        .card-hand-wrapper { width: 100%; overflow-x: auto; padding: 18px 0; display: flex; justify-content: center; }
        .card-hand { display: flex; gap: -20px; justify-content: center; min-width: max-content; align-items: flex-end; }
        .playing-card { width: 72px; height: 100px; background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.2)); border-radius: 10px; box-shadow: 0 12px 30px rgba(0,0,0,0.6), 0 6px 12px rgba(0,0,0,0.4) inset; display: flex; align-items: center; justify-content: center; user-select: none; margin-left: -36px; transition: transform 0.25s ease, box-shadow 0.25s ease; border: 1px solid rgba(255,255,255,0.06); cursor: default; }
        .playing-card.clickable { cursor: pointer; }
        .playing-card .card-inner { width: 100%; height: 100%; display:flex; flex-direction:column; align-items:center; justify-content:center; color: #fff; font-weight:900; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
        .playing-card .rank { font-size:18px; opacity:0.95; }
        .playing-card .suit { font-size:30px; margin-top:2px; }
        .playing-card.card-red { background: linear-gradient(180deg, rgba(255,245,245,0.03), rgba(80,10,10,0.18)); }
        .playing-card.card-black { background: linear-gradient(180deg, rgba(245,245,255,0.02), rgba(10,10,40,0.18)); }
        .playing-card:hover { transform: translateY(-18px) scale(1.05); box-shadow: 0 20px 45px rgba(0,0,0,0.7); z-index:60; }

        .table-area { min-height: 140px; background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(0,0,0,0.25)); border-radius: 14px; display:flex; justify-content:center; align-items:center; padding:16px; margin: 15px 0; box-shadow: inset 0 1px 0 rgba(255,255,255,0.02); }
        .table-card-slot { display:flex; flex-direction:column; align-items:center; gap:8px; margin: 0 10px; }
        .table-card-name { font-size:10px; font-weight:800; color:var(--text-muted); }
        .table-card-played { width:72px; height:100px; border-radius:10px; display:flex; align-items:center; justify-content:center; box-shadow: 0 10px 25px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.04); }
        .table-card-played .inner { display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; font-weight:900; }
        .card-back { width:72px; height:100px; border-radius:10px; background: repeating-linear-gradient(45deg, rgba(255,255,255,0.02), rgba(255,255,255,0.02) 6px, rgba(0,0,0,0.12) 6px, rgba(0,0,0,0.12) 12px); border:1px solid rgba(255,255,255,0.04); box-shadow: 0 8px 20px rgba(0,0,0,0.6); }

        /* Premium Movie & Word UI */
        .game-panel { display:flex; flex-direction:column; gap:12px; align-items:stretch; }
        .game-header { display:flex; justify-content:space-between; align-items:center; gap:10px; }
        .game-title { font-size:14px; font-weight:800; letter-spacing:2px; color:var(--text-main); }
        .subtle { font-size:11px; color:var(--text-muted); }
        .input-gradient { padding:12px; border-radius:12px; background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(0,0,0,0.18)); border:1px solid rgba(255,255,255,0.04); }
        .hint-badge { display:inline-block; padding:6px 10px; border-radius:999px; background: rgba(255,75,114,0.08); color:var(--primary-color); font-weight:800; font-size:11px; border:1px solid rgba(255,75,114,0.15); }
        .tamil-pill { display:block; padding:10px 14px; border-radius:12px; background: linear-gradient(90deg, rgba(74,222,128,0.06), rgba(255,75,114,0.03)); color:var(--accent-color); font-weight:800; text-align:center; }
        .action-row { display:flex; gap:10px; align-items:center; }
        .btn-ghost { background: transparent; border: 1px solid rgba(255,255,255,0.06); color:var(--text-muted); padding:10px 12px; border-radius:10px; cursor:pointer; }
        .btn-primary { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color:#fff; padding:12px 14px; border-radius:12px; border:none; font-weight:900; cursor:pointer; box-shadow: 0 8px 25px var(--glow-shadow); }
        .hint-text.premium { background: rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.04); padding:8px 12px; border-radius:10px; font-weight:800; color:var(--primary-color); }
        .vinyl-record { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 10px solid #000; box-sizing: border-box; }
        .vinyl-container::after { content: ''; position: absolute; width: 20px; height: 20px; background: var(--bg-color); border: 2px solid var(--primary-color); border-radius: 50%; z-index: 2; }
        .spin-anim { animation: spin 4s linear infinite; }
        .music-controls { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .music-btn { width: auto; padding: 12px 25px; margin-top: 0; border-radius: 30px; font-size: 11px; display:flex; align-items:center; justify-content:center; gap: 6px; cursor: pointer; border: none; font-weight: bold; transition: 0.2s;}
        .music-btn:active { transform: scale(0.92); }
        .music-btn.play-btn { flex: 1; background: linear-gradient(135deg, var(--accent-color), #22c55e); color: #120A1E; box-shadow: 0 5px 15px rgba(74, 222, 128, 0.4); font-weight:bold;}
        .music-btn.sync { padding: 10px 15px; font-size: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 15px;}
        .music-btn.sync:hover { background: rgba(255,255,255,0.05); color: white; border-color: white; }

        /* Modern Chat Box */
        .chat-container { text-align: left; padding: 20px; position: relative;}
        .chat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .chat-header h3 { margin: 0; color: var(--text-main); font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8;}
        .typing-indicator { font-size: 10px; color: var(--accent-color); font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; margin-left: 10px; margin-bottom: 8px; display: none; align-items: center; gap: 6px; }
        .typing-indicator .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-color); display: inline-block; animation: typingDots 1s infinite ease-in-out; opacity: 0.35; }
        .typing-indicator .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-indicator .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator .typing-dot:nth-child(3) { animation-delay: 0.3s; }
        @keyframes typingDots { 0%, 100% { opacity: 0.35; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-2px); } }

        .chat-messages { height: 220px; overflow-y: auto; padding: 15px 10px; border: 1px solid var(--border-color); border-radius: 12px; background: rgba(0,0,0,0.2); margin-bottom: 5px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;}
        .message { padding: 10px 14px; max-width: 80%; display: flex; flex-direction: column; position: relative; animation: slideUp 0.3s ease-out; box-shadow: 0 4px 15px rgba(0,0,0,0.2);}
        .message-sender { font-size: 8px; font-weight: 800; margin-bottom: 4px; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center;}
        .message-text { font-size: 12px; line-height: 1.4; word-wrap: break-word; font-weight: 600;}
        
        .msg-actions { display: inline-flex; gap: 8px; }
        .msg-action-btn { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; border-radius: 5px; padding: 4px; display: inline-flex; align-items: center; justify-content: center; transition: all 0.3s ease; color: var(--text-muted); margin-left: 5px; }
        .msg-action-btn svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round;}
        .msg-action-btn:hover { background: var(--primary-color); color: #fff; border-color: var(--primary-color); transform: translateY(-2px); box-shadow: 0 4px 10px var(--glow-shadow); }

        .my-message { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); align-self: flex-end; color: #fff; border-radius: 16px 16px 0 16px; }
        .partner-message { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border: 1px solid var(--border-color); align-self: flex-start; color: var(--text-main); border-radius: 16px 16px 16px 0; }
        .system-message { background: rgba(74, 222, 128, 0.05); color: var(--accent-color); align-self: center; text-align: center; border: 1px solid rgba(74, 222, 128, 0.3); border-radius: 12px; padding: 8px 15px; max-width: 90%; text-transform: uppercase; letter-spacing: 1px;}
        
        .chat-input-group { display: flex; gap: 10px; align-items: center; position: relative; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 25px; padding: 4px 4px 4px 10px;}
        .chat-input { margin: 0; text-align: left; background: transparent; border: none; padding: 10px 0; box-shadow: none; font-size: 12px; text-transform: none; font-weight: 600;}
        .chat-input:focus { box-shadow: none; background: transparent;}
        .chat-icon-btn { background: none; border: none; color: var(--text-muted); width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; padding: 0; box-shadow: none; margin-top: 0;}

<script>
    // Global variable to lock Word UI updates during fast dictionary check
    window.isCheckingWord = false;

    // --- FIREBASE SETUP ---
    const firebaseConfig = {
        apiKey: "AIzaSyCdhWff4X_XHvoIw_mhFDGRjy9vC4ymFc4",
        authDomain: "moviename-26960.firebaseapp.com",
        databaseURL: "https://moviename-26960-default-rtdb.firebaseio.com",
        projectId: "moviename-26960",
        storageBucket: "moviename-26960.firebasestorage.app",
        messagingSenderId: "745803258160",
        appId: "1:745803258160:web:94974f7633fd84a1f3d0f5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const myName = (urlParams.get('u') || "immu").toLowerCase(); 
    let partnerName = "";
    if (myName === "immu") partnerName = "sappii";
    else if (myName === "sappii") partnerName = "immu";
    else if (myName === "tharkuri") partnerName = "immu"; // Third player pairs with immu

    let activeGame = 'home';
    let gameState = {}; let wordGameState = {}; let cardsGameState = {}; let MOVIE_COLLECTION = []; 

    // Music Lounge feature removed

    // --- 🎨 PREMIUM THEME SYSTEM ---
    const themes = [
        { vars: { '--bg-color': '#0d0614', '--card-bg': 'rgba(29, 16, 46, 0.7)', '--primary-color': '#FF4B72', '--secondary-color': '#FF7694', '--accent-color': '#4ade80', '--border-color': 'rgba(255, 255, 255, 0.1)' } },
        { vars: { '--bg-color': '#050a17', '--card-bg': 'rgba(16, 26, 50, 0.7)', '--primary-color': '#00d2ff', '--secondary-color': '#3a7bd5', '--accent-color': '#6FFFE9', '--border-color': 'rgba(255, 255, 255, 0.1)' } },
        { vars: { '--bg-color': '#0a0a0a', '--card-bg': 'rgba(20, 20, 20, 0.8)', '--primary-color': '#FF003C', '--secondary-color': '#D9002E', '--accent-color': '#00FF41', '--border-color': 'rgba(255, 255, 255, 0.08)' } },
        { vars: { '--bg-color': '#1a0b2e', '--card-bg': 'rgba(35, 15, 60, 0.7)', '--primary-color': '#d946ef', '--secondary-color': '#a855f7', '--accent-color': '#f472b6', '--border-color': 'rgba(217, 70, 239, 0.2)' } }
    ];
    let currentThemeIndex = localStorage.getItem('appTheme') ? parseInt(localStorage.getItem('appTheme')) : 0;
    let particleColor1 = '#FF4B72'; let particleColor2 = '#4ade80';

    function applyTheme(index) {
        for (const [key, value] of Object.entries(themes[index].vars)) { document.documentElement.style.setProperty(key, value); }
        particleColor1 = themes[index].vars['--primary-color']; particleColor2 = themes[index].vars['--accent-color'];
    }
    function cycleTheme() {
        currentThemeIndex = (currentThemeIndex + 1) % themes.length; localStorage.setItem('appTheme', currentThemeIndex); applyTheme(currentThemeIndex);
    }
    applyTheme(currentThemeIndex);

    // --- 🌌 PARTICLES ---
    const canvas = document.getElementById('neonCanvas'); const ctx = canvas.getContext('2d'); let particlesArray = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initParticles(); }
    window.addEventListener('resize', resizeCanvas);
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 1;
            this.speedX = Math.random() * 0.4 - 0.2; this.speedY = Math.random() * 0.4 - 0.2;
            this.colorType = Math.random() > 0.5 ? 1 : 2; this.opacity = Math.random() * 0.5 + 0.1;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            if (this.x < 0) this.x = canvas.width; if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height; if (this.y > canvas.height) this.y = 0;
        }
        draw() {
            ctx.globalAlpha = this.opacity; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.colorType === 1 ? particleColor1 : particleColor2;
            ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle; ctx.fill(); ctx.globalAlpha = 1; 
        }
    }
    function initParticles() {
        particlesArray = []; let numberOfParticles = (canvas.width * canvas.height) / 12000;
        if (numberOfParticles > 60) numberOfParticles = 60;
        for (let i = 0; i < numberOfParticles; i++) particlesArray.push(new Particle());
    }
    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); particlesArray[i].draw(); }
        requestAnimationFrame(animateParticles);
    }
    resizeCanvas(); animateParticles(); 

    // --- PLAYER LINK COPIER ---
    function copyToClipboard(playerName) {
        const baseUrl = window.location.origin + window.location.pathname;
        const fullUrl = baseUrl + "?u=" + playerName;
        navigator.clipboard.writeText(fullUrl).then(() => {
            showToast("LINK COPIED: ?u=" + playerName);
        }).catch(() => {
            alert("LINK: " + fullUrl);
        });
    }

    // --- MOVIES LOADER ---
    async function loadMoviesFromTXT() {
        MOVIE_COLLECTION = []; 
        try {
            const cacheBuster = "?v=" + new Date().getTime();
            const engRes = await fetch('movies_eng.txt' + cacheBuster);
            const tamilRes = await fetch('movies_tamil.txt' + cacheBuster);
            
            if (engRes.ok && tamilRes.ok) {
                let eLines = (await engRes.text()).split('\n').map(l => l.replace(/\r/g, '').trim());
                let tLines = (await tamilRes.text()).split('\n').map(l => l.replace(/\r/g, '').trim());
                if (eLines.length > 0 && /[\u0B80-\u0BFF]/.test(eLines[0])) { let temp = eLines; eLines = tLines; tLines = temp; }
                const minLen = Math.min(eLines.length, tLines.length);
                for(let i=0; i<minLen; i++){
                    if(eLines[i] && tLines[i]) MOVIE_COLLECTION.push({ eng: eLines[i], tamil: tLines[i], hero: "" });
                }
            }
        } catch (error) {}
        const list = document.getElementById('movieList'); list.innerHTML = "";
        MOVIE_COLLECTION.forEach(m => { const option = document.createElement('option'); option.value = m.eng; list.appendChild(option); });
    }
    window.onload = () => {
        loadMoviesFromTXT();
        const picker = document.getElementById('emojiPicker');
        const emojis = ['❤️', '🔥', '😂', '🥺', '👍', '👎', '✨', '💀', '💯', '👏'];
        emojis.forEach(emoji => {
            const btn = document.createElement('button'); btn.className = 'emoji-item'; btn.innerText = emoji;
            btn.onclick = () => { document.getElementById('chatInput').value += emoji; document.getElementById('chatInput').focus(); document.getElementById('emojiPicker').classList.add('hidden'); };
            picker.appendChild(btn);
        });
        document.addEventListener('click', function(event) {
            var picker = document.getElementById('emojiPicker'); var btn = document.getElementById('emojiBtn');
            if (!picker.contains(event.target) && event.target !== btn && !btn.contains(event.target)) picker.classList.add('hidden'); 
        });
    };
    function toggleEmojiPicker(e) { if(e) e.stopPropagation(); document.getElementById('emojiPicker').classList.toggle('hidden'); }

    // --- NAVIGATION LOGIC ---
    function openGame(gameType) {
        activeGame = gameType;
        document.getElementById('homeScreen').classList.add('hidden');
        document.getElementById('sharedUIContainer').classList.remove('hidden');
        
        if (gameType === 'movie') {
            document.getElementById('activeGameBadge').innerText = "MOVIE GUESSING";
            document.getElementById('vsScoreBoard').classList.remove('hidden');
            document.getElementById('chatArea').classList.remove('hidden');
            document.getElementById('resetScoresBtn').classList.remove('hidden');
            document.getElementById('movieResetBtns').classList.remove('hidden');
            document.getElementById('wordResetBtns').classList.add('hidden');
            renderMovieGameUI();
        } else if (gameType === 'word') {
            document.getElementById('activeGameBadge').innerText = "WORD RACE";
            document.getElementById('vsScoreBoard').classList.remove('hidden');
            document.getElementById('chatArea').classList.remove('hidden');
            document.getElementById('resetScoresBtn').classList.remove('hidden');
            document.getElementById('movieResetBtns').classList.add('hidden');
            document.getElementById('wordResetBtns').classList.remove('hidden');
            renderWordGameUI();
        } else if (gameType === 'cards') {
            document.getElementById('activeGameBadge').innerText = "SPADES CARDS 🃏";
            document.getElementById('vsScoreBoard').classList.add('hidden');
            document.getElementById('chatArea').classList.remove('hidden');
            document.getElementById('resetScoresBtn').classList.remove('hidden');
            renderCardsGameUI();
        }
        setTimeout(() => { const chatDiv = document.getElementById('chatMessages'); if (chatDiv) chatDiv.scrollTop = chatDiv.scrollHeight; }, 100);
    }
    function goHome() {
        activeGame = 'home';
        document.getElementById('sharedUIContainer').classList.add('hidden');
        document.getElementById('homeScreen').classList.remove('hidden');
    }

    // --- DB LISTENERS ---
    db.ref('gameState').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        let dbEng = data.movieEng || ""; let finalTamil = data.movieTamil || ""; let finalHint = data.hint || "";
        if (dbEng !== "" && MOVIE_COLLECTION.length > 0) {
            const match = MOVIE_COLLECTION.find(m => m.eng.toLowerCase() === dbEng.toLowerCase());
            if (match) finalTamil = match.tamil; 
        }
        gameState = { turn: data.turn || "immu", status: data.status || "set", score1: data.score1 || 0, score2: data.score2 || 0, movieEng: dbEng, movieTamil: finalTamil, hint: finalHint };
        if(activeGame === 'movie') renderMovieGameUI();
    });

    db.ref('wordGameState').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        wordGameState = { status: data.status || "letter_phase", p1Letter: data.p1Letter || "", p2Letter: data.p2Letter || "", startLetter: data.startLetter || "", endLetter: data.endLetter || "", score1: data.score1 || 0, score2: data.score2 || 0, usedWords: data.usedWords || {} };
        
        // ONLY render if the user is NOT actively waiting for a dictionary fetch result.
        // This prevents the UI from flickering back to the initial state while checking.
        if(activeGame === 'word' && !window.isCheckingWord) {
            renderWordGameUI();
        }
    });

    // ================= CARDS GAME LOGIC (SPADES & CUT) =================
    const CARD_SUITS = { 'S': '♠️', 'H': '♥️', 'D': '♦️', 'C': '♣️' };
    const CARD_RANKS = { 14: 'A', 13: 'K', 12: 'Q', 11: 'J', 10: '10', 9: '9', 8: '8', 7: '7', 6: '6', 5: '5', 4: '4', 3: '3', 2: '2' };

    function initCardsGame(playerCount) {
        let deck = [];
        for (let suit in CARD_SUITS) {
            for (let rank in CARD_RANKS) {
                deck.push({ suit: suit, rank: parseInt(rank) });
            }
        }
        
        // Shuffle
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }

        // Get player names for the game
        let playerNames = ['immu', 'sappii'];
        
        if (playerCount === 3) {
            playerNames = ['immu', 'sappii', 'tharkuri'];
        }

        startCardsGameWithPlayers(playerCount, deck, playerNames);
    }

    function startCardsGameWithPlayers(playerCount, deck, playerNames) {
        let hands = {};
        playerNames.forEach(p => hands[p] = []);

        if (playerCount === 3) {
            // Remove 2 of Clubs for 3 players (51 cards)
            deck = deck.filter(c => !(c.suit === 'C' && c.rank === 2));
        }

        playerNames.forEach((p, idx) => {
            hands[p] = deck.filter((_, i) => i % playerCount === idx);
            // Sort hand: Group by Suit, then Rank
            hands[p].sort((a, b) => {
                if (a.suit === b.suit) return b.rank - a.rank;
                return a.suit.localeCompare(b.suit);
            });
        });

        // Find who has Ace of Spades (S 14)
        let starter = 'immu';
        for (let p in hands) {
            if (hands[p].some(c => c.suit === 'S' && c.rank === 14)) {
                starter = p; break;
            }
        }

        // Create scores object with actual player names
        let scores = {};
        playerNames.forEach(p => scores[p] = 0);

        db.ref('cardsGameState').set({
            status: 'playing',
            playerCount: playerCount,
            playerNames: playerNames,
            turn: starter,
            ledSuit: '',
            table: {},
            hands: hands,
            scores: scores
        });

        closeResetModal();
    }

    db.ref('cardsGameState').on('value', (snapshot) => {
        let state = snapshot.val() || { status: 'setup' };
        if (state.playerCount === 3 && state.hands && state.hands.player3) {
            let updates = {};
            let newHands = { ...state.hands, tharkuri: state.hands.player3 };
            delete newHands.player3;
            updates.hands = newHands;

            if (state.scores && state.scores.player3 !== undefined) {
                let newScores = { ...state.scores, tharkuri: state.scores.player3 };
                delete newScores.player3;
                updates.scores = newScores;
            }

            if (Array.isArray(state.playerNames)) {
                updates.playerNames = state.playerNames.map(p => p === 'player3' ? 'tharkuri' : p);
            } else {
                updates.playerNames = ['immu', 'sappii', 'tharkuri'];
            }

            if (state.turn === 'player3') {
                updates.turn = 'tharkuri';
            }

            if (state.table && state.table.player3) {
                let newTable = { ...state.table, tharkuri: state.table.player3 };
                delete newTable.player3;
                updates.table = newTable;
            }

            db.ref('cardsGameState').update(updates);
            state = { ...state, ...updates };
        }

        cardsGameState = state;
        if (activeGame === 'cards') renderCardsGameUI();
    });

    function playCard(index) {
        if (!cardsGameState || cardsGameState.turn !== myName) return alert("NOT YOUR TURN!");
        
        const myHand = (cardsGameState.hands && cardsGameState.hands[myName]) || [];
        const card = myHand[index];
        const ledSuit = cardsGameState.ledSuit;

        // Validation Rule: Must follow suit if possessed
        if (ledSuit && card.suit !== ledSuit) {
            const hasLedSuit = myHand.some(c => c.suit === ledSuit);
            if (hasLedSuit) {
                return alert(`YOU MUST PLAY A ${CARD_SUITS[ledSuit]}!`);
            }
        }

        // Play card
        myHand.splice(index, 1);
        let newTable = cardsGameState.table || {};
        newTable[myName] = card;

        let updates = {
            [`hands/${myName}`]: myHand,
            table: newTable
        };

        if (!ledSuit) updates.ledSuit = card.suit;

        // Determine next turn or resolve trick
        const playerNames = cardsGameState.playerNames || Object.keys(cardsGameState.scores || {});
        const players = playerNames;
        
        if (Object.keys(newTable).length === players.length) {
            // Trick complete. Nobody's turn until resolved.
            updates.turn = 'resolving';
            db.ref('cardsGameState').update(updates);
            
            // Resolve trick after 2 seconds
            setTimeout(() => {
                let winner = '';
                let maxVal = -1;
                // Get fresh table data from the current cardsGameState
                let currentTable = cardsGameState.table || newTable;
                let isCut = Object.values(currentTable).some(c => c.suit === 'S'); // Spades is Trump
                let currentLedSuit = cardsGameState.ledSuit || updates.ledSuit || ledSuit;
                let targetSuit = isCut ? 'S' : currentLedSuit;

                for (let p in currentTable) {
                    let c = currentTable[p];
                    let val = 0;
                    if (isCut) {
                        if (c.suit === 'S') val = c.rank + 100;
                    } else {
                        if (c.suit === targetSuit) val = c.rank;
                    }
                    if (val > maxVal) { maxVal = val; winner = p; }
                }

                db.ref(`cardsGameState/scores/${winner}`).transaction(s => (s || 0) + 1);
                
                // Check if hands are empty (game over) before starting next trick
                const hands = cardsGameState.hands || {};
                const allHandsEmpty = players.every(p => !hands[p] || hands[p].length === 0);
                
                if (allHandsEmpty) {
                    // Game Over - All tricks played
                    db.ref('cardsGameState').update({
                        table: null,
                        ledSuit: '',
                        turn: 'game_over',
                        status: 'finished'
                    });
                } else {
                    // Next trick - properly clear previous trick
                    db.ref('cardsGameState').update({
                        table: {},
                        ledSuit: '',
                        turn: winner
                    });
                }
                
            }, 2000);

        } else {
            // Next player's turn
            let myIdx = players.indexOf(myName);
            let nextPlayer = players[(myIdx + 1) % players.length];
            updates.turn = nextPlayer;
            db.ref('cardsGameState').update(updates);
        }
    }

    function isTamilText(text) {
        return /[\u0B80-\u0BFF]/.test(text);
    }

    function convertTamilishToTamil(input) {
        if (!input) return "";
        if (isTamilText(input)) return input;

        const lower = input.toLowerCase().trim();
        const tokens = lower.split(/(\s+)/);

        const independentVowel = {
            a: 'அ', aa: 'ஆ', i: 'இ', ii: 'ஈ', u: 'உ', uu: 'ஊ', e: 'எ', ee: 'ஏ', ai: 'ஐ', o: 'ஒ', oo: 'ஓ', au: 'ஔ'
        };

        const consonantMap = {
            ng: 'ங', nj: 'ஞ', ny: 'ஞ', nn: 'ண', ch: 'ச', sh: 'ஷ', zh: 'ழ', j: 'ஜ', c: 'ச', k: 'க', kh: 'க', g: 'க', gh: 'க', q: 'க', x: 'க', t: 'ட', th: 'த', d: 'ட', dh: 'த', p: 'ப', ph: 'ப', b: 'ப', m: 'ம', y: 'ய', r: 'ர', rr: 'ற', l: 'ல', ll: 'ள', v: 'வ', w: 'வ', h: 'ஹ', f: 'ஃ', n: 'ந'
        };

        const vowelSignMap = {
            a: '', aa: 'ா', i: 'ி', ii: 'ீ', u: 'ு', uu: 'ூ', e: 'ெ', ee: 'ே', ai: 'ை', o: 'ொ', oo: 'ோ', au: 'ௌ'
        };

        const vowelKeys = ['au','aa','ii','ee','oo','ai','a','i','u','e','o'];
        const consonantKeys = ['ng','nj','ny','ch','sh','zh','kh','gh','ph','th','dh','rr','ll','nn','k','g','c','j','t','d','n','p','b','m','y','r','l','v','w','h','f','z','s'];

        return tokens.map(token => {
            if (/^\s*$/.test(token)) return token;
            let result = '';
            let i = 0;

            while (i < token.length) {
                const chunk = token.slice(i);

                let vow = '';
                for (const key of vowelKeys) {
                    if (chunk.startsWith(key)) { vow = key; break; }
                }

                let cons = '';
                for (const key of consonantKeys) {
                    if (chunk.startsWith(key)) { cons = key; break; }
                }

                if (!cons && consonantMap[chunk[0]]) {
                    cons = chunk[0];
                }

                // Handle consonant + vowel combinations
                if (cons && chunk.startsWith(cons)) {
                    const base = consonantMap[cons] || '';
                    const remainder = chunk.slice(cons.length);
                    let vow = '';
                    
                    // Check for vowel sign after consonant
                    // But 'a' alone is the inherent vowel, only 'aa' is a vowel sign
                    for (const key of vowelKeys) {
                        if (remainder.startsWith(key)) { 
                            vow = key; 
                            break; 
                        }
                    }
                    
                    // 'a' after consonant is just inherent vowel, skip it
                    if (vow === 'a') {
                        result += base; // consonant with inherent 'a'
                        i += cons.length + 1; // skip the 'a'
                    } else if (vow && vowelSignMap[vow] !== undefined) {
                        // Other vowel signs attach to consonant
                        const sign = vowelSignMap[vow];
                        result += base + sign;
                        i += cons.length + vow.length;
                    } else {
                        // No vowel after consonant, add virama
                        result += base + '்';
                        i += cons.length;
                    }
                }
                // Handle standalone vowels
                else if (vow && independentVowel[vow]) {
                    result += independentVowel[vow];
                    i += vow.length;
                } 
                // Fallback: preserve unknown characters
                else {
                    result += chunk[0];
                    i += 1;
                }
            }

            return result;
        }).join('');
    }

    function getLetterCountExact(str) {
        if (!str) return 0;
        let safeStr = str; let segments = [];
        if (window.Intl && Intl.Segmenter) {
            const segmenter = new Intl.Segmenter('ta-IN', { granularity: 'grapheme' });
            segments = Array.from(segmenter.segment(safeStr)).map(s => s.segment);
        } else { segments = safeStr.match(/[\u0B80-\u0BFF][\u0BBE-\u0BCC\u0BCD\u0BD7]*/g) || []; }
        return segments.filter(c => c.trim() !== '').length;
    }

    function maskExactString(str) {
        if (!str) return "";
        let safeStr = str;
        let html = `<div class="masked-container">`;
        const tokens = safeStr.match(/[\u0B80-\u0BFF][\u0BBE-\u0BCC\u0BCD\u0BD7]*|\s+/g) || [];

        let firstIdx = -1; let lastIdx = -1;
        for (let i = 0; i < tokens.length; i++) {
            if (tokens[i].trim() !== '') {
                if (firstIdx === -1) firstIdx = i;
                lastIdx = i;
            }
        }
        if (firstIdx === -1) return `<span class="mask-dash">_</span>`;

        let wordHtml = `<div style="display:flex; gap:6px; flex-wrap:wrap; justify-content:center;">`;
        tokens.forEach((char, idx) => {
            if (char.trim() === '') {
                wordHtml += `</div><div style="width:15px; height:5px;"></div><div style="display:flex; gap:6px;">`;
            } else if (idx === firstIdx || idx === lastIdx) {
                wordHtml += `<span class="mask-char">${char}</span>`;
            } else {
                wordHtml += `<span class="mask-dash">_</span>`;
            }
        });

        wordHtml += `</div>`; html += wordHtml + `</div>`;
        return html;
    }

                        <div class="game-header"><div><div class="game-title" style="color:var(--accent-color);">LETTERS READY!</div><div class="subtle">Choose start and end order</div></div><div class="hint-badge">READY</div></div>
                        <div style="display:flex; gap:10px; margin-top:12px;">
                            <button class="btn-primary" style="flex:1;" onclick="setWordOrder('${wordGameState.p1Letter}', '${wordGameState.p2Letter}')">START: <b style="font-size:16px;">${wordGameState.p1Letter.toUpperCase()}</b> → <b style="font-size:16px;">${wordGameState.p2Letter.toUpperCase()}</b></button>
                            <button class="btn-ghost" style="flex:1;" onclick="setWordOrder('${wordGameState.p2Letter}', '${wordGameState.p1Letter}')">START: <b style="font-size:16px;">${wordGameState.p2Letter.toUpperCase()}</b> → <b style="font-size:16px;">${wordGameState.p1Letter.toUpperCase()}</b></button>
                        </div>
                    </div>`;
            }
        } else if (wordGameState.status === "race_phase") {
            container.innerHTML = `
                <div class="card game-panel" style="border-color:var(--accent-color); box-shadow: 0 10px 40px rgba(74, 222, 128, 0.08);">
                    <div class="game-header"><div><div class="game-title">FORM A WORD!</div><div class="subtle">Make a valid English word</div></div><div class="hint-badge">RACE</div></div>
                    <div style="margin-top:8px; text-align:center;">START: <span class="letter-box" style="font-size:22px;">${wordGameState.startLetter.toUpperCase()}</span> &nbsp;|&nbsp; END: <span class="letter-box" style="font-size:22px;">${wordGameState.endLetter.toUpperCase()}</span></div>
                    <div style="margin-top:12px;" class="input-gradient"><input type="text" id="raceWordInput" placeholder="TYPE A VALID WORD..." style="width:100%; border:none; background:transparent; padding:10px; font-weight:800; text-transform:uppercase; font-size:16px;"></div>
                    <div class="action-row" style="margin-top:10px;"><button class="btn-primary" id="submitRaceBtn" onclick="submitRaceWord()">SUBMIT FAST</button><button class="btn-ghost" onclick="skipWord()">SKIP</button></div>
                    <p id="raceFeedback" style="margin-top:12px; color:var(--primary-color); font-weight:800; font-size:11px; text-transform:uppercase; letter-spacing:1px;"></p>
                </div>`;
        }
    }

    function submitLetter() {
        const letter = document.getElementById('letterInput').value.trim().toLowerCase();
        if(!letter || letter.length > 1 || !/[a-z]/.test(letter)) return alert("PLEASE ENTER EXACTLY 1 ENGLISH LETTER (A-Z)!");
        const letterKey = (myName === "immu") ? 'p1Letter' : 'p2Letter';
        db.ref(`wordGameState`).update({ [letterKey]: letter });
    }

    function setWordOrder(start, end) { db.ref('wordGameState').update({ status: "race_phase", startLetter: start, endLetter: end }); }

    async function submitRaceWord() {
        const btn = document.getElementById('submitRaceBtn');
        const inputEl = document.getElementById('raceWordInput');
        
        if (btn && btn.disabled) return; 
        
        const rawInput = inputEl.value;
        const word = rawInput.toLowerCase().replace(/[^a-z]/g, ''); 
        const start = wordGameState.startLetter.toLowerCase(); 
        const end = wordGameState.endLetter.toLowerCase();
        
        if (word.length < 2 || !word.startsWith(start) || !word.endsWith(end)) {
            document.getElementById('raceFeedback').innerText = `WORD MUST START WITH ${start.toUpperCase()} AND END WITH ${end.toUpperCase()}!`;
            return;
        }

        if (wordGameState.usedWords && wordGameState.usedWords[word]) {
            const winner = (typeof wordGameState.usedWords[word] === 'string') ? wordGameState.usedWords[word] : "PARTNER";
            document.getElementById('raceFeedback').innerText = `ALREADY USED BY ${winner.toUpperCase()}!`;
            return;
        }

        // --- UI FREEZE (To prevent flickering) ---
        window.isCheckingWord = true;
        if (btn) btn.disabled = true;
        if (inputEl) inputEl.disabled = true;
        
        document.getElementById('raceFeedback').innerText = `CHECKING DICTIONARY... ⏳`;
        document.getElementById('raceFeedback').style.color = "var(--text-main)";

        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 4000);
            
            const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`, { signal: controller.signal });
            clearTimeout(timeoutId);

            if (!res.ok) {
                document.getElementById('raceFeedback').innerText = `NOT A VALID ENGLISH WORD!`;
                document.getElementById('raceFeedback').style.color = "var(--primary-color)";
                if (btn) btn.disabled = false;
                if (inputEl) { inputEl.disabled = false; inputEl.focus(); }
                window.isCheckingWord = false;
                return;
            }
        } catch (e) {
            document.getElementById('raceFeedback').innerText = `SERVER SLOW! TRY AGAIN.`;
            document.getElementById('raceFeedback').style.color = "var(--primary-color)";
            if (btn) btn.disabled = false;
            if (inputEl) { inputEl.disabled = false; inputEl.focus(); }
            window.isCheckingWord = false;
            return;
        }

        // Firebase Transaction for exact millisecond clash
        const wordRef = db.ref(`wordGameState/usedWords/${word}`);
        wordRef.transaction((currentValue) => {
            if (currentValue === null) {
                return myName; 
            } else {
                return; 
            }
        }, (error, committed, snapshot) => {
            window.isCheckingWord = false; // UNLOCK
            
            if (error) {
                document.getElementById('raceFeedback').innerText = `NETWORK ERROR!`;
                if (btn) btn.disabled = false;
                if (inputEl) inputEl.disabled = false;
            } else if (!committed) {
                const winner = snapshot.val() || "PARTNER";
                document.getElementById('raceFeedback').innerText = `TOO LATE! ${winner.toUpperCase()} TYPED IT FIRST 🏃💨`;
                document.getElementById('raceFeedback').style.color = "var(--primary-color)";
                if (btn) btn.disabled = false;
                if (inputEl) inputEl.disabled = false;
            } else {
                const scoreKey = (myName === "immu") ? 'score1' : 'score2';
                db.ref(`wordGameState/${scoreKey}`).transaction(s => (s || 0) + 1);
                db.ref('wordGameState').update({ status: "letter_phase", p1Letter: "", p2Letter: "", startLetter: "", endLetter: "" });
                db.ref('chatMessages').push({ sender: "SYSTEM", text: `${myName.toUpperCase()} SCORED 1 POINT WITH "${word.toUpperCase()}"!`, timestamp: firebase.database.ServerValue.TIMESTAMP });
                
                // Manually trigger render since we blocked the listener
                renderWordGameUI();
            }
        });
    }

    function skipWord() {
        db.ref('wordGameState').update({ status: "letter_phase", p1Letter: "", p2Letter: "", startLetter: "", endLetter: "" });
        db.ref('chatMessages').push({ sender: "SYSTEM", text: `THIS ROUND WAS SKIPPED!`, timestamp: firebase.database.ServerValue.TIMESTAMP });
    }

    // --- RESET MODALS ---
    function openResetModal() { 
        document.getElementById('resetModal').classList.remove('hidden');
        document.getElementById('movieResetBtns').classList.add('hidden');
        document.getElementById('wordResetBtns').classList.add('hidden');
        document.getElementById('cardResetBtns').classList.add('hidden');
        
        if (activeGame === 'movie') document.getElementById('movieResetBtns').classList.remove('hidden');
        else if (activeGame === 'word') document.getElementById('wordResetBtns').classList.remove('hidden');
        else if (activeGame === 'cards') document.getElementById('cardResetBtns').classList.remove('hidden');
    }
    function closeResetModal() { document.getElementById('resetModal').classList.add('hidden'); }
    
    function confirmReset(starter) { 
        db.ref('gameState').set({ turn: starter, status: "set", score1: 0, score2: 0, movieEng: "", movieTamil: "", hint: "" }); 
        db.ref('chatMessages').remove(); 
        closeResetModal(); 
    }
    
    function confirmResetWord() { 
        db.ref('wordGameState').set({ status: "letter_phase", p1Letter: "", p2Letter: "", startLetter: "", endLetter: "", score1: 0, score2: 0, usedWords: null }); 
        db.ref('chatMessages').remove(); 
        closeResetModal(); 
    }
    
    function confirmResetCards() { 
        db.ref('cardsGameState').set({ status: "setup" }); 
        db.ref('chatMessages').remove(); 
        closeResetModal(); 
    }

    // --- ONLINE STATUS & CHAT ---
    db.ref('.info/connected').on('value', (snapshot) => {
        if (snapshot.val() === true) {
            const myPresenceRef = db.ref(`presence/${myName}`);
            myPresenceRef.onDisconnect().set({ online: false, lastSeen: firebase.database.ServerValue.TIMESTAMP });
            myPresenceRef.set({ online: true, lastSeen: firebase.database.ServerValue.TIMESTAMP });
            const myStatusEl = document.getElementById(`status-${myName}`);
            if (myStatusEl) myStatusEl.className = 'status-dot online';
        }
    });

    db.ref(`presence/${partnerName}`).on('value', (snapshot) => {
        const data = snapshot.val();
        const partnerStatusEl = document.getElementById(`status-${partnerName}`);
        if (partnerStatusEl) {
            partnerStatusEl.className = data && data.online ? 'status-dot online' : 'status-dot offline';
        }
    });

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg; toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Chat Typing Fix
    const typingIndicator = document.getElementById('typingIndicator');
    const myTypingRef = db.ref(`typingStatus/${myName}`);
    let typingTimeout = null;

    function updateTypingStatus(isTyping) {
        myTypingRef.set(isTyping);
    }

    function scheduleTypingEnd() {
        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            updateTypingStatus(false);
        }, 1200);
    }

    const chatInputElement = document.getElementById('chatInput');
    if (chatInputElement) {
        chatInputElement.addEventListener('input', () => {
            updateTypingStatus(true);
            scheduleTypingEnd();
        });
        chatInputElement.addEventListener('blur', () => {
            updateTypingStatus(false);
        });
    }

    window.addEventListener('beforeunload', () => {
        updateTypingStatus(false);
    });

    db.ref(`typingStatus/${partnerName}`).on('value', (snapshot) => {
        if (snapshot.val()) { 
            typingIndicator.style.display = 'flex'; 
        } else { 
            typingIndicator.style.display = 'none'; 
        }
    });

    function copyMsg(id) {
        const txt = document.getElementById('text-' + id).innerText;
        navigator.clipboard.writeText(txt);
        showToast("COPIED!");
    }

    function deleteMsg(id) {
        db.ref('chatMessages/' + id).remove();
        showToast("DELETED!");
    }

    db.ref('chatMessages').on('value', (snapshot) => {
        if(!snapshot.exists()) { document.getElementById('chatMessages').innerHTML = ''; }
    });

    let isChatLoaded = false;
    db.ref('chatMessages').once('value', () => { isChatLoaded = true; });

    db.ref('chatMessages').on('child_added', (snapshot) => {
        const data = snapshot.val();
        const msgKey = snapshot.key;
        const chatMessagesDiv = document.getElementById('chatMessages');
        const isMine = data.sender === myName.toUpperCase();
        const isSystem = data.sender === "SYSTEM" || data.sender === "ANTI-CHEAT";
        
        const messageDiv = document.createElement('div');
        messageDiv.id = `msg-${msgKey}`;

        if (isSystem) { 
            messageDiv.className = data.sender === "ANTI-CHEAT" ? 'message cheat-message' : 'message system-message'; 
        } else { 
            messageDiv.className = isMine ? 'message my-message' : 'message partner-message'; 
        }
        
        const time = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        const copySvg = `<svg viewBox="0 0 24 24" width="12" height="12"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
        const delSvg = `<svg viewBox="0 0 24 24" width="12" height="12"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>`;

        const copyBtn = `<button class="msg-action-btn" style="background:transparent; border:none; padding:0; margin-left:5px; opacity:0.5; color:white; cursor:pointer;" onclick="copyMsg('${msgKey}')" title="Copy">${copySvg}</button>`;
        const delBtn = isMine ? `<button class="msg-action-btn" style="background:transparent; border:none; padding:0; margin-left:5px; opacity:0.5; color:white; cursor:pointer;" onclick="deleteMsg('${msgKey}')" title="Delete">${delSvg}</button>` : '';

        messageDiv.innerHTML = `
            <div class="message-sender" style="${isSystem ? 'color:inherit; font-size:10px;' : ''}; display:flex; justify-content:space-between; align-items:center;">
                <span>${isMine ? 'YOU' : data.sender} (${time})</span>
                ${!isSystem ? `<span>${copyBtn}${delBtn}</span>` : ''}
            </div>
            <div class="message-text" id="text-${msgKey}">${data.text}</div>
        `;
        
        chatMessagesDiv.appendChild(messageDiv);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;

        if (isChatLoaded && !isMine && !isSystem) { showToast(`NEW MESSAGE FROM ${data.sender}`); }
    });

    db.ref('chatMessages').on('child_removed', (snapshot) => {
        const msgDiv = document.getElementById(`msg-${snapshot.key}`);
        if(msgDiv) msgDiv.remove();
    });

    function sendChatMessage() {
        const chatInput = document.getElementById('chatInput');
        const text = chatInput.value.trim();
        if(!text) return;

        if (myName === 'immu') {
            if (text.startsWith('/add ')) {
                const pts = parseInt(text.replace('/add ', ''));
                if (!isNaN(pts)) {
                    if (activeGame === 'movie') db.ref(`gameState/score1`).transaction(s => (s || 0) + pts);
                    if (activeGame === 'word') db.ref(`wordGameState/score1`).transaction(s => (s || 0) + pts);
                    showToast(`SECRET: +${pts} POINTS ADDED!`);
                }
                chatInput.value = ""; return; 
            }
            if (text.startsWith('/minus ')) {
                const pts = parseInt(text.replace('/minus ', ''));
                if (!isNaN(pts)) {
                    if (activeGame === 'movie') db.ref(`gameState/score2`).transaction(s => (s || 0) - pts);
                    if (activeGame === 'word') db.ref(`wordGameState/score2`).transaction(s => (s || 0) - pts);
                    showToast(`SECRET: -${pts} POINTS TAKEN FROM SAPPII!`);
                }
                chatInput.value = ""; return; 
            }
        }

        db.ref('chatMessages').push({ sender: myName.toUpperCase(), text: text, timestamp: firebase.database.ServerValue.TIMESTAMP });
        chatInput.value = "";
        updateTypingStatus(false);
        document.getElementById('emojiPicker').classList.add('hidden');
    }

    document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendChatMessage(); });
</script>
</body>
</html>
