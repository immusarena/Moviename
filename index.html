<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamil Couple Movie Game 💖</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Latha&display=swap');

body {
    background-color:#120A1E;
    color:white;
    font-family:'Poppins','Latha',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    flex-direction:column;
}

.container{width:90%;max-width:400px;padding:20px;}

.vs-container{display:flex;justify-content:space-around;margin-bottom:25px;}

.player-box{text-align:center;width:90px;padding:10px;border-radius:15px;}

.active-turn{background:rgba(255,75,114,0.15);border:1px solid #FF4B72;}

.avatar{width:65px;height:65px;border-radius:50%;background-size:cover;background-position:center;}

.immu-pic{background-image:url('1000242624.jpg');border:3px solid #4ade80;}
.sappii-pic{background-image:url('1000242625.jpg');border:3px solid #FF4B72;}

.score-val{font-size:24px;color:#FF4B72;font-weight:bold;}

.card{background:#1D102E;padding:20px;border-radius:20px;text-align:center;}

input{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none;}

button{width:100%;padding:12px;margin-top:8px;border:none;border-radius:10px;background:#FF4B72;color:white;}

.give-up-btn{background:transparent;border:1px solid #aaa;color:#aaa;}

.masked-word{font-size:26px;color:#4ade80;margin:10px 0;}
</style>
</head>

<body>

<div class="container">

<div class="vs-container">
    <div id="box-immu" class="player-box">
        <div class="avatar immu-pic"></div>
        <div>immu</div>
        <div id="immuScore" class="score-val">0</div>
    </div>

    <div id="box-sappii" class="player-box">
        <div class="avatar sappii-pic"></div>
        <div>Sappii</div>
        <div id="sappiiScore" class="score-val">0</div>
    </div>
</div>

<div id="gameContent"></div>

</div>

<script>
const firebaseConfig = {
apiKey:"AIzaSyCdhWff4X_XHvoIw_mhFDGRjy9vC4ymFc4",
authDomain:"moviename-26960.firebaseapp.com",
databaseURL:"https://moviename-26960-default-rtdb.firebaseio.com",
projectId:"moviename-26960",
storageBucket:"moviename-26960.firebasestorage.app",
appId:"1:745803258160:web:94974f7633fd84a1f3d0f5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const urlParams = new URLSearchParams(window.location.search);
const myName = (urlParams.get('u') || "immu").toLowerCase();

let gameState = {};

db.ref('gameState').on('value',snap=>{
gameState = snap.val() || {turn:"immu",status:"set",score1:0,score2:0,movie:"",hint:""};
renderUI();
});

function renderUI(){

document.getElementById("immuScore").innerText = gameState.score1;
document.getElementById("sappiiScore").innerText = gameState.score2;

document.getElementById("box-immu").classList.toggle("active-turn",gameState.turn==="immu");
document.getElementById("box-sappii").classList.toggle("active-turn",gameState.turn==="sappii");

const c = document.getElementById("gameContent");

if(gameState.status==="set"){

if(gameState.turn===myName){
c.innerHTML=`
<div class="card">
<h3>Your Turn 🎬</h3>
<input id="movieInput" placeholder="Movie">
<input id="hintInput" placeholder="Hint">
<button onclick="setMovie()">Start</button>
</div>`;
}else{
c.innerHTML=`
<div class="card">
<h3>Waiting...</h3>
</div>`;
}

}else{

if(gameState.turn===myName){
c.innerHTML=`
<div class="card">
<h3>Movie Set</h3>
<div class="masked-word">${gameState.movie}</div>
</div>`;
}else{
c.innerHTML=`
<div class="card">
<h3>Guess Movie 🤔</h3>
<div class="masked-word">${gameState.movie}</div>
<p>Hint: ${gameState.hint||""}</p>
<input id="guessInput">
<button onclick="checkGuess()">Submit</button>
<button class="give-up-btn" onclick="giveUp()">Give Up</button>
<p id="fb"></p>
</div>`;
}
}
}

function setMovie(){
let m=document.getElementById("movieInput").value;
let h=document.getElementById("hintInput").value;
if(!m) return;

db.ref("gameState").update({
movie:m,
hint:h,
status:"guessing"
});
}

function checkGuess(){
let g=document.getElementById("guessInput").value;

if(g===gameState.movie){

let key = (myName==="immu")?"score1":"score2";

db.ref("gameState/"+key).transaction(s=>(s||0)+1);

db.ref("gameState").update({
status:"set",
movie:"",
turn: (myName==="immu")?"sappii":"immu"
});

}else{
document.getElementById("fb").innerText="Wrong!";
}
}

function giveUp(){
db.ref("gameState").update({
status:"set",
movie:"",
turn:(myName==="immu")?"sappii":"immu"
});
}
</script>

</body>
</html>
