<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tamil Couple Movie Game 💖</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Latha&display=swap');

body{
    background:#120A1E;
    color:white;
    font-family:'Poppins','Latha',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    padding:20px 0;
    overflow-x:hidden;
    flex-direction:column;
}

.container{
    width:90%;
    max-width:400px;
    padding:20px;
}

.vs-container{
    display:flex;
    justify-content:space-around;
    align-items:center;
    margin-bottom:25px;
}

.player-box{
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:5px;
    width:90px;
    padding:10px;
    border-radius:15px;
}

.active-turn{
    background:rgba(255,75,114,0.15);
    border:1px solid #FF4B72;
}

.avatar{
    width:65px;
    height:65px;
    border-radius:50%;
    border:3px solid #3A2359;
    background-size:cover;
    background-position:center;
    background-color:#1D102E;
}

.immu-pic{
    background-image:url('1000242624.jpg');
    border-color:#4ade80;
}

.sappii-pic{
    background-image:url('1000242625.jpg');
    border-color:#FF4B72;
}

.player-name{
    font-size:13px;
    font-weight:600;
}

.score-val{
    font-size:24px;
    font-weight:bold;
    color:#FF4B72;
}

.vs-badge{
    background:#3A2359;
    padding:6px 12px;
    border-radius:50%;
    font-size:12px;
    color:#aaa;
}

.card{
    background:#1D102E;
    border-radius:25px;
    padding:25px;
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
    text-align:center;
    border:1px solid #2D1A45;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border-radius:12px;
    border:1px solid #3A2359;
    background:#120A1E;
    color:white;
    box-sizing:border-box;
    font-family:inherit;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    background:linear-gradient(135deg,#FF4B72,#FF7694);
    border:none;
    border-radius:12px;
    color:white;
    font-weight:600;
    cursor:pointer;
    font-size:16px;
}

.give-up-btn{
    background:transparent;
    border:1px solid #aaa;
    color:#aaa;
}

.reset-btn{
    background:transparent;
    border:1px solid #FF4B72;
    color:#FF4B72;
    margin-top:10px;
    font-size:14px;
    padding:10px;
}

.masked-word{
    font-size:24px;
    letter-spacing:3px;
    margin:15px 0 5px 0;
    color:#4ade80;
    font-weight:bold;
    font-family:'Latha',sans-serif;
    word-wrap:break-word;
}

.letter-count{
    font-size:12px;
    color:#aaa;
    margin-bottom:20px;
    font-weight:600;
    background:#2D1A45;
    display:inline-block;
    padding:4px 12px;
    border-radius:20px;
}

.hidden{
    display:none !important;
}

.turn-indicator{
    font-size:11px;
    color:#4ade80;
    font-weight:bold;
    margin-top:5px;
    text-transform:uppercase;
}

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(18,10,30,0.9);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1000;
    padding:20px;
}

.modal-content{
    background:#1D102E;
    padding:25px;
    border-radius:20px;
    text-align:center;
    border:1px solid #FF4B72;
    width:100%;
    max-width:320px;
}

.modal-btn-group{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.chat-container{
    text-align:left;
    background:#120A1E;
    border-radius:15px;
    padding:10px;
    height:150px;
    overflow-y:auto;
    margin-bottom:10px;
    border:1px solid #3A2359;
    display:flex;
    flex-direction:column;
    gap:5px;
}

.chat-msg{
    font-size:12px;
    padding:8px 12px;
    border-radius:12px;
    max-width:80%;
    word-wrap:break-word;
}

.msg-mine{
    background:#FF4B72;
    color:white;
    align-self:flex-end;
}

.msg-partner{
    background:#2D1A45;
    color:white;
    align-self:flex-start;
}

.chat-input-row{
    display:flex;
    gap:5px;
}

.chat-input-row input{
    margin:0;
    padding:10px;
}

.chat-input-row button{
    margin:0;
    width:auto;
    padding:10px 15px;
    font-size:14px;
}

.emoji-bar{
    display:flex;
    justify-content:space-evenly;
    margin-bottom:20px;
}

.emoji-btn{
    background:#1D102E;
    border:1px solid #FF4B72;
    border-radius:50%;
    width:50px;
    height:50px;
    font-size:24px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.floating-emoji{
    position:fixed;
    bottom:80px;
    font-size:35px;
    pointer-events:none;
    animation:floatUp 2.5s ease-out forwards;
    z-index:2000;
}

@keyframes floatUp{
    0%{
        transform:translateY(0) scale(1);
        opacity:1;
    }

    100%{
        transform:translateY(-250px) scale(1.5);
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="container">

<div class="vs-container">

<div id="box-immu" class="player-box">
<div class="avatar immu-pic"></div>
<div class="player-name">immu</div>
<div id="immuScore" class="score-val">0</div>
<div id="turn-immu" class="turn-indicator hidden">SETTING...</div>
</div>

<div class="vs-badge">VS</div>

<div id="box-sappii" class="player-box">
<div class="avatar sappii-pic"></div>
<div class="player-name">sappii</div>
<div id="sappiiScore" class="score-val">0</div>
<div id="turn-sappii" class="turn-indicator hidden">SETTING...</div>
</div>

</div>

<div class="emoji-bar">
<button class="emoji-btn" onclick="sendReaction('❤️')">❤️</button>
<button class="emoji-btn" onclick="sendReaction('😂')">😂</button>
<button class="emoji-btn" onclick="sendReaction('🥺')">🥺</button>
<button class="emoji-btn" onclick="sendReaction('🔥')">🔥</button>
</div>

<div id="gameContent"></div>

<div class="card" style="padding:15px;">

<h4 style="margin:0 0 10px 0;font-size:14px;text-align:left;color:#aaa;">
Couple Chat 💬
</h4>

<div class="chat-container" id="chatMessages"></div>

<div class="chat-input-row">
<input type="text" id="chatInput" placeholder="Type a message..." onkeypress="handleChatEnter(event)">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<button class="reset-btn" onclick="openResetModal()">
Reset Game 🔄
</button>

</div>

<div id="resetModal" class="modal hidden">

<div class="modal-content">

<h3 style="margin-top:0;color:#fff;">
Who will start?
</h3>

<p style="font-size:13px;color:#aaa;">
Scores will reset
</p>

<div class="modal-btn-group">
<button onclick="confirmReset('immu')" style="background:#4ade80;color:#120A1E;">
Immu 👦
</button>

<button onclick="confirmReset('sappii')">
Sappii 👧
</button>
</div>

<button onclick="closeResetModal()" style="background:none;border:none;color:#aaa;margin-top:10px;">
Cancel
</button>

</div>
</div>

<script>

const tamilMapping = {

'a':'அ',
'aa':'ஆ',
'i':'இ',
'ee':'ஈ',
'u':'உ',
'oo':'ஊ',
'e':'எ',
'ai':'ஐ',
'o':'ஒ',

'ka':'க',
'ki':'கி',
'ku':'கு',
'ke':'கெ',
'kai':'கை',
'ko':'கொ',

'nga':'ங',
'cha':'ச',
'nja':'ஞ',

'ta':'ட',
'na':'ண',

'tha':'த',
'nha':'ந',

'pa':'ப',
'ma':'ம',

'ya':'ய',
'ra':'ர',
'la':'ல',
'va':'வ',

'zha':'ழ',

'La':'ள',
'Ra':'ற',

'nna':'ன'

};

function transliterate(text){

    let result = "";
    let i = 0;

    while(i < text.length){

        let found = false;

        for(let len = 4; len >= 1; len--){

            let chunk = text.substring(i, i + len);

            if(tamilMapping[chunk]){
                result += tamilMapping[chunk];
                i += len;
                found = true;
                break;
            }

            const lowerChunk = chunk.toLowerCase();

            if(tamilMapping[lowerChunk]){
                result += tamilMapping[lowerChunk];
                i += len;
                found = true;
                break;
            }

        }

        if(!found){
            result += text[i];
            i++;
        }

    }

    return result;
}

function liveTamilPreview(text, elementId){
    document.getElementById(elementId).innerText =
    transliterate(text);
}

const firebaseConfig = {

apiKey:"AIzaSyCdhWff4X_XHvoIw_mhFDGRjy9vC4ymFc4",

authDomain:"moviename-26960.firebaseapp.com",

databaseURL:"https://moviename-26960-default-rtdb.firebaseio.com",

projectId:"moviename-26960",

storageBucket:"moviename-26960.firebasestorage.app",

messagingSenderId:"745803258160",

appId:"1:745803258160:web:94974f7633fd84a1f3d0f5"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const urlParams =
new URLSearchParams(window.location.search);

const myName =
(urlParams.get('u') || "immu").toLowerCase();

let gameState = {};

db.ref('gameState').on('value',(snapshot)=>{

const data = snapshot.val() || {};

gameState = {

turn:data.turn || "immu",

status:data.status || "set",

score1:data.score1 || 0,

score2:data.score2 || 0,

movie:data.movie || "",

hint:data.hint || ""

};

renderUI();

});

function renderUI(){

const container =
document.getElementById('gameContent');

document.getElementById('immuScore').innerText =
gameState.score1;

document.getElementById('sappiiScore').innerText =
gameState.score2;

if(gameState.status === "set"){

if(gameState.turn === myName){

container.innerHTML = `

<div class="card">

<h3>🎬 Your Turn</h3>

<input type="text"
id="movieInput"
placeholder="Movie Name"
oninput="liveTamilPreview(this.value,'moviePreview')">

<p id="moviePreview"
style="color:#4ade80;font-size:18px;font-weight:bold;"></p>

<input type="text"
id="hintInput"
placeholder="Add a hint">

<button onclick="setMovie()">
Start Game 🚀
</button>

</div>
`;

}else{

container.innerHTML = `
<div class="card">
<h3>⏳ Waiting...</h3>
</div>
`;

}

}else{

const letterCount =
getLetterCount(gameState.movie);

if(gameState.turn === myName){

container.innerHTML = `
<div class="card">

<h3>🍿 Guessing...</h3>

<div class="masked-word">
${maskTamil(gameState.movie)}
</div>

<div class="letter-count">
${letterCount} Letters
</div>

</div>
`;

}else{

container.innerHTML = `

<div class="card">

<h3>🤔 Guess!</h3>

<div class="masked-word">
${maskTamil(gameState.movie)}
</div>

<p style="color:#FF4B72;">
💡 Hint: ${gameState.hint}
</p>

<input type="text"
id="guessInput"
placeholder="Type in Tanglish"
oninput="liveTamilPreview(this.value,'livePreview')">

<p id="livePreview"
style="color:#4ade80;font-size:18px;font-weight:bold;"></p>

<button onclick="checkGuess()">
Submit
</button>

<button class="give-up-btn"
onclick="giveUp()">
Theriyala 🥺
</button>

<p id="feedback"></p>

</div>
`;

}

}

}

function setMovie(){

const raw =
document.getElementById('movieInput').value;

const tamilMovie =
transliterate(raw);

const hint =
document.getElementById('hintInput').value;

if(!raw) return;

db.ref('gameState').update({

movie:tamilMovie,
hint:hint,
status:"guessing"

});

}

function checkGuess(){

const raw =
document.getElementById('guessInput').value;

const tamilGuess =
transliterate(raw);

if(tamilGuess === gameState.movie){

const scoreKey =
(myName === "immu")
? 'score1'
: 'score2';

db.ref(`gameState/${scoreKey}`)
.transaction(s => (s || 0) + 1);

db.ref('gameState').update({

turn:myName,
status:"set",
movie:""

});

sendReaction('🎉');

}else{

document.getElementById('feedback').innerText =
"Wrong! Try again 🥺";

}

}

function giveUp(){

document.getElementById('feedback').innerText =
"Answer: " + gameState.movie;

setTimeout(()=>{

db.ref('gameState').update({

turn:myName,
status:"set",
movie:""

});

},2500);

}

function getLetterCount(str){

if(!str) return 0;

return str.replace(/\s/g,'').length;

}

function maskTamil(str){

if(!str) return "";

const words =
str.trim().split(/\s+/);

return words.map(word => {

const chars = [...word];

if(chars.length <= 2){
return word;
}

return chars.map((c,index)=>{

if(
index === 0 ||
index === chars.length - 1
){
return c;
}

return "_";

}).join(" ");

}).join("   ");

}

function openResetModal(){
document.getElementById('resetModal')
.classList.remove('hidden');
}

function closeResetModal(){
document.getElementById('resetModal')
.classList.add('hidden');
}

function confirmReset(starter){

db.ref('gameState').set({

turn:starter,
status:"set",
score1:0,
score2:0,
movie:"",
hint:""

});

closeResetModal();

}

const chatRef = db.ref('chat');

function sendMessage(){

const input =
document.getElementById('chatInput');

const text = input.value.trim();

if(!text) return;

chatRef.push({

sender:myName,
text:text,
timestamp:Date.now()

});

input.value = '';

}

function handleChatEnter(e){

if(e.key === 'Enter'){
sendMessage();
}

}

chatRef.limitToLast(30).on('child_added',(snapshot)=>{

const msg = snapshot.val();

const chatBox =
document.getElementById('chatMessages');

const isMine =
msg.sender === myName;

const className =
isMine ? 'msg-mine' : 'msg-partner';

const msgDiv =
document.createElement('div');

msgDiv.className =
`chat-msg ${className}`;

msgDiv.textContent =
`${isMine ? 'You' : msg.sender}: ${msg.text}`;

chatBox.appendChild(msgDiv);

chatBox.scrollTop =
chatBox.scrollHeight;

});

const reactionRef =
db.ref('reactions');

function sendReaction(emoji){

reactionRef.push({

emoji:emoji,
sender:myName,
timestamp:Date.now()

});

}

reactionRef.limitToLast(1)
.on('child_added',(snapshot)=>{

const data = snapshot.val();

if(Date.now() - data.timestamp < 3000){

createFloatingEmoji(data.emoji);

}

});

function createFloatingEmoji(emoji){

const emojiEl =
document.createElement('div');

emojiEl.className =
'floating-emoji';

emojiEl.innerText = emoji;

emojiEl.style.left =
Math.random() * 80 + 10 + '%';

document.body.appendChild(emojiEl);

setTimeout(()=>{

emojiEl.remove();

},2500);

}

</script>

</body>
</html>
