<!DOCTYPE html>
<html lang="ta">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tamil Couple Movie Game 💖</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Latha&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#120A1E;
    color:white;
    font-family:'Poppins','Latha',sans-serif;

    display:flex;
    justify-content:center;

    min-height:100vh;

    overflow-x:hidden;

    padding:12px 0;

}

.container{

    width:92%;
    max-width:380px;

}

/* TOP */

.vs-container{

    display:flex;
    justify-content:space-around;
    align-items:center;

    margin-bottom:16px;

}

.player-box{

    text-align:center;

}

.avatar{

    width:58px;
    height:58px;

    border-radius:50%;

    background-size:cover;
    background-position:center;

    border:3px solid #FF4B72;

}

.immu-pic{

    background-image:url('1000242624.jpg');

}

.sappii-pic{

    background-image:url('1000242625.jpg');

}

.player-name{

    margin-top:5px;

    font-size:12px;
    font-weight:600;

}

.score-val{

    font-size:28px;
    font-weight:bold;

    color:#FF4B72;

}

.vs-badge{

    width:38px;
    height:38px;

    border-radius:50%;

    background:#3A2359;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:11px;
    color:#bbb;

}

/* EMOJI */

.emoji-bar{

    display:flex;
    justify-content:space-evenly;

    margin-bottom:16px;

}

.emoji-btn{

    width:52px;
    height:52px;

    border-radius:50%;

    border:1px solid #FF4B72;

    background:#1D102E;

    font-size:23px;

    color:white;

    cursor:pointer;

}

/* CARD */

.card{

    background:#1D102E;

    border-radius:26px;

    padding:22px;

    margin-bottom:18px;

    box-shadow:
    0 0 25px rgba(255,75,114,0.10);

}

.card h2{

    text-align:center;

    font-size:18px;

    margin-bottom:18px;

}

/* MASK */

.masked-word{

    text-align:center;

    color:#4ade80;

    font-size:30px;
    font-weight:bold;

    margin-bottom:14px;

    line-height:1.5;

    word-break:break-word;

}

.letter-count{

    text-align:center;

    font-size:12px;

    color:#999;

    margin-bottom:10px;

}

/* INPUT */

input{

    width:100%;

    background:#120A1E;

    border:1px solid #3A2359;

    border-radius:16px;

    padding:14px;

    color:white;

    font-size:15px;

    outline:none;

    margin-top:12px;

}

input::placeholder{

    color:#777;

}

/* BUTTON */

button{

    width:100%;

    border:none;

    border-radius:16px;

    padding:15px;

    font-size:16px;
    font-weight:600;

    cursor:pointer;

    margin-top:14px;

    color:white;

    background:
    linear-gradient(
    135deg,
    #FF4B72,
    #FF7694
    );

}

.give-up-btn{

    background:transparent;

    border:1px solid #777;

    color:#ccc;

}

/* PREVIEW */

.preview{

    color:#4ade80;

    text-align:center;

    font-size:24px;
    font-weight:bold;

    min-height:34px;

    margin-top:10px;

    word-break:break-word;

}

/* CHAT */

.chat-container{

    background:#120A1E;

    border-radius:14px;

    padding:10px;

    height:130px;

    overflow-y:auto;

    margin-bottom:10px;

}

.chat-msg{

    padding:9px 12px;

    border-radius:12px;

    margin-bottom:8px;

    font-size:12px;

    word-break:break-word;

    line-height:1.4;

}

.msg-mine{

    background:#FF4B72;

    text-align:right;

}

.msg-partner{

    background:#2D1A45;

}

.chat-input-row{

    display:flex;

    gap:8px;

}

.chat-input-row input{

    margin-top:0;

}

.chat-input-row button{

    width:auto;

    padding:12px 15px;

    margin-top:0;

    font-size:14px;

}

/* FLOAT EMOJI */

.floating-emoji{

    position:fixed;

    bottom:70px;

    font-size:32px;

    pointer-events:none;

    z-index:9999;

    animation:floatUp 2.5s ease-out forwards;

}

@keyframes floatUp{

    0%{

        transform:
        translateY(0)
        scale(1);

        opacity:1;

    }

    100%{

        transform:
        translateY(-220px)
        scale(1.6);

        opacity:0;

    }

}

</style>

</head>

<body>

<div class="container">

<!-- TOP -->

<div class="vs-container">

<div class="player-box">

<div class="avatar immu-pic"></div>

<div class="player-name">
immu
</div>

<div id="immuScore"
class="score-val">
0
</div>

</div>

<div class="vs-badge">
VS
</div>

<div class="player-box">

<div class="avatar sappii-pic"></div>

<div class="player-name">
sappii
</div>

<div id="sappiiScore"
class="score-val">
0
</div>

</div>

</div>

<!-- EMOJI -->

<div class="emoji-bar">

<button class="emoji-btn"
onclick="sendReaction('❤️')">
❤️
</button>

<button class="emoji-btn"
onclick="sendReaction('😂')">
😂
</button>

<button class="emoji-btn"
onclick="sendReaction('🥺')">
🥺
</button>

<button class="emoji-btn"
onclick="sendReaction('🔥')">
🔥
</button>

</div>

<div id="gameContent"></div>

<!-- CHAT -->

<div class="card">

<h3 style="margin-bottom:12px;">
Couple Chat 💬
</h3>

<div class="chat-container"
id="chatMessages"></div>

<div class="chat-input-row">

<input
type="text"
id="chatInput"
placeholder="Type a message..."
onkeypress="handleChatEnter(event)">

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

</div>

<script>

/* TAMIL */

const tamilMap = {

"a":"அ",
"aa":"ஆ",
"i":"இ",
"ii":"ஈ",
"u":"உ",
"uu":"ஊ",
"e":"எ",
"ee":"ஏ",
"ai":"ஐ",
"o":"ஒ",
"oo":"ஓ",

"ka":"க",
"kaa":"கா",
"ki":"கி",
"ku":"கு",

"cha":"ச",
"chi":"சி",

"ta":"ட",
"tha":"த",
"thi":"தி",
"thaa":"தா",

"na":"ந",

"pa":"ப",
"pi":"பி",

"ma":"ம",

"ya":"ய",

"ra":"ர",

"la":"ல",

"va":"வ",
"vi":"வி",

"zha":"ழ",
"zhi":"ழி",

"am":"ம்",
"an":"ன்"

};

function transliterate(text){

    let result = "";
    let i = 0;

    while(i < text.length){

        let found = false;

        for(let len = 5; len >= 1; len--){

            let chunk =
            text.substring(i,i+len);

            if(tamilMap[chunk]){

                result += tamilMap[chunk];

                i += len;

                found = true;

                break;

            }

            let lower =
            chunk.toLowerCase();

            if(tamilMap[lower]){

                result += tamilMap[lower];

                i += len;

                found = true;

                break;

            }

        }

        if(!found){

            result += text[i];

            i++;

        }

    }

    return result;

}

function liveTamilPreview(
text,
elementId
){

document.getElementById(
elementId
).innerText =
transliterate(text);

}

/* MASK */

function splitTamilLetters(word){

return word.match(
/(?:[\u0B95-\u0BB9][\u0BBE-\u0BCD]*)|[\u0B80-\u0BFF]/g
) || [];

}

function maskTamil(str){

if(!str) return "";

const words =
str.trim().split(/\s+/);

return words.map(word=>{

const chars =
splitTamilLetters(word);

if(chars.length <= 2){

return word;

}

return chars.map((char,index)=>{

if(
index === 0 ||
index === chars.length - 1
){

return char;

}

return "_";

}).join(" ");

}).join("   ");

}

function getLetterCount(str){

if(!str) return 0;

const chars =
splitTamilLetters(
str.replace(/\s/g,'')
);

return chars.length;

}

/* FIREBASE */

const firebaseConfig = {

apiKey:
"AIzaSyCdhWff4X_XHvoIw_mhFDGRjy9vC4ymFc4",

authDomain:
"moviename-26960.firebaseapp.com",

databaseURL:
"https://moviename-26960-default-rtdb.firebaseio.com",

projectId:
"moviename-26960",

storageBucket:
"moviename-26960.firebasestorage.app",

messagingSenderId:
"745803258160",

appId:
"1:745803258160:web:94974f7633fd84a1f3d0f5"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const urlParams =
new URLSearchParams(
window.location.search
);

const myName =
(urlParams.get('u')
|| "immu").toLowerCase();

let gameState = {};

db.ref('gameState')
.on('value',(snapshot)=>{

const data =
snapshot.val() || {};

gameState = {

turn:data.turn || "immu",

status:data.status || "set",

score1:data.score1 || 0,

score2:data.score2 || 0,

movie:data.movie || "",

hint:data.hint || ""

};

renderUI();

});

/* UI */

function renderUI(){

const container =
document.getElementById(
'gameContent'
);

document.getElementById(
'immuScore'
).innerText =
gameState.score1;

document.getElementById(
'sappiiScore'
).innerText =
gameState.score2;

if(gameState.status === "set"){

if(gameState.turn === myName){

container.innerHTML = `

<div class="card">

<h2>🎬 Your Turn</h2>

<input
type="text"
id="movieInput"
placeholder="Movie Name"
oninput="
liveTamilPreview(
this.value,
'moviePreview'
)
">

<div id="moviePreview"
class="preview"></div>

<input
type="text"
id="hintInput"
placeholder="Add a hint">

<button onclick="setMovie()">
Start Game 🚀
</button>

</div>

`;

}else{

container.innerHTML = `

<div class="card">

<h2>⏳ Waiting...</h2>

</div>

`;

}

}else{

const letterCount =
getLetterCount(
gameState.movie
);

if(gameState.turn === myName){

container.innerHTML = `

<div class="card">

<h2>🍿 Guessing...</h2>

<div class="masked-word">
${maskTamil(gameState.movie)}
</div>

<div class="letter-count">
${letterCount} Letters
</div>

</div>

`;

}else{

container.innerHTML = `

<div class="card">

<h2>🤔 Guess!</h2>

<div class="masked-word">
${maskTamil(gameState.movie)}
</div>

<p style="
text-align:center;
color:#FF4B72;
margin-bottom:12px;
">
💡 Hint: ${gameState.hint}
</p>

<input
type="text"
id="guessInput"
placeholder="Type in Tanglish"
oninput="
liveTamilPreview(
this.value,
'livePreview'
)
">

<div id="livePreview"
class="preview"></div>

<button onclick="checkGuess()">
Submit
</button>

<button
class="give-up-btn"
onclick="giveUp()">
Theriyala 🥺
</button>

<p id="feedback"
style="
text-align:center;
margin-top:14px;
">
</p>

</div>

`;

}

}

}

/* GAME */

function setMovie(){

const raw =
document.getElementById(
'movieInput'
).value;

const tamilMovie =
transliterate(raw);

const hint =
document.getElementById(
'hintInput'
).value;

if(!raw) return;

db.ref('gameState')
.update({

movie:tamilMovie,

hint:hint,

status:"guessing"

});

}

function checkGuess(){

const raw =
document.getElementById(
'guessInput'
).value;

const tamilGuess =
transliterate(raw);

if(
tamilGuess ===
gameState.movie
){

const scoreKey =
(myName === "immu")
? 'score1'
: 'score2';

db.ref(
`gameState/${scoreKey}`
).transaction(
s => (s || 0) + 1
);

db.ref('gameState')
.update({

turn:myName,

status:"set",

movie:""

});

sendReaction('🎉');

}else{

document.getElementById(
'feedback'
).innerText =
"Wrong! Try again 🥺";

}

}

function giveUp(){

document.getElementById(
'feedback'
).innerText =
"Answer: " +
gameState.movie;

setTimeout(()=>{

db.ref('gameState')
.update({

turn:myName,

status:"set",

movie:""

});

},2500);

}

/* CHAT */

const chatRef =
db.ref('chat');

function sendMessage(){

const input =
document.getElementById(
'chatInput'
);

const text =
input.value.trim();

if(!text) return;

chatRef.push({

sender:myName,

text:text,

timestamp:Date.now()

});

input.value = '';

}

function handleChatEnter(e){

if(e.key === 'Enter'){

sendMessage();

}

}

chatRef.limitToLast(30)
.on('child_added',
(snapshot)=>{

const msg =
snapshot.val();

const chatBox =
document.getElementById(
'chatMessages'
);

const isMine =
msg.sender === myName;

const msgDiv =
document.createElement('div');

msgDiv.className =
`chat-msg ${
isMine
? 'msg-mine'
: 'msg-partner'
}`;

msgDiv.textContent =
`${isMine
? 'You'
: msg.sender}: ${msg.text}`;

chatBox.appendChild(
msgDiv
);

chatBox.scrollTop =
chatBox.scrollHeight;

});

/* REACTION */

const reactionRef =
db.ref('reactions');

function sendReaction(emoji){

reactionRef.push({

emoji:emoji,

sender:myName,

timestamp:Date.now()

});

}

reactionRef.limitToLast(1)
.on('child_added',
(snapshot)=>{

const data =
snapshot.val();

if(
Date.now() -
data.timestamp
< 3000
){

createFloatingEmoji(
data.emoji
);

}

});

function createFloatingEmoji(
emoji
){

const emojiEl =
document.createElement(
'div'
);

emojiEl.className =
'floating-emoji';

emojiEl.innerText =
emoji;

emojiEl.style.left =
Math.random() * 80
+ 10 + '%';

document.body.appendChild(
emojiEl
);

setTimeout(()=>{

emojiEl.remove();

},2500);

}

</script>

</body>
</html>
